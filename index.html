// ── LOCAL STORAGE FALLBACK (works without Firebase) ──────────────────────────
const LS = {
  get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ── FIREBASE HOOK ─────────────────────────────────────────────────────────────
function useDB() {
  const [db, setDb] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    try {
      if (FIREBASE_CONFIG.apiKey === 'REPLACE_WITH_YOUR_API_KEY') {
        setReady(true); // use local storage fallback
        return;
      }
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      const database = firebase.database();
      setDb(database);
      setReady(true);
    } catch(e) {
      setReady(true); // fallback to localStorage
    }
  }, []);

  const read = useCallback((path, cb) => {
    if (!db) {
      const val = LS.get(path);
      cb(val);
      return () => {};
    }
    const ref = db.ref(path);
    ref.on('value', snap => cb(snap.val()));
    return () => ref.off();
  }, [db]);

  const write = useCallback((path, val) => {
    if (!db) { LS.set(path, val); return Promise.resolve(); }
    return db.ref(path).set(val);
  }, [db]);

  const push = useCallback((path, val) => {
    if (!db) {
      const existing = LS.get(path) || {};
      const key = Date.now().toString();
      existing[key] = val;
      LS.set(path, existing);
      return Promise.resolve(key);
    }
    return db.ref(path).push(val).then(r => r.key);
  }, [db]);

  const remove = useCallback((path) => {
    if (!db) { localStorage.removeItem(path); return Promise.resolve(); }
    return db.ref(path).remove();
  }, [db]);

  return { db, ready, read, write, push, remove };
}

  if (!d) return '';

  return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

// ── BUILD BALANCED TEAMS ──────────────────────────────────────────────────────
function buildTeams(players) {
  const sorted = [...players].sort((a,b) => parseFloat(a.handicap) - parseFloat(b.handicap));
  const teamSize = sorted.length <= 12 ? 3 : 4;
  const numTeams = Math.ceil(sorted.length / teamSize);
  const teams = Array.from({length: numTeams}, (_,i) => ({
    id: i+1, name: `Team ${i+1}`, players: [], totalHcp: 0
  }));

  // Snake draft: rank by handicap, distribute A/B/C/D
  sorted.forEach((p, idx) => {
    const round = Math.floor(idx / numTeams);
    const pos = idx % numTeams;
    const teamIdx = round % 2 === 0 ? pos : numTeams - 1 - pos;
    teams[teamIdx].players.push({...p, slot: ['A','B','C','D'][Math.min(round,3)]});
    teams[teamIdx].totalHcp += parseFloat(p.handicap) || 0;
  });

  return teams;
}

// ── SIGNUP VIEW (Players) ─────────────────────────────────────────────────────
function SignupView({ game, signups, onSignup, onRemove, isAdmin, rosterWithGuests }) {
  const [showForm, setShowForm] = useState(false);
  const [selectedPlayer, setSelectedPlayer] = useState('');
  const [guestName, setGuestName] = useState('');
  const [isGuest, setIsGuest] = useState(false);
  const [tee, setTee] = useState('Whites');
  const [handicap, setHandicap] = useState('');
  const [search, setSearch] = useState('');

  const signedUpIds = Object.values(signups || {}).map(s => s.playerId);
  const available = rosterWithGuests.filter(p =>
    !p.isGuest && !signedUpIds.includes(p.id) &&
    p.name.toLowerCase().includes(search.toLowerCase())
  );

  function handleSubmit() {
    const name = isGuest ? guestName.trim() : rosterWithGuests.find(p => p.id == selectedPlayer)?.name;
    if (!name || !handicap) return;
    onSignup({
      playerId: isGuest ? `guest_${Date.now()}` : parseInt(selectedPlayer),
      name,
      isGuest,
      tee,
      handicap: parseFloat(handicap),
      signedUpAt: Date.now()
    });
    setShowForm(false);
    setSelectedPlayer(''); setGuestName(''); setHandicap(''); setIsGuest(false); setTee('Whites');
  }

  const signupList = Object.entries(signups || {}).sort((a,b) => a[1].signedUpAt - b[1].signedUpAt);

  return (
    <div>
      {game && (
        <div className="card" style={{background:'var(--green-pale)', borderColor:'var(--green-light)'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <div>
              <div style={{fontSize:18, fontWeight:600, color:'var(--green)'}}>{game.day}</div>
              <div style={{fontSize:14, color:'var(--text-mid)', marginTop:2}}>{fmtDate(game.date)}</div>
              {game.course && <div style={{fontSize:13, color:'var(--text-muted)', marginTop:2}}>{game.course}</div>}
            </div>
            <div style={{textAlign:'right'}}>
              <span className="badge badge-green">{signupList.length} signed up</span>
              {game.teetime && <div style={{fontSize:12, color:'var(--text-muted)', marginTop:4}}>First tee: {game.teetime}</div>}
            </div>
          </div>
        </div>
      )}

      {!game && (
        <div className="empty-state">
          {Icons.golf}
          <div className="empty-title">No game scheduled</div>
          <p>Check back soon or ask the admin to post this week's game.</p>
        </div>
      )}

      {game && (
        <>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
            <div style={{fontSize:14, fontWeight:600}}>Who's playing</div>
            <button className="btn btn-primary btn-sm" onClick={() => setShowForm(true)}>
              {Icons.plus} Sign up
            </button>
          </div>

          {signupList.length === 0 && (
            <div style={{textAlign:'center', padding:'20px', color:'var(--text-muted)', fontSize:14}}>
              No sign-ups yet — be the first!
            </div>
          )}

          <div className="card" style={{padding:0}}>
            {signupList.map(([key, s]) => (
              <div key={key} className="signup-item">
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <div className="player-avatar" style={{width:30,height:30,fontSize:11}}>
                    {initials(s.name)}
                  </div>
                  <div>
                    <div style={{fontWeight:500, fontSize:13}}>{s.name} {s.isGuest && <span className="badge badge-gray">Guest</span>}</div>
                    <div style={{fontSize:11, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:4}}>
                      <span className="tee-dot" style={{background: TEE_COLORS[s.tee] || '#ccc'}}></span>
                      {s.tee} · HCP {s.handicap}
                    </div>
                  </div>
                </div>
                {isAdmin && (
                  <button className="btn btn-sm" style={{color:'var(--danger)', border:'none', padding:'4px 6px'}} onClick={() => onRemove(key)}>
                    {Icons.trash}
                  </button>
                )}
              </div>
            ))}
          </div>
        </>
      )}

      {/* Sign Up Modal */}
      {showForm && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowForm(false)}>
          <div className="modal">
            <button className="modal-close" onClick={() => setShowForm(false)}>{Icons.x}</button>
            <div className="modal-title">Sign up for {game?.day}</div>

            <div className="pill-toggle" style={{marginBottom:14}}>
              <button className={`pill-opt ${!isGuest ? 'active' : ''}`} onClick={() => setIsGuest(false)}>Member</button>
              <button className={`pill-opt ${isGuest ? 'active' : ''}`} onClick={() => setIsGuest(true)}>Guest</button>
            </div>

            {!isGuest ? (
              <div className="form-group">
                <label className="form-label">Your name</label>
                <div className="search-wrap">
                  <span className="search-icon">{Icons.search}</span>
                  <input className="search-input" placeholder="Search name..." value={search} onChange={e => setSearch(e.target.value)} />
                </div>
                <div style={{maxHeight:180, overflowY:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)'}}>
                  {available.slice(0,20).map(p => (
                    <div key={p.id} className={`player-item ${selectedPlayer == p.id ? 'selected' : ''}`}
                      style={{margin:0, borderRadius:0, borderLeft:'none', borderRight:'none', borderTop:'none'}}
                      onClick={() => { setSelectedPlayer(p.id); setSearch(''); }}>
                      <div className="player-avatar" style={{width:28,height:28,fontSize:10}}>{initials(p.name)}</div>
                      <span className="player-name" style={{fontSize:13}}>{p.name}</span>
                      {selectedPlayer == p.id && <span style={{color:'var(--green)'}}>{Icons.check}</span>}
                    </div>
                  ))}
                  {available.length === 0 && <div style={{padding:'12px', fontSize:13, color:'var(--text-muted)', textAlign:'center'}}>No matches</div>}
                </div>
              </div>
            ) : (
              <div className="form-group">
                <label className="form-label">Guest name</label>
                <input className="form-input" placeholder="Full name" value={guestName} onChange={e => setGuestName(e.target.value)} />
              </div>
            )}

            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Tees</label>
                <select className="form-select" value={tee} onChange={e => setTee(e.target.value)}>
                  {TEES.map(t => <option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Handicap</label>
                <input className="form-input" type="number" placeholder="e.g. 14" value={handicap} onChange={e => setHandicap(e.target.value)} />
              </div>
            </div>

            <button className="btn btn-primary btn-full" onClick={handleSubmit}
              disabled={(!selectedPlayer && !guestName) || !handicap}>
              Confirm sign-up
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── TEAMS VIEW ────────────────────────────────────────────────────────────────
function TeamsView({ game, teams, signups, isAdmin, onSaveTeams, onPublish }) {
  const [editMode, setEditMode] = useState(false);
  const [localTeams, setLocalTeams] = useState(null);
  const [dragPlayer, setDragPlayer] = useState(null);

  const displayTeams = localTeams || teams;

  function generate() {
    const players = Object.values(signups || {});
    if (players.length < 3) return;
    const generated = buildTeams(players);
    setLocalTeams(generated);
    setEditMode(true);
  }

  function movePlayer(fromTeam, fromIdx, toTeam, toIdx) {
    const updated = localTeams.map(t => ({...t, players: [...t.players]}));
    const player = updated[fromTeam].players[fromIdx];
    updated[fromTeam].players.splice(fromIdx, 1);
    updated[toTeam].players.splice(toIdx, 0, player);
    // recalc slots and hcp
    updated.forEach(team => {
      team.players.forEach((p, i) => { p.slot = ['A','B','C','D'][i] || 'D'; });
      team.totalHcp = team.players.reduce((s, p) => s + parseFloat(p.handicap || 0), 0);
    });
    setLocalTeams(updated);
  }

  function save() {
    onSaveTeams(localTeams);
    setEditMode(false);
    setLocalTeams(null);
  }

  const signupCount = Object.keys(signups || {}).length;

  if (!game) return (
    <div className="empty-state">
      {Icons.users}
      <div className="empty-title">No active game</div>
    </div>
  );

  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card"><div className="stat-num">{signupCount}</div><div className="stat-label">Players</div></div>
        <div className="stat-card"><div className="stat-num">{(displayTeams || []).length}</div><div className="stat-label">Teams</div></div>
        <div className="stat-card"><div className="stat-num" style={{fontSize:16}}>{game.teamsPublished ? '✓ Live' : 'Pending'}</div><div className="stat-label">Status</div></div>
      </div>

      {isAdmin && (
        <div className="admin-section">
          <div className="admin-section-title">Admin — team builder</div>
          <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
            <button className="btn btn-primary btn-sm" onClick={generate} disabled={signupCount < 3}>
              {Icons.users} Auto-generate teams
            </button>
            {editMode && localTeams && (
              <>
                <button className="btn btn-gold btn-sm" onClick={save}>Save teams</button>
                <button className="btn btn-secondary btn-sm" onClick={() => { setLocalTeams(null); setEditMode(false); }}>Cancel</button>
              </>
            )}
            {!editMode && displayTeams?.length > 0 && !game.teamsPublished && (
              <button className="btn btn-gold btn-sm" onClick={onPublish}>Publish to group</button>
            )}
          </div>
          {editMode && <div className="warning-box" style={{marginTop:10, marginBottom:0}}>Drag players between teams to rebalance, then save.</div>}
        </div>
      )}

      {!displayTeams?.length && (
        <div className="empty-state">
          {Icons.users}
          <div className="empty-title">Teams not set yet</div>
          <p>The admin will generate and publish teams before the round.</p>
        </div>
      )}

      {displayTeams?.map((team, ti) => (
        <div key={team.id} className="team-card">
          <div className="team-header">
            <span className="team-name">{team.name}</span>
            <span className="team-hcp">Total HCP: {team.totalHcp.toFixed(1)}</span>
          </div>
          <div className="team-body">
            {team.players.map((p, pi) => (
              <div key={pi} className="team-player"
                draggable={editMode}
                onDragStart={() => setDragPlayer({ti, pi})}
                onDragOver={e => e.preventDefault()}
                onDrop={() => { if (dragPlayer) movePlayer(dragPlayer.ti, dragPlayer.pi, ti, pi); setDragPlayer(null); }}>
                {editMode && <span className="drag-handle">⋮⋮</span>}
                <span className="slot-label">{p.slot}</span>
                <div className="player-avatar" style={{width:28, height:28, fontSize:10}}>{initials(p.name)}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13, fontWeight:500}}>{p.name}</div>
                  <div style={{fontSize:11, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:4}}>
                    <span className="tee-dot" style={{background: TEE_COLORS[p.tee] || '#ccc'}}></span>
                    {p.tee} · {p.handicap}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── SCORING VIEW ──────────────────────────────────────────────────────────────
function ScoringView({ game, teams, scores, onSaveScores, isAdmin }) {
  const [localScores, setLocalScores] = useState(scores || {});
  const [skinCounts, setSkinCounts] = useState({});
  const [frontPlaces, setFrontPlaces] = useState(2);
  const [backPlaces, setBackPlaces] = useState(2);
  const [overallPlaces, setOverallPlaces] = useState(2);
  const [frontPot, setFrontPot] = useState('');
  const [backPot, setBackPot] = useState('');
  const [overallPot, setOverallPot] = useState('');
  const [skinsPot, setSkinsPot] = useState('');
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    if (scores) {
      setLocalScores(scores.teamScores || {});
      setSkinCounts(scores.skinCounts || {});
      setFrontPot(scores.frontPot || '');
      setBackPot(scores.backPot || '');
      setOverallPot(scores.overallPot || '');
      setSkinsPot(scores.skinsPot || '');
      setFrontPlaces(scores.frontPlaces || 2);
      setBackPlaces(scores.backPlaces || 2);
      setOverallPlaces(scores.overallPlaces || 2);
    }
  }, [scores]);

  const playerCount = game ? Object.keys(game.signups || {}).length : 0;
  const tournFund = playerCount;
  const skinsNet = parseFloat(skinsPot || 0) - tournFund;
  const totalPot = playerCount * 25;
  const totalAllocated = parseFloat(frontPot||0) + parseFloat(backPot||0) + parseFloat(overallPot||0) + parseFloat(skinsPot||0);
  const potMatch = Math.abs(totalAllocated - totalPot) < 0.01;

  function tapSkin(teamId) {
    setSkinCounts(prev => ({...prev, [teamId]: (prev[teamId] || 0) + 1}));
  }
  function untapSkin(teamId) {
    setSkinCounts(prev => ({...prev, [teamId]: Math.max(0, (prev[teamId] || 0) - 1)}));
  }

  const totalSkins = Object.values(skinCounts).reduce((s,c) => s+c, 0);
  const perSkin = totalSkins > 0 ? skinsNet / totalSkins : 0;

  function calcPayouts(pot, places, section) {
    if (!pot || parseFloat(pot) === 0) return [];
    const p = parseFloat(pot);
    if (places === 1) return [{label:'1st', amount: p}];
    return [{label:'1st', amount: p * 0.6}, {label:'2nd', amount: p * 0.4}];
  }

  function save() {
    onSaveScores({
      teamScores: localScores,
      skinCounts,
      frontPot, backPot, overallPot, skinsPot,
      frontPlaces, backPlaces, overallPlaces,
      tournFund, playerCount,
      savedAt: Date.now()
    });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  if (!game) return <div className="empty-state">{Icons.trophy}<div className="empty-title">No active game</div></div>;
  if (!teams?.length) return <div className="empty-state">{Icons.trophy}<div className="empty-title">Teams not published yet</div></div>;

  return (
    <div>
      {/* Pot Setup */}
      {isAdmin && (
        <div className="admin-section">
          <div className="admin-section-title">Pot setup ({playerCount} players · {fmt$(totalPot)} total)</div>
          <div className="form-row" style={{marginBottom:8}}>
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">Front 9 pot</label>
              <input className="form-input" type="number" placeholder="$0" value={frontPot} onChange={e => setFrontPot(e.target.value)} />
            </div>
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">Back 9 pot</label>
              <input className="form-input" type="number" placeholder="$0" value={backPot} onChange={e => setBackPot(e.target.value)} />
            </div>
          </div>
          <div className="form-row">
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">Overall pot</label>
              <input className="form-input" type="number" placeholder="$0" value={overallPot} onChange={e => setOverallPot(e.target.value)} />
            </div>
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">Skins pot</label>
              <input className="form-input" type="number" placeholder="$0" value={skinsPot} onChange={e => setSkinsPot(e.target.value)} />
            </div>
          </div>
          {totalAllocated > 0 && (
            <div style={{marginTop:8, fontSize:12, color: potMatch ? 'var(--green)' : 'var(--danger)'}}>
              {potMatch ? '✓ Pot balanced' : `⚠ ${fmt$(totalAllocated)} allocated vs ${fmt$(totalPot)} total`}
            </div>
          )}
        </div>
      )}

      {/* Places toggle per section */}
      {isAdmin && (
        <div className="card">
          <div className="card-title" style={{marginBottom:10}}>Places paid per section</div>
          {[
            {label:'Front 9', val:frontPlaces, set:setFrontPlaces},
            {label:'Back 9', val:backPlaces, set:setBackPlaces},
            {label:'Overall', val:overallPlaces, set:setOverallPlaces},
          ].map(({label,val,set}) => (
            <div key={label} style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
              <span style={{fontSize:13}}>{label}</span>
              <div className="pill-toggle" style={{width:140}}>
                <button className={`pill-opt ${val===1?'active':''}`} onClick={() => set(1)}>1st only</button>
                <button className={`pill-opt ${val===2?'active':''}`} onClick={() => set(2)}>1st + 2nd</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Scores per team */}
      <div className="card">
        <div className="card-title" style={{marginBottom:12}}>Team scores</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 80px 80px 80px', gap:'6px 8px', alignItems:'center'}}>
          <div style={{fontSize:11, color:'var(--text-muted)'}}>Team</div>
          <div style={{fontSize:11, color:'var(--text-muted)', textAlign:'center'}}>Front</div>
          <div style={{fontSize:11, color:'var(--text-muted)', textAlign:'center'}}>Back</div>
          <div style={{fontSize:11, color:'var(--text-muted)', textAlign:'center'}}>Overall</div>
          {teams.map(team => (
            <React.Fragment key={team.id}>
              <div style={{fontSize:13, fontWeight:500}}>{team.name}</div>
              {['front','back','overall'].map(seg => (
                <input key={seg} className="score-input"
                  style={{width:'100%', padding:'6px 4px'}}
                  type="number" placeholder="—"
                  value={(localScores[team.id] || {})[seg] || ''}
                  onChange={e => setLocalScores(prev => ({
                    ...prev,
                    [team.id]: {...(prev[team.id]||{}), [seg]: e.target.value}
                  }))}
                  readOnly={!isAdmin}
                />
              ))}
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* Skin Tapper */}
      <div className="card">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
          <div className="card-title">Skins tapper</div>
          <div style={{fontSize:13, color:'var(--text-muted)'}}>
            {totalSkins} skin{totalSkins !== 1 ? 's' : ''} · {skinsPot ? fmt$(skinsNet > 0 ? skinsNet : 0) + ' pot' : 'enter pot above'}
          </div>
        </div>
        <div className="skin-grid">
          {teams.map(team => (
            <div key={team.id} className={`skin-btn ${(skinCounts[team.id]||0) > 0 ? 'has-skins' : ''}`}
              onClick={() => isAdmin && tapSkin(team.id)}>
              <div className="skin-btn-name">{team.name}</div>
              <div className="skin-btn-count">{skinCounts[team.id] || 0}</div>
              <div className="skin-btn-label">skin{(skinCounts[team.id]||0) !== 1 ? 's' : ''}</div>
              {isAdmin && (skinCounts[team.id]||0) > 0 && (
                <div className="skin-undo" onClick={e => { e.stopPropagation(); untapSkin(team.id); }}>
                  undo last
                </div>
              )}
              {!isAdmin && <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>view only</div>}
            </div>
          ))}
        </div>
        {skinsPot && totalSkins > 0 && skinsNet > 0 && (
          <div className="success-box" style={{marginBottom:0}}>
            {fmt$(perSkin.toFixed(2))} per skin · tournament fund: {fmt$(tournFund)}
          </div>
        )}
      </div>

      {/* Payout Breakdown */}
      {(frontPot || backPot || overallPot || skinsPot) && (
        <div className="card">
          <div className="card-title" style={{marginBottom:12}}>Payout breakdown</div>

          {[
            {label:'Front 9', pot:frontPot, places:frontPlaces, type:'gross/net'},
            {label:'Back 9', pot:backPot, places:backPlaces, type:'net'},
            {label:'Overall', pot:overallPot, places:overallPlaces, type:'net'},
          ].map(({label,pot,places,type}) => pot && parseFloat(pot) > 0 ? (
            <div key={label} style={{marginBottom:12}}>
              <div style={{fontSize:12, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>{label} <span className="badge badge-gray">{type}</span></div>
              {calcPayouts(pot, places).map(({label:pl, amount}) => (
                <div key={pl} className="payout-row">
                  <span className="payout-label">{pl}</span>
                  <span className="payout-amount">{fmt$(amount)}</span>
                </div>
              ))}
            </div>
          ) : null)}

          {skinsPot && parseFloat(skinsPot) > 0 && (
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Skins</div>
              <div className="payout-row">
                <span className="payout-label">Net skins pot ({totalSkins} skins)</span>
                <span className="payout-amount">{fmt$(Math.max(0,skinsNet))}</span>
              </div>
              {totalSkins > 0 && skinsNet > 0 && (
                <div className="payout-row">
                  <span className="payout-label">Per skin</span>
                  <span className="payout-amount">{fmt$(perSkin)}</span>
                </div>
              )}
              <div className="payout-row">
                <span className="payout-label" style={{color:'var(--gold)'}}>→ Tournament fund</span>
                <span className="payout-amount tournament">{fmt$(tournFund)}</span>
              </div>
            </div>
          )}

          <div className="total-row">
            <span>Total pot</span>
            <span style={{color:'var(--green)'}}>{fmt$(totalPot)}</span>
          </div>
        </div>
      )}

      {isAdmin && (
        <button className="btn btn-primary btn-full" onClick={save} style={{marginTop:8}}>
          {saved ? '✓ Saved!' : 'Save scores & payouts'}
        </button>
      )}
    </div>
  );
}

// ── HISTORY VIEW ──────────────────────────────────────────────────────────────
function HistoryView({ history }) {
  const [expanded, setExpanded] = useState(null);

  const rounds = Object.entries(history || {})
    .sort((a,b) => (b[1].date || '').localeCompare(a[1].date || ''));

  if (!rounds.length) return (
    <div className="empty-state">
      {Icons.history}
      <div className="empty-title">No rounds yet</div>
      <p>Completed rounds will appear here.</p>
    </div>
  );

  return (
    <div>
      <div style={{fontSize:14, color:'var(--text-muted)', marginBottom:12}}>{rounds.length} round{rounds.length !== 1 ? 's' : ''} on record</div>
      {rounds.map(([key, round]) => (
        <div key={key} className="history-item">
          <div className="history-header" onClick={() => setExpanded(expanded === key ? null : key)}>
            <div>
              <div className="history-date">{round.day} · {fmtDate(round.date)}</div>
              <div className="history-meta">{round.playerCount || 0} players · {fmt$(round.playerCount * 25)} pot</div>
            </div>
            <span style={{color:'var(--text-muted)', transform: expanded===key ? 'rotate(180deg)' : 'none', display:'inline-block', transition:'transform 0.2s'}}>{Icons.chevron}</span>
          </div>
          {expanded === key && (
            <div className="history-body">
              {/* Teams */}
              {round.teams?.map(team => (
                <div key={team.id} style={{marginBottom:10}}>
                  <div style={{fontSize:13, fontWeight:600, color:'var(--green)', marginBottom:4}}>
                    {team.name} <span style={{fontWeight:400, color:'var(--text-muted)'}}>HCP {team.totalHcp?.toFixed(1)}</span>
                  </div>
                  {team.players?.map((p,i) => (
                    <div key={i} style={{fontSize:12, color:'var(--text-mid)', paddingLeft:8, marginBottom:2}}>
                      <span className="badge badge-gold" style={{marginRight:4, fontSize:10}}>{p.slot}</span>
                      {p.name} · {p.tee} {p.handicap}
                    </div>
                  ))}
                </div>
              ))}
              {/* Scores */}
              {round.scores && (
                <div style={{marginTop:10, paddingTop:10, borderTop:'1px solid var(--border)'}}>
                  <div style={{fontSize:12, fontWeight:600, color:'var(--text-muted)', marginBottom:6}}>Results</div>
                  <div style={{display:'grid', gridTemplateColumns:'1fr repeat(3,60px)', gap:'4px 8px', fontSize:12}}>
                    <div style={{color:'var(--text-muted)'}}>Team</div>
                    <div style={{color:'var(--text-muted)', textAlign:'center'}}>Front</div>
                    <div style={{color:'var(--text-muted)', textAlign:'center'}}>Back</div>
                    <div style={{color:'var(--text-muted)', textAlign:'center'}}>Ovr</div>
                    {round.teams?.map(team => (
                      <React.Fragment key={team.id}>
                        <div style={{fontWeight:500}}>{team.name}</div>
                        <div style={{textAlign:'center'}}>{(round.scores.teamScores?.[team.id]?.front) || '—'}</div>
                        <div style={{textAlign:'center'}}>{(round.scores.teamScores?.[team.id]?.back) || '—'}</div>
                        <div style={{textAlign:'center'}}>{(round.scores.teamScores?.[team.id]?.overall) || '—'}</div>
                      </React.Fragment>
                    ))}
                  </div>
                  {round.scores.skinCounts && (
                    <div style={{marginTop:8, fontSize:12}}>
                      <span style={{color:'var(--text-muted)'}}>Skins: </span>
                      {Object.entries(round.scores.skinCounts).filter(([,c])=>c>0).map(([tid,c]) => {
                        const team = round.teams?.find(t => t.id == tid);
                        return <span key={tid} style={{marginRight:8}}>{team?.name || `Team ${tid}`}: {c}</span>;
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── ADMIN VIEW ────────────────────────────────────────────────────────────────
function AdminView({ isAdmin, onLogin, onLogout, gameData, db, onCreateGame, onArchiveRound, onAddPlayer, rosterWithGuests }) {
  const [password, setPassword] = useState('');
  const [newGame, setNewGame] = useState({day:'Saturday', date: today(), course:'', teetime:''});
  const [newPlayer, setNewPlayer] = useState({name:'', email:''});
  const [showAddPlayer, setShowAddPlayer] = useState(false);
  const [showCreateGame, setShowCreateGame] = useState(false);

  if (!isAdmin) return (
    <div>
      <div className="card">
        <div className="card-title" style={{marginBottom:12}}>Admin login</div>
        <div className="form-group">
          <label className="form-label">Password</label>
          <input className="form-input" type="password" placeholder="Enter admin password"
            value={password} onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && onLogin(password)} />
        </div>
        <button className="btn btn-primary btn-full" onClick={() => onLogin(password)}>Sign in as admin</button>
      </div>
      <div style={{textAlign:'center', fontSize:12, color:'var(--text-muted)', marginTop:12}}>
        Contact Clark for the admin password.
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <span className="admin-badge">ADMIN</span>
          <span style={{fontSize:14, fontWeight:500}}>Control panel</span>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={onLogout}>Sign out</button>
      </div>

      {/* Current game */}
      <div className="card">
        <div className="card-header">
          <div className="card-title">Current game</div>
          <button className="btn btn-primary btn-sm" onClick={() => setShowCreateGame(!showCreateGame)}>
            {Icons.plus} New game
          </button>
        </div>
        {showCreateGame && (
          <div style={{borderTop:'1px solid var(--border)', paddingTop:12}}>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Day</label>
                <select className="form-select" value={newGame.day} onChange={e => setNewGame({...newGame, day:e.target.value})}>
                  <option>Friday</option><option>Saturday</option><option>Sunday</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={newGame.date} onChange={e => setNewGame({...newGame, date:e.target.value})} />
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Course (optional)</label>
                <input className="form-input" placeholder="e.g. Laytonsville" value={newGame.course} onChange={e => setNewGame({...newGame, course:e.target.value})} />
              </div>
              <div className="form-group">
                <label className="form-label">First tee time</label>
                <input className="form-input" placeholder="e.g. 7:30 AM" value={newGame.teetime} onChange={e => setNewGame({...newGame, teetime:e.target.value})} />
              </div>
            </div>
            <div style={{display:'flex', gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={() => { onCreateGame(newGame); setShowCreateGame(false); }}>Create game</button>
              <button className="btn btn-secondary btn-sm" onClick={() => setShowCreateGame(false)}>Cancel</button>
            </div>
          </div>
        )}
        {gameData && !showCreateGame && (
          <div style={{fontSize:14}}>
            <div style={{fontWeight:500, color:'var(--green)'}}>{gameData.day} · {fmtDate(gameData.date)}</div>
            {gameData.course && <div style={{fontSize:12, color:'var(--text-muted)', marginTop:2}}>{gameData.course}</div>}
            <div style={{marginTop:10}}>
              <button className="btn btn-danger btn-sm" onClick={onArchiveRound} style={{marginRight:8}}>
                Archive & close round
              </button>
            </div>
          </div>
        )}
        {!gameData && !showCreateGame && (
          <div style={{fontSize:13, color:'var(--text-muted)'}}>No active game. Create one above.</div>
        )}
      </div>

      {/* Roster management */}
      <div className="card">
        <div className="card-header">
          <div className="card-title">Roster ({rosterWithGuests.filter(p=>!p.isGuest).length} members)</div>
          <button className="btn btn-secondary btn-sm" onClick={() => setShowAddPlayer(!showAddPlayer)}>
            {Icons.plus} Add player
          </button>
        </div>
        {showAddPlayer && (
          <div style={{borderTop:'1px solid var(--border)', paddingTop:12}}>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Name</label>
                <input className="form-input" placeholder="Full name" value={newPlayer.name} onChange={e => setNewPlayer({...newPlayer, name:e.target.value})} />
              </div>
              <div className="form-group">
                <label className="form-label">Email (optional)</label>
                <input className="form-input" placeholder="email" value={newPlayer.email} onChange={e => setNewPlayer({...newPlayer, email:e.target.value})} />
              </div>
            </div>
            <div style={{display:'flex', gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={() => { if(newPlayer.name) { onAddPlayer(newPlayer); setNewPlayer({name:'',email:''}); setShowAddPlayer(false); }}}>Add to roster</button>
              <button className="btn btn-secondary btn-sm" onClick={() => setShowAddPlayer(false)}>Cancel</button>
            </div>
          </div>
        )}
        <div style={{maxHeight:200, overflowY:'auto', marginTop: showAddPlayer ? 8 : 0}}>
          {rosterWithGuests.filter(p => !p.isGuest).map(p => (
            <div key={p.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 0', borderBottom:'1px solid var(--border)', fontSize:13}}>
              <span>{p.name}</span>
              {p.id > 96 && <span className="badge badge-green">New</span>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('signup');
  const [isAdmin, setIsAdmin] = useState(false);
  const [gameData, setGameData] = useState(null);
  const [signups, setSignups] = useState({});
  const [teams, setTeams] = useState([]);
  const [scores, setScores] = useState(null);
  const [history, setHistory] = useState({});
  const [extraPlayers, setExtraPlayers] = useState([]);
  const { ready, read, write, push, remove } = useDB();

  const rosterWithGuests = [...ROSTER, ...extraPlayers];

  // ── Load data ──
  useEffect(() => {
    if (!ready) return;
    const unsubs = [];
    unsubs.push(read('currentGame', val => setGameData(val)));
    unsubs.push(read('signups', val => setSignups(val || {})));
    unsubs.push(read('teams', val => setTeams(val || [])));
    unsubs.push(read('scores', val => setScores(val)));
    unsubs.push(read('history', val => setHistory(val || {})));
    unsubs.push(read('extraPlayers', val => setExtraPlayers(val || [])));
    return () => unsubs.forEach(u => typeof u === 'function' && u());
  }, [ready]);

  // ── Auth ──
  function handleLogin(pw) {
    if (pw === ADMIN_PASSWORD) { setIsAdmin(true); }
    else alert('Wrong password');
  }

  // ── Game management ──
  function createGame(g) {
    write('currentGame', {...g, teamsPublished: false, createdAt: Date.now()});
    write('signups', {});
    write('teams', []);
    write('scores', null);
  }

  function archiveRound() {
    if (!gameData) return;
    if (!window.confirm('Archive this round? It will be saved to history and the game will close.')) return;
    const roundData = {
      ...gameData,
      teams,
      scores,
      playerCount: Object.keys(signups).length,
      archivedAt: Date.now()
    };
    push('history', roundData);
    write('currentGame', null);
    write('signups', {});
    write('teams', []);
    write('scores', null);
  }

  function handleSignup(data) {
    push('signups', data);
  }
  function removeSignup(key) {
    remove(`signups/${key}`);
  }
  function saveTeams(t) {
    write('teams', t);
  }
  function publishTeams() {
    write('teams', teams);
    write('currentGame', {...gameData, teamsPublished: true});
  }
  function saveScores(s) {
    write('scores', s);
  }
  function addPlayer(p) {
    const newP = {...p, id: 100 + extraPlayers.length + 1};
    write('extraPlayers', [...extraPlayers, newP]);
  }

  if (!ready) return (
    <div className="app">
      <div className="header"><div className="header-top"><h1>Clark Golf</h1></div></div>
      <div style={{padding:40, textAlign:'center', color:'var(--text-muted)'}}>Loading...</div>
    </div>
  );

  const tabs = [
    {id:'signup', label:'Sign Up', icon: Icons.golf},
    {id:'teams', label:'Teams', icon: Icons.users},
    {id:'scoring', label:'Scoring', icon: Icons.trophy},
    {id:'history', label:'History', icon: Icons.history},
    {id:'admin', label:'Admin', icon: Icons.settings},
  ];

  return (
    <div className="app">
      <div className="header">
        <div className="header-top">
          <h1>Clark Golf Group</h1>
          {isAdmin && <span className="admin-badge">ADMIN</span>}
        </div>
        <div className="header-sub">
          {gameData ? `${gameData.day} · ${fmtDate(gameData.date)}` : 'No game scheduled'}
        </div>
      </div>
      <nav className="nav">
        {tabs.map(t => (
          <button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
            {t.icon}{t.label}
          </button>
        ))}
      </nav>
      <div className="content">
        {tab === 'signup' && <SignupView game={gameData} signups={signups} onSignup={handleSignup} onRemove={removeSignup} isAdmin={isAdmin} rosterWithGuests={rosterWithGuests} />}
        {tab === 'teams' && <TeamsView game={gameData ? {...gameData, signups} : null} teams={teams} signups={signups} isAdmin={isAdmin} onSaveTeams={saveTeams} onPublish={publishTeams} />}
        {tab === 'scoring' && <ScoringView game={gameData ? {...gameData, signups} : null} teams={teams} scores={scores} onSaveScores={saveScores} isAdmin={isAdmin} />}
        {tab === 'history' && <HistoryView history={history} />}
        {tab === 'admin' && <AdminView isAdmin={isAdmin} onLogin={handleLogin} onLogout={() => setIsAdmin(false)} gameData={gameData} onCreateGame={createGame} onArchiveRound={archiveRound} onAddPlayer={addPlayer} rosterWithGuests={rosterWithGuests} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
