<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Clark Golf Group</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#f1f5f9;color:#0f172a;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
#root{min-height:100%}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}

/* LOADING SPINNER */
.loading-screen{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#10b981;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-brand{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:#fff;margin-top:18px}
.loading-brand em{color:#10b981;font-style:normal}

/* LANDING */
.land{min-height:100vh;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.land-title{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:700;color:#fff;text-align:center;line-height:1.1;margin-bottom:6px}
.land-title em{color:#10b981;font-style:normal}
.land-week{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:44px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
.land-btn{width:100%;padding:18px 20px;border-radius:14px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:12px;transition:all 0.15s;text-align:left}
.land-btn:active{transform:scale(0.98)}
.land-btn-player{background:#10b981;color:#0f172a;border-bottom:3px solid #059669}
.land-btn-admin{background:#dc2626;color:#fff;border:1px solid #b91c1c;border-bottom:3px solid #991b1b}
.land-btn-demo{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.2);margin-top:4px}
.land-btn-demo2{background:rgba(251,191,36,0.18);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);margin-top:4px}
.land-demo-divider{font-size:10px;font-weight:700;color:rgba(255,255,255,0.25);text-align:center;letter-spacing:0.12em;text-transform:uppercase;margin:18px 0 10px}
.land-btn-icon{width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.land-btn-icon svg{width:19px;height:19px}
.land-btn-text{flex:1}
.land-btn-main{font-size:15px;font-weight:700;display:block}
.land-btn-sub{font-size:12px;font-weight:500;opacity:0.55;display:block;margin-top:2px}
.land-arrow{font-size:20px;opacity:0.35}
.pw-box{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:20px}
.pw-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);text-align:center;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.pw-input{width:100%;padding:13px;border-radius:9px;border:1.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:#fff;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;text-align:center;letter-spacing:0.12em;margin-bottom:10px}
.pw-input.err{border-color:#f87171}
.pw-err{color:#f87171;font-size:12px;font-weight:600;text-align:center;margin-bottom:8px}
.pw-row{display:flex;gap:8px}
.pw-go{flex:1;padding:12px;background:#10b981;color:#0f172a;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.pw-back{padding:12px 14px;background:none;border:1px solid rgba(255,255,255,0.14);border-radius:9px;color:rgba(255,255,255,0.45);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}

/* HEADER */
.hdr{background:#0f172a;padding:20px 16px 0;position:relative;overflow:hidden}
.hdr-curve{position:absolute;bottom:-1px;left:0;right:0;height:18px;background:#fff;border-radius:18px 18px 0 0}
.hdr-inner{position:relative;z-index:1;padding-bottom:22px}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.hdr-brand{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;color:#fff;line-height:1.15}
.hdr-brand em{color:#10b981;font-style:normal}
.hdr-week{font-size:11px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:5px}
.admin-tag{background:#f59e0b;color:#0f172a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.demo-tag{background:#10b981;color:#0f172a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.switch-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 9px;color:rgba(255,255,255,0.4);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.hdr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px}
.hdr-stat{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:9px;padding:9px 6px;text-align:center}
.hdr-stat-n{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#10b981}
.hdr-stat-l{font-size:11px;font-weight:600;letter-spacing:0.08em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:2px}
.hdr-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.65)}
.hdr-dot{width:5px;height:5px;border-radius:50%;background:#10b981;flex-shrink:0}

/* NAV */
.nav{background:#fff;display:flex;border-bottom:1px solid #e2e8f0}
.nb{flex:1;padding:12px 2px 10px;background:none;border:none;color:#94a3b8;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:0.06em;text-transform:uppercase;position:relative;transition:color 0.15s}
.nb svg{width:19px;height:19px;flex-shrink:0}
.nb.on{color:#0f172a}
.nb.on::after{content:'';position:absolute;bottom:0;left:18%;right:18%;height:2px;background:#f59e0b;border-radius:2px 2px 0 0}
.nb.locked{opacity:0.3;cursor:not-allowed}
.content{flex:1;padding:18px 14px 56px;line-height:1.5}

/* CARDS */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:10px}
.card-pad{padding:14px}

/* DAY CARDS */
.day-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.day-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px;user-select:none;-webkit-user-select:none}
.day-hdr:active{background:#f8fafc}
.day-left{flex:1;min-width:0}
.day-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#0f172a;letter-spacing:0.01em}
.day-sub{font-size:11px;color:#94a3b8;font-weight:500;margin-top:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tee-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.tee-tag.lottery{background:#fef3c7;color:#d97706}
.tee-tag.set{background:#dcfce7;color:#15803d}
.tee-tag.done{background:#dbeafe;color:#1d4ed8}
.day-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.day-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.day-pill.has{background:#10b981;color:#fff}
.day-pill.none{background:#f1f5f9;color:#94a3b8}
.day-chev{width:15px;height:15px;color:#cbd5e1;transition:transform 0.2s;flex-shrink:0}
.day-chev.open{transform:rotate(180deg)}
.day-body{border-top:1px solid #f1f5f9}

/* PLAYER ROWS */
.p-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid #f8fafc;gap:12px}
.p-row:last-child{border-bottom:none}
.avi{width:36px;height:36px;border-radius:50%;background:#dcfce7;color:#15803d;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.p-name{font-size:14px;font-weight:600;color:#0f172a}
.p-meta{font-size:12px;color:#94a3b8;font-weight:500;display:flex;align-items:center;gap:4px;margin-top:3px}
.tee-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.edit-btn{font-size:10px;color:#94a3b8;background:none;border:none;cursor:pointer;font-weight:600;padding:0 2px;font-family:'DM Sans',sans-serif}
.rm-btn{background:none;border:none;cursor:pointer;color:#cbd5e1;padding:4px;display:flex;flex-shrink:0;margin-left:auto}
.rm-btn:hover{color:#ef4444}
.rm-btn svg{width:14px;height:14px}
.guest-tag{display:inline-block;padding:1px 6px;background:#f1f5f9;color:#64748b;border-radius:20px;font-size:11px;font-weight:500;margin-left:4px}
.team-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:#dcfce7;color:#15803d;font-size:10px;font-weight:700;margin-left:6px;vertical-align:middle}

/* INLINE EDIT */
.ie{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.ie input{width:52px;padding:3px 6px;border:1.5px solid #10b981;border-radius:6px;font-size:12px;font-weight:600;outline:none;font-family:'DM Sans',sans-serif}
.ie select{padding:3px 5px;border:1.5px solid #10b981;border-radius:6px;font-size:11px;font-weight:500;outline:none;font-family:'DM Sans',sans-serif}
.ie-save{font-size:11px;font-weight:700;color:#15803d;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.ie-cancel{font-size:11px;color:#94a3b8;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}

/* SIGNUP BUTTON AREA */
.day-actions{padding:13px 16px;display:flex;gap:8px;align-items:center;border-top:1px solid #f1f5f9}
.signup-btn{padding:11px 18px;background:#10b981;color:#0f172a;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.teeadd-btn{padding:11px 14px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:#475569}

/* STATS ROW */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:#0f172a;border-radius:10px;padding:11px 6px;text-align:center}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:#10b981}
.stat-l{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em}

/* TEAM CARDS */
.team-card{border:1px solid #e2e8f0;border-radius:12px;margin-bottom:10px;overflow:hidden;background:#fff}
.team-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:#0f172a}
.team-nm{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:0.02em}
.team-hcp{font-size:11px;color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:20px;font-weight:600}
.team-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid #f8fafc}
.team-row:last-child{border-bottom:none}
.slot{font-size:10px;font-weight:700;background:#f59e0b;color:#0f172a;padding:2px 6px;border-radius:4px;flex-shrink:0;min-width:20px;text-align:center}

/* SCORE PICKER */
.sc-grid{display:grid;grid-template-columns:1fr 78px 78px 78px;gap:7px;align-items:center}
.sc-hd{font-size:11px;font-weight:700;color:#94a3b8;text-align:center;letter-spacing:0.07em;text-transform:uppercase}
.sp{display:flex;align-items:center;border:1.5px solid #e2e8f0;border-radius:8px;overflow:hidden;background:#f8fafc}
.sp button{background:none;border:none;cursor:pointer;font-size:18px;font-weight:700;color:#475569;padding:6px 10px;line-height:1;flex-shrink:0}
.sp button:hover{background:#e2e8f0}
.sp-val{flex:1;text-align:center;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;min-width:26px}
.sp-val.neg{color:#15803d}
.sp-val.pos{color:#dc2626}
.sp-val.zero{color:#94a3b8}

/* SKINS */
.skin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px}
.skin-btn{padding:16px 8px;border:1.5px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;text-align:center;user-select:none;-webkit-user-select:none;transition:border-color 0.12s}
.skin-btn:active{transform:scale(0.94)}
.skin-btn.on{border-color:#10b981;background:#ecfdf5}
.skin-team{font-size:11px;font-weight:700;color:#64748b;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em}
.skin-num{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:700;color:#0f172a;line-height:1}
.skin-lbl{font-size:10px;color:#94a3b8;margin-top:3px}
.skin-undo{font-size:10px;color:#ef4444;margin-top:4px;cursor:pointer;font-weight:700;text-transform:uppercase}

/* PAYOUTS */
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f8fafc;font-size:13px}
.pay-row:last-child{border-bottom:none}
.pay-lbl{color:#475569;font-weight:500}
.pay-amt{font-weight:600;font-family:'DM Sans',sans-serif;font-size:14px}
.pay-amt.win{color:#15803d}
.pay-amt.tie{color:#f59e0b}
.pay-amt.fund{color:#f59e0b}
.pay-total{display:flex;justify-content:space-between;padding:10px 0 0;font-size:15px;font-weight:600;border-top:2px solid #0f172a;margin-top:4px}

/* HISTORY */
.hi{border:1px solid #e2e8f0;border-radius:12px;margin-bottom:9px;overflow:hidden}
.hi-hdr{padding:12px 14px;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hi-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#0f172a;letter-spacing:0.01em}
.hi-meta{font-size:11px;color:#94a3b8;font-weight:500;margin-top:2px}
.hi-body{padding:13px 14px;border-top:1px solid #f1f5f9}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f8fafc}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:24px;height:24px;border-radius:50%;background:#f1f5f9;color:#64748b;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:"Barlow Condensed",sans-serif}
.lb-rank.top{background:#f59e0b;color:#0f172a}
.lb-name{flex:1;font-size:13px;font-weight:600;color:#0f172a}
.lb-stat{font-size:11px;color:#94a3b8;text-align:right}
.lb-money{font-size:14px;font-weight:700;color:#15803d;font-family:"Barlow Condensed",sans-serif;min-width:48px;text-align:right}

/* ADMIN */
.admin-bar{background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:13px;margin-bottom:10px}
.admin-lbl{font-size:11px;font-weight:600;letter-spacing:0.06em;color:#92400e;text-transform:uppercase;margin-bottom:9px}

/* FORMS */
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;display:block;letter-spacing:0.06em;text-transform:uppercase}
.fi{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:#0f172a;background:#fff;outline:none;transition:border-color 0.15s}
.fi:focus{border-color:#10b981}
.fs{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:#0f172a;background:#fff;outline:none;appearance:none}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sw{position:relative;margin-bottom:8px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#94a3b8}
.si{width:100%;padding:10px 12px 10px 32px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#f8fafc}
.si:focus{border-color:#10b981;background:#fff}

/* TOGGLE */
.tog{display:flex;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:20px;overflow:hidden;padding:3px;margin-bottom:12px}
.tog-opt{flex:1;padding:7px 8px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:#64748b;border-radius:16px;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.03em}
.tog-opt.on{background:#0f172a;color:#fff}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap;letter-spacing:0.01em}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn-green{background:#10b981;color:#0f172a}
.btn-green:hover{background:#34d399}
.btn-dark{background:#0f172a;color:#fff}
.btn-dark:hover{background:#1e293b}
.btn-gold{background:#f59e0b;color:#0f172a}
.btn-gold:hover{background:#fbbf24}
.btn-red{background:#ef4444;color:#fff}
.btn-red:hover{background:#f87171}
.btn-outline{background:#fff;border:1.5px solid #e2e8f0;color:#475569}
.btn-outline:hover{background:#f8fafc}
.btn-sm{padding:6px 11px;font-size:11px}
.btn-xs{padding:4px 9px;font-size:10px}
.btn-full{width:100%}

/* ALERTS */
.alert{border-radius:9px;padding:10px 12px;font-size:13px;margin-bottom:10px;font-weight:500}
.alert-ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#15803d}
.alert-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:flex-end;z-index:200}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:16px 15px 36px;width:100%;max-height:88vh;overflow-y:auto}
.modal-handle{width:34px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 14px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#0f172a;margin-bottom:13px;letter-spacing:0.01em}
.p-pick{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid #f1f5f9;cursor:pointer}
.p-pick:last-child{border-bottom:none}
.p-pick:hover{background:#f8fafc}
.p-pick.sel{background:#ecfdf5}

/* SELECTED PLAYER CHIP */
.sel-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#ecfdf5;border:1.5px solid #10b981;border-radius:10px}
.sel-chip-info{flex:1;min-width:0}
.sel-chip-name{font-size:14px;font-weight:700;color:#0f172a}

function buildTeams(players,perTeam,pinned,pairingCounts){
  perTeam=perTeam||4;
  const n=players.length;if(n<3)return[];
  const numTeams=Math.ceil(n/perTeam);
  const remainder=n%perTeam;
  const slots=['A','B','C','D','E'];
  const teams=Array.from({length:numTeams},(_,i)=>({id:i+1,name:'',players:[],totalHcp:0}));

  // Step 1: Pin approved first/last players
  const pinnedFirst=(pinned||[]).filter(p=>p.pref==='first');
  const pinnedLast=(pinned||[]).filter(p=>p.pref==='last');
  const pinnedNames=new Set((pinned||[]).map(p=>p.name));
  const unpinned=players.filter(p=>!pinnedNames.has(p.name));

  // Place first-group players into Group 1, overflow to Group 2
  pinnedFirst.forEach(pin=>{
    const player=players.find(p=>p.name===pin.name);if(!player)return;
    const target=teams[0].players.length<perTeam?0:(numTeams>1?1:0);
    teams[target].players.push({...player,slot:slots[teams[target].players.length]||'D'});
    teams[target].totalHcp+=parseFloat(player.handicap)||0;
  });

  // Place last-group players into last group, overflow to second-to-last
  pinnedLast.forEach(pin=>{
    const player=players.find(p=>p.name===pin.name);if(!player)return;
    const lastIdx=numTeams-1;
    const lastTarget=(remainder>0?remainder:perTeam);
    const target=teams[lastIdx].players.length<lastTarget?lastIdx:(numTeams>1?lastIdx-1:lastIdx);
    teams[target].players.push({...player,slot:slots[teams[target].players.length]||'D'});
    teams[target].totalHcp+=parseFloat(player.handicap)||0;
  });

  // Step 2: Sort remaining by handicap and snake-draft with history awareness
  const sorted=[...unpinned].sort((a,b)=>parseFloat(a.handicap)-parseFloat(b.handicap));

  sorted.forEach(player=>{
    // Find eligible teams (not full)
    const eligible=teams.map((t,i)=>{
      const target=(remainder>0&&i===numTeams-1)?remainder:perTeam;
      return{idx:i,spotsLeft:target-t.players.length,team:t};
    }).filter(e=>e.spotsLeft>0);

    if(!eligible.length)return;

    if(pairingCounts&&Object.keys(pairingCounts).length>0){
      // Score each team: lower = fewer past pairings with this player
      eligible.forEach(e=>{
        e.pairScore=e.team.players.reduce((sum,tp)=>{
          const key=[player.name,tp.name].sort().join('|');
          return sum+(pairingCounts[key]||0);
        },0);
      });
      // Sort by pair score (least paired first), then by handicap balance
      eligible.sort((a,b)=>a.pairScore-b.pairScore||(a.team.totalHcp-b.team.totalHcp));
    } else {
      // No history: balance by handicap (snake draft)
      eligible.sort((a,b)=>a.team.totalHcp-b.team.totalHcp);
    }

    const ti=eligible[0].idx;
    teams[ti].players.push({...player,slot:slots[teams[ti].players.length]||'D'});
    teams[ti].totalHcp+=parseFloat(player.handicap)||0;
  });

  // Re-sort players within each team by handicap and reassign slots
  teams.forEach(t=>{
    t.players.sort((a,b)=>parseFloat(a.handicap)-parseFloat(b.handicap));
    t.players.forEach((p,i)=>{p.slot=slots[i]||'D';});
  });

  return teams;
}

function getWinners(teams,scores,seg){
  if(!teams||!teams.length)return null;
  const sc=teams.map(t=>({...t,score:parseFloat((scores[t.id]||{})[seg])})).filter(t=>!isNaN(t.score));
  if(!sc.length)return null;sc.sort((a,b)=>a.score-b.score);
  const best=sc[0].score;const tied=sc.filter(t=>t.score===best);const second=sc.find(t=>t.score!==best);
  return{best,tied,second};
}

function buildPayouts(pot,places,teams,scores,seg,custom1,custom2){
  const p=parseFloat(pot||0);if(!p)return[];
  const amt1=parseFloat(custom1)||0;const amt2=parseFloat(custom2)||0;
  const first=amt1>0?amt1:(places===1?p:p*0.6);const second=amt2>0?amt2:p*0.4;
  const w=getWinners(teams,scores,seg);
  if(!w)return places===1?[{label:'1st place',amt:first,teams:[],isTie:false}]:[{label:'1st place',amt:first,teams:[],isTie:false},{label:'2nd place',amt:second,teams:[],isTie:false}];
  const rows=[];
  if(w.tied.length>1){const split=places===1?first/w.tied.length:(first+second)/w.tied.length;rows.push({label:'1st (Tie)',amt:split,teams:w.tied,isTie:true});}
  else{rows.push({label:'1st',amt:first,teams:w.tied,isTie:false});if(places===2&&w.second)rows.push({label:'2nd',amt:second,teams:[w.second],isTie:false});}
  return rows;
}

function ScorePicker({value,onChange,readOnly}){
  const v=(value===''||value===undefined||value===null)?null:parseInt(value);
  const display=v===null?'--':(v>0?'+'+v:String(v));
  const cls=v===null?'zero':v<0?'neg':v>0?'pos':'zero';
  if(readOnly)return<div style={{textAlign:'center',padding:'7px 3px',fontSize:14,fontWeight:700}} className={'sp-val '+cls}>{display}</div>;
  return(<div className="sp"><button onClick={()=>onChange(Math.max(-30,(v===null?0:v)-1))}>-</button><div className={'sp-val '+cls}>{display}</div><button onClick={()=>onChange(Math.min(30,(v===null?0:v)+1))}>+</button></div>);
}

                    const alreadyIn=name&&Object.values(allSignups).some(s=>s.day===d&&s.name===name);
                    const isLocked=week.locked&&week.locked[d];const checked=signupDays[d]||false;
                    return(
                      <div key={d} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 11px',marginBottom:6,borderRadius:9,border:'1.5px solid '+(checked&&!alreadyIn?'#10b981':'#e2e8f0'),background:checked&&!alreadyIn?'#ecfdf5':'#f8fafc',cursor:alreadyIn||isLocked?'default':'pointer',opacity:alreadyIn||isLocked?0.5:1}}
                        onClick={()=>{if(!alreadyIn&&!isLocked)setSignupDays(p=>({...p,[d]:!p[d]}));}}>
                        <div style={{width:18,height:18,borderRadius:4,border:'2px solid',borderColor:checked&&!alreadyIn?'#10b981':'#cbd5e1',background:checked&&!alreadyIn?'#10b981':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          {checked&&!alreadyIn&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 13 4 10"/></svg>}
                        </div>
                        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{d}</div><div style={{fontSize:11,color:'#94a3b8'}}>{week.dates&&week.dates[d]?fmtD(week.dates[d]):''}{alreadyIn?' - already signed up':''}{isLocked&&!alreadyIn?' - locked':''}</div></div>
                      </div>
                    );
                  })}
                </div>
                {/* Tee + HCP */}
                <div className="fr" style={{marginTop:2}}>
                  <div className="fg"><label className="fl">Tees</label><select className="fs" value={tee} onChange={e=>setTee(e.target.value)}>{TEES.map(t=><option key={t}>{t}</option>)}</select></div>
                  <div className="fg">
                    <label className="fl">Handicap{hcpMemory&&!isGuest&&<span style={{fontWeight:400,color:'#10b981',marginLeft:6,textTransform:'none',letterSpacing:0}}>(last: {hcpMemory.hcp})</span>}</label>
                    <input className="fi" type="number" placeholder="e.g. 14" value={hcp} onChange={e=>setHcp(e.target.value)}/>
                  </div>
                </div>
                {/* Tee time preference - optional */}
                {!showTeePref?(
                  <div style={{textAlign:'center',marginBottom:10}}>
                    <button onClick={()=>setShowTeePref(true)} style={{background:'none',border:'none',color:'#94a3b8',fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'DM Sans,sans-serif',padding:'4px 0',textDecoration:'underline',textUnderlineOffset:2}}>Do you need to play in the first or last group?</button>
                  </div>
                ):(
                  <div style={{marginBottom:10,padding:'10px 12px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:9}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#0f172a',marginBottom:6}}>Tee time preference</div>
                    <div style={{display:'flex',gap:6,marginBottom:6}}>
                      <button onClick={()=>setTeePref(teePref==='first'?null:'first')} style={{flex:1,padding:'8px 6px',borderRadius:7,border:'1.5px solid',borderColor:teePref==='first'?'#10b981':'#e2e8f0',background:teePref==='first'?'#ecfdf5':'#fff',color:teePref==='first'?'#15803d':'#475569',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>First group</button>
                      <button onClick={()=>setTeePref(teePref==='last'?null:'last')} style={{flex:1,padding:'8px 6px',borderRadius:7,border:'1.5px solid',borderColor:teePref==='last'?'#10b981':'#e2e8f0',background:teePref==='last'?'#ecfdf5':'#fff',color:teePref==='last'?'#15803d':'#475569',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>Last group</button>
                    </div>
                    <div style={{fontSize:10,color:'#94a3b8',textAlign:'center'}}>Tee time requests require admin approval</div>
                  </div>
                )}
                <SignupConfirmBtn isGuest={isGuest} gname={gname} sel={sel} activeDays={activeDays} signupDays={signupDays} allSignups={allSignups} hcp={hcp} onConfirm={doSignup}/>
              </div>
            )}
          </div>
        </div>
      )}

      {teeModal&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setTeeModal(null);}}>
          <div className="modal"><div className="modal-handle"></div><div className="modal-title">Add tee time - {teeModal}</div>
            <div className="fg" style={{marginBottom:14}}><div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#f8fafc',borderRadius:9,border:'1.5px solid '+(isLottery?'#f59e0b':'#e2e8f0'),cursor:'pointer'}} onClick={()=>setIsLottery(!isLottery)}><div style={{width:19,height:19,borderRadius:4,border:'2px solid',borderColor:isLottery?'#f59e0b':'#cbd5e1',background:isLottery?'#f59e0b':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{isLottery&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 13 4 10"/></svg>}</div><div><div style={{fontSize:13,fontWeight:600,color:'#0f172a'}}>Waiting on lottery</div><div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>Check if time not yet confirmed</div></div></div></div>
            <div className="fg"><label className="fl">{isLottery?'Requested time':'Tee time'}</label><TimePicker onChange={setNewTime}/></div>
            <button className="btn btn-green btn-full" onClick={()=>{onUpdateTeeTime(teeModal,{time:isLottery?'LOTTERY':newTime,lottery:isLottery});setTeeModal(null);}}>Save</button>
          </div>
        </div>
      )}

      {editTeeModal&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setEditTeeModal(null);}}>
          <div className="modal"><div className="modal-handle"></div><div className="modal-title">Update tee time - {editTeeModal}</div>
            <div className="alert alert-blue" style={{marginBottom:12}}>Enter the confirmed tee time.</div>
            <div className="fg"><label className="fl">Confirmed time</label><TimePicker onChange={setNewTime}/></div>
            <button className="btn btn-gold btn-full" onClick={()=>{onUpdateTeeTime(editTeeModal,{time:newTime,lottery:false});setEditTeeModal(null);}}>Update</button>
          </div>
        </div>
      )}

      {toast&&(<div className="toast"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="3"><polyline points="20 6 9 13 4 10"/></svg>{toast}</div>)}
    </div>
  );
}

function PaidBtn({name,isAdmin,myName,week,activeDay,onUpdatePaid}){
  const paid=!!(week&&week.paid&&week.paid[activeDay]&&week.paid[activeDay][name]);
  const canMark=isAdmin||(myName===name);
  const bg=paid?'#ecfdf5':'#fff';const clr=paid?'#15803d':'#94a3b8';const bc=paid?'#10b981':'#e2e8f0';
  return(<button onClick={()=>{if(canMark)onUpdatePaid(activeDay,name,!paid);}} style={{flexShrink:0,marginLeft:6,padding:'5px 10px',borderRadius:20,border:'1.5px solid '+bc,background:bg,color:clr,fontSize:11,fontWeight:700,cursor:canMark?'pointer':'default',opacity:canMark?1:0.5}}>{paid?'Paid':'Paid?'}</button>);
}

function PaymentBar({display,week,activeDay,showPaid,onToggle}){
  const allPlayers=safeArray(display).flatMap(t=>safeArray(t.players));
  const paidCount=allPlayers.filter(p=>(week&&week.paid&&week.paid[activeDay]&&week.paid[activeDay][p.name])).length;
  const total=allPlayers.length;

}

function TeamsView({week,history,isAdmin,onSaveTeams,onPublishAndLock,onUnpublish,onEditInPlace,myName}){
  const [activeDay,setActiveDay]=useState(null);const [editTeams,setEditTeams]=useState(null);const [drag,setDrag]=useState(null);
  const [editKey,setEditKey]=useState(null);const [editVal,setEditVal]=useState({hcp:'',tee:'Whites'});
  const [blindModal,setBlindModal]=useState(null);const [copied,setCopied]=useState(false);
  const [manualMode,setManualMode]=useState(false);
  const [teamSize,setTeamSize]=useState('4');
  const [manualTeams,setManualTeams]=useState(null);
  const [pickingTeam,setPickingTeam]=useState(null);
  const [pickQ,setPickQ]=useState('');
  const [showAutoOpts,setShowAutoOpts]=useState(false);
  const [autoSize,setAutoSize]=useState('4');
  const [movingPlayer,setMovingPlayer]=useState(null);
  const [approvals,setApprovals]=useState({}); // {signupKey: true/false} // {ti, pi, name}
  const activeDays=sortDays(safeArray(week?.activeDays));
  useEffect(()=>{if(!activeDay&&activeDays.length>0)setActiveDay(activeDays[0]);},[activeDays.join(',')]);
  if(!week||activeDays.length===0)return<div className="empty"><div className="empty-title">No active games</div></div>;

  const daySignups=Object.entries((week.signups)||{}).filter(([,s])=>s.day===activeDay).map(([,s])=>s);
  const daySignupsKeyed=Object.entries((week.signups)||{}).filter(([,s])=>s.day===activeDay);
  const savedTeams=safeArray(week?.teams?.[activeDay]);const display=editTeams||manualTeams||savedTeams;
  const cnt=daySignups.length;const published=(week.teamsPublished&&week.teamsPublished[activeDay])||false;

  // Tee time requests for this day
  const teeRequests=daySignupsKeyed.filter(([,s])=>s.teePreference);

  // Compute pairing counts from history
  const pairingCounts=useMemo(()=>{
    const counts={};
    const rounds=Object.values(history||{});
    rounds.forEach(r=>{
      if(!r.teams)return;
      safeArray(r.teams).forEach(t=>{
        const names=safeArray(t.players).map(p=>p.name);
        for(let i=0;i<names.length;i++){
          for(let j=i+1;j<names.length;j++){
            const key=[names[i],names[j]].sort().join('|');
            counts[key]=(counts[key]||0)+1;
          }
        }
      });
    });
    return counts;
  },[history]);

  // All assigned player names across current teams
  const assignedNames=new Set(display.flatMap(t=>safeArray(t.players).map(p=>p.name)));
  const unassigned=daySignups.filter(p=>!assignedNames.has(p.name));

  function copyTeams(){
    if(!display.length)return;const teeInfo=week&&week.teeTimes&&week.teeTimes[activeDay];
    const teeStr=teeInfo?'First Tee: '+(teeInfo.lottery?'Lottery':teeInfo.time):'';
    const dateStr=week&&week.dates&&week.dates[activeDay]?fmtD(week.dates[activeDay]):'';
    const nl=String.fromCharCode(10);let text=activeDay+(dateStr?' - '+dateStr:'')+(teeStr?' | '+teeStr:'')+nl+nl;
    display.forEach((team,i)=>{const tName=published?team.name:'Group '+(i+1);text+=tName+nl;safeArray(team.players).forEach(p=>{text+='  '+p.slot+'. '+p.name+' (HCP '+p.handicap+')'+nl;});text+=nl;});
    navigator.clipboard.writeText(text.trim()).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}).catch(()=>{});
  }
  function gen(size){
    if(daySignups.length<3)return;
    const s=parseInt(size||autoSize)||4;
    const pinned=teeRequests.filter(([k,])=>approvals[k]).map(([,sig])=>({name:sig.name,pref:sig.teePreference}));
    setManualTeams(null);setManualMode(false);
    setEditTeams(buildTeams(daySignups,s,pinned,pairingCounts));
    setShowAutoOpts(false);
  }
  function moveTeam(fromIdx,toIdx){if(fromIdx===toIdx)return;const base=editTeams||manualTeams||savedTeams;const reordered=[...base];const[moved]=reordered.splice(fromIdx,1);reordered.splice(toIdx,0,moved);if(manualMode)setManualTeams(reordered);else setEditTeams(reordered);}
  function drop(ti,pi){if(!drag||!isAdmin||published)return;const u=(editTeams||manualTeams||savedTeams).map(t=>({...t,players:[...t.players]}));const p=u[drag.ti].players[drag.pi];u[drag.ti].players.splice(drag.pi,1);u[ti].players.splice(pi,0,p);u.forEach(t=>{t.players.forEach((p,i)=>{p.slot=['A','B','C','D'][i]||'D';});t.totalHcp=t.players.reduce((s,p)=>s+parseFloat(p.handicap||0),0);});if(manualMode)setManualTeams(u);else setEditTeams(u);setDrag(null);}
  function savePlayerEdit(ti,pi){const u=(editTeams||manualTeams||savedTeams).map(t=>({...t,players:[...t.players]}));if(editVal.hcp!=='')u[ti].players[pi].handicap=parseFloat(editVal.hcp);u[ti].players[pi].tee=editVal.tee;u[ti].totalHcp=u[ti].players.reduce((s,p)=>s+parseFloat(p.handicap||0),0);if(manualMode)setManualTeams(u);else if(editTeams)setEditTeams(u);else onSaveTeams(activeDay,u);setEditKey(null);}
  function publishAndLock(){const names=['Team One','Team Two','Team Three','Team Four','Team Five','Team Six','Team Seven','Team Eight'];const final=(editTeams||manualTeams||savedTeams).map((t,i)=>({...t,name:names[i]||'Team '+(i+1)}));onPublishAndLock(activeDay,final);setEditTeams(null);setManualTeams(null);setManualMode(false);}

  // Manual team building
  function startManual(){
    const size=parseInt(teamSize)||4;
    const numTeams=Math.ceil(cnt/size);
    const teams=Array.from({length:numTeams},(_,i)=>({id:i+1,name:'',players:[],totalHcp:0}));
    setManualTeams(teams);setManualMode(true);setEditTeams(null);setPickingTeam(null);
  }
  function addPlayerToTeam(ti,signup){
    const u=manualTeams.map(t=>({...t,players:[...t.players]}));
    const slot=['A','B','C','D'][u[ti].players.length]||'D';
    u[ti].players.push({...signup,slot});
    u[ti].totalHcp=u[ti].players.reduce((s,p)=>s+parseFloat(p.handicap||0),0);
    setManualTeams(u);
  }
  function removePlayerFromTeam(ti,pi){
    const u=manualTeams.map(t=>({...t,players:[...t.players]}));
    u[ti].players.splice(pi,1);
    u[ti].players.forEach((p,i)=>{p.slot=['A','B','C','D'][i]||'D';});
    u[ti].totalHcp=u[ti].players.reduce((s,p)=>s+parseFloat(p.handicap||0),0);
    setManualTeams(u);
  }

  function movePlayerToTeam(fromTi,fromPi,toTi){
    const u=(editTeams||manualTeams||savedTeams).map(t=>({...t,players:[...t.players]}));
    const p=u[fromTi].players.splice(fromPi,1)[0];
    u[toTi].players.push(p);
    u.forEach(t=>{t.players.forEach((pl,i)=>{pl.slot=['A','B','C','D','E'][i]||'D';});t.totalHcp=t.players.reduce((s,pl)=>s+parseFloat(pl.handicap||0),0);});
    if(manualMode)setManualTeams(u);else setEditTeams(u);
    setMovingPlayer(null);
  }

  const currentDisplay=display;

  return(
    <div>
      {activeDays.length>1&&(<div className="tog" style={{marginBottom:12}}>{activeDays.map(d=><button key={d} className={'tog-opt'+(activeDay===d?' on':'')} onClick={()=>{setActiveDay(d);setEditTeams(null);setManualTeams(null);setManualMode(false);setEditKey(null);}}>{d.slice(0,3)}</button>)}</div>)}
      <div className="stat-row"><div className="stat-box"><div className="stat-n">{cnt}</div><div className="stat-l">Players</div></div><div className="stat-box"><div className="stat-n">{currentDisplay.length}</div><div className="stat-l">Teams</div></div><div className="stat-box"><div className="stat-n" style={{fontSize:11,paddingTop:5,color:'rgba(255,255,255,0.4)'}}>{published?'Live':'Pending'}</div><div className="stat-l">Status</div></div></div>

      {/* ADMIN TEAM BUILDER - shows whenever admin + not published */}
      {isAdmin&&!published&&(
        <div className="admin-bar">
          <div className="admin-lbl">Team builder - {activeDay} ({cnt} players signed up)</div>

          {/* Tee time request approvals */}
          {teeRequests.length>0&&!editTeams&&currentDisplay.length===0&&(
            <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:8,padding:12,marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:'#0f172a',marginBottom:6,display:'flex',alignItems:'center',gap:6}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Tee Time Requests ({teeRequests.length})
              </div>
              <div style={{fontSize:11,color:'#94a3b8',marginBottom:8}}>Approve or deny before generating teams</div>
              {teeRequests.map(([key,s])=>(
                <div key={key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid #f8fafc'}}>
                  <div>
                    <span style={{fontSize:13,fontWeight:600}}>{s.name}</span>
                    <span style={{display:'inline-block',padding:'1px 6px',background:s.teePreference==='first'?'#dbeafe':'#fef3c7',color:s.teePreference==='first'?'#1d4ed8':'#d97706',borderRadius:20,fontSize:10,fontWeight:600,marginLeft:6}}>{s.teePreference==='first'?'First group':'Last group'}</span>
                  </div>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={()=>setApprovals(a=>({...a,[key]:true}))} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:approvals[key]===true?'#10b981':'#e2e8f0',background:approvals[key]===true?'#ecfdf5':'#fff',color:approvals[key]===true?'#15803d':'#64748b',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
                      {approvals[key]===true?'✓ Approved':'Approve'}
                    </button>
                    <button onClick={()=>setApprovals(a=>({...a,[key]:false}))} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:approvals[key]===false?'#fecaca':'#e2e8f0',background:approvals[key]===false?'#fef2f2':'#fff',color:approvals[key]===false?'#dc2626':'#94a3b8',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
                      {approvals[key]===false?'Denied':'Deny'}
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Mode toggle: Auto vs Manual */}
          {!manualMode&&!editTeams&&currentDisplay.length===0&&(
            <div>
              {!showAutoOpts?(
                <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:10}}>
                  <button className="btn btn-dark btn-sm" onClick={()=>setShowAutoOpts(true)} disabled={cnt<3}>Auto-generate</button>
                  <button className="btn btn-outline btn-sm" onClick={()=>setManualMode(true)}>Manual build</button>
                </div>
              ):(
                <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:8,padding:12,marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>How many players per team?</div>
                  <div style={{display:'flex',gap:6,marginBottom:10}}>
                    {['3','4','5'].map(n=>{
                      const numTeams=Math.ceil(cnt/parseInt(n));
                      const remainder=cnt%parseInt(n);
                      return(
                        <button key={n} onClick={()=>setAutoSize(n)} style={{padding:'10px 14px',borderRadius:8,border:'1.5px solid',borderColor:autoSize===n?'#10b981':'#e2e8f0',background:autoSize===n?'#ecfdf5':'#fff',color:autoSize===n?'#15803d':'#475569',fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans,sans-serif',flex:1,textAlign:'center'}}>
                          {n}
                          <div style={{fontSize:10,fontWeight:500,marginTop:2,color:autoSize===n?'#15803d':'#94a3b8'}}>{numTeams} team{numTeams!==1?'s':''}</div>
                        </button>
                      );
                    })}
                  </div>

            {hasBlind&&!blindDraw&&team.players.length>0&&(<div style={{padding:'10px 13px',background:'#fffbeb',borderTop:'1px solid #fde68a',display:'flex',alignItems:'center',justifyContent:'space-between'}}><div><div style={{fontSize:13,fontWeight:600,color:'#d97706'}}>Blind Draw TBD</div><div style={{fontSize:11,color:'#92400e',marginTop:1}}>Assign on the day</div></div>{isAdmin&&!published&&<button className="btn btn-gold btn-xs" onClick={()=>setBlindModal({teamIdx:ti,teamId:team.id})}>Assign</button>}</div>)}

function ScoringView({week,isAdmin,onSaveScoresAndPayouts,onMoveToHistory,onReopenDay,isDemo,onUpdatePaid,myName}){

  const [fv,setFv]=useState('');const [bv,setBv]=useState('');const [ov,setOv]=useState('');const [sv,setSv]=useState('');

  const [drawAdj,setDrawAdj]=useState('');const [showDrawAdj,setShowDrawAdj]=useState(false);const [showPaid,setShowPaid]=useState(false);
  const [f1v,setF1v]=useState('');const [f2v,setF2v]=useState('');const [b1v,setB1v]=useState('');const [b2v,setB2v]=useState('');

  useEffect(()=>{
    if(!activeDay)return;const sc=(week&&week.scores&&week.scores[activeDay])||{};
    setTs(sc.teamScores||{});setSk(sc.skinCounts||{});
    setFv(sc.frontPot!==undefined?String(sc.frontPot):'');setBv(sc.backPot!==undefined?String(sc.backPot):'');
    setOv(sc.overallPot!==undefined?String(sc.overallPot):'');setSv(sc.skinsPot!==undefined?String(sc.skinsPot):'');
    setFp(sc.frontPlaces||1);setBp(sc.backPlaces||1);setOp(sc.overallPlaces||1);
    setDrawAdj(sc.drawAdj!==undefined?String(sc.drawAdj):'');
    setF1v(sc.f1!==undefined?String(sc.f1):'');setF2v(sc.f2!==undefined?String(sc.f2):'');
    setB1v(sc.b1!==undefined?String(sc.b1):'');setB2v(sc.b2!==undefined?String(sc.b2):'');
    setO1v(sc.o1!==undefined?String(sc.o1):'');setO2v(sc.o2!==undefined?String(sc.o2):'');
    setJustSaved(false);
  },[activeDay,forceRefresh]);
  if(!week||activeDays.length===0)return<div className="empty"><div className="empty-title">No active games</div></div>;
  const dayTeams=safeArray(week?.teams?.[activeDay]);const daySignups=Object.values(week.signups||{}).filter(s=>s.day===activeDay);
  const pc=daySignups.length;const pot=calcPot(pc);const dayScores=(week.scores&&week.scores[activeDay])||{};
  const scoresSaved=!!dayScores.savedAt;const payoutsCalculated=!!dayScores.payoutsCalculated;const dayComplete=!!(week.complete&&week.complete[activeDay]);
  const alloc=parseFloat(fv||0)+parseFloat(bv||0)+parseFloat(ov||0)+parseFloat(sv||0);const ok=pc>0&&Math.abs(alloc-pot.total)<0.01;
  const snet=Math.max(0,parseFloat(sv||0)-pc);const tsk=Object.values(sk).reduce((s,c)=>s+c,0);const perSk=tsk>0?snet/tsk:0;
  function tap(id){if(!isAdmin)return;setSk(p=>({...p,[id]:(p[id]||0)+1}));}
  function untap(id){setSk(p=>({...p,[id]:Math.max(0,(p[id]||0)-1)}));}
  function handleSaveAndPublish(){const da=parseFloat(drawAdj)||0;const data={teamScores:ts,skinCounts:sk,frontPot:parseFloat(fv)||0,backPot:parseFloat(bv)||0,overallPot:parseFloat(ov)||0,skinsPot:parseFloat(sv)||0,frontPlaces:fp,backPlaces:bp,overallPlaces:op,f1:parseFloat(f1v)||0,f2:parseFloat(f2v)||0,b1:parseFloat(b1v)||0,b2:parseFloat(b2v)||0,o1:parseFloat(o1v)||0,o2:parseFloat(o2v)||0,tournFund:pc,playerCount:pc,drawAdj:da,savedAt:Date.now(),payoutsCalculated:true,payoutsAt:Date.now()};onSaveScoresAndPayouts(activeDay,data);setJustSaved(true);setTimeout(()=>setJustSaved(false),2500);}
  function autoPot(){setFv(String(pot.front));setBv(String(pot.back));setOv(String(pot.overall));setSv(String(pot.skins));}
  const showPayouts=payoutsCalculated||(isAdmin&&(fv||bv||ov||sv));

  return(
    <div>

        {showDrawAdj&&(<div style={{display:'flex',gap:8,alignItems:'flex-end'}}><div style={{flex:1}}><label className="fl">Reduce pot by ($)</label><input className="fi" type="number" placeholder="e.g. 25" value={drawAdj} onChange={e=>setDrawAdj(e.target.value)}/></div><div style={{paddingBottom:1}}><button className="btn btn-gold btn-sm" onClick={()=>{setDrawAdj('25');setShowDrawAdj(false);}}>-1 player</button></div></div>)}

        </div>
      </div>)}
      {isAdmin&&(<div className="card card-pad" style={{marginBottom:10}}><div className="slbl">Payout splits</div>
        {[{l:'Front 9',pot:fv,v:fp,s:setFp,f1:f1v,sf1:setF1v,f2:f2v,sf2:setF2v},{l:'Back 9',pot:bv,v:bp,s:setBp,f1:b1v,sf1:setB1v,f2:b2v,sf2:setB2v},{l:'Overall',pot:ov,v:op,s:setOp,f1:o1v,sf1:setO1v,f2:o2v,sf2:setO2v}].map(({l,pot,v,s,f1,sf1,f2,sf2})=>{const p=parseFloat(pot||0);return(<div key={l} style={{marginBottom:12,paddingBottom:12,borderBottom:'1px solid #f1f5f9'}}><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}><span style={{fontSize:13,fontWeight:600}}>{l}{p>0?' - '+f$(p):''}</span><div className="tog" style={{width:155,marginBottom:0}}><button className={'tog-opt'+(v===1?' on':'')} onClick={()=>s(1)}>1st only</button><button className={'tog-opt'+(v===2?' on':'')} onClick={()=>s(2)}>1st + 2nd</button></div></div>{p>0&&(<div className="fr" style={{gap:8}}><div className="fg" style={{marginBottom:0}}><label className="fl">1st place $</label><input className="fi" type="number" placeholder={v===1?f$(p):f$(p*0.6)} value={f1} onChange={e=>sf1(e.target.value)}/></div>{v===2&&(<div className="fg" style={{marginBottom:0}}><label className="fl">2nd place $</label><input className="fi" type="number" placeholder={f$(p*0.4)} value={f2} onChange={e=>sf2(e.target.value)}/></div>)}</div>)}</div>);})}
      </div>)}
      {(isAdmin||scoresSaved)&&(<div className="card card-pad" style={{marginBottom:10}}><div className="slbl">Team scores - {activeDay}</div><div className="sc-grid" style={{marginBottom:8}}><div></div><div className="sc-hd">Front</div><div className="sc-hd">Back</div><div className="sc-hd">Overall</div></div>{dayTeams.map((t,ti)=>(<div key={t.id||ti} className="sc-grid" style={{marginBottom:10,alignItems:'center'}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:4}}><span style={{fontSize:12,fontWeight:600,color:'#0f172a'}}>{t.name||('Group '+(ti+1))}</span><div style={{fontSize:10,fontWeight:400,color:'#94a3b8'}}>- {teamLabel(t)}</div></div>{['front','back','overall'].map(seg=>(<ScorePicker key={seg} value={ts[t.id]?ts[t.id][seg]:undefined} readOnly={!isAdmin} onChange={v=>setTs(p=>({...p,[t.id]:{...(p[t.id]||{}),[seg]:v}}))}/>))}</div>))}{!dayTeams.length&&<div style={{textAlign:'center',color:'#94a3b8',fontSize:13,padding:'8px 0'}}>Teams not published yet</div>}</div>)}
      {(isAdmin||scoresSaved)&&dayTeams.length>0&&(<div className="card card-pad" style={{marginBottom:10}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:11}}><div className="slbl" style={{marginBottom:0}}>Skins tapper</div><div style={{fontSize:11,color:'#94a3b8',fontWeight:500}}>{tsk} skin{tsk!==1?'s':''}{sv?' - '+f$(snet)+' net':''}</div></div><div className="skin-grid">{dayTeams.map((t,ti)=>(<div key={t.id||ti} className={'skin-btn'+((sk[t.id]||0)>0?' on':'')} onClick={()=>tap(t.id)}><div className="skin-team">{t.name||('Group '+(ti+1))}</div><div className="skin-num">{sk[t.id]||0}</div><div className="skin-lbl">skin{(sk[t.id]||0)!==1?'s':''}</div>{isAdmin&&(sk[t.id]||0)>0&&<div className="skin-undo" onClick={e=>{e.stopPropagation();untap(t.id);}}>- undo</div>}</div>))}</div>{sv&&snet>0&&<div className="alert alert-ok">Tournament fund: {f$(pc)} - Net skins: {f$(snet)}{tsk>0?' - '+f$(perSk.toFixed(2))+' per skin':''}</div>}</div>)}
      {showPayouts&&(fv||bv||ov||sv)&&(<div className="card card-pad" style={{marginBottom:10}}><div className="slbl">Payout breakdown{!payoutsCalculated&&isAdmin?<span style={{fontWeight:400,fontSize:9,marginLeft:5,color:'#94a3b8'}}>(preview)</span>:''}</div>
        {[{l:'Front 9',pot:fv,pl:fp,seg:'front'},{l:'Back 9',pot:bv,pl:bp,seg:'back'},{l:'Overall',pot:ov,pl:op,seg:'overall'}].map(({l,pot,pl,seg})=>{const rows=buildPayouts(pot,pl,dayTeams,ts,seg,seg==='front'?f1v:seg==='back'?b1v:o1v,seg==='front'?f2v:seg==='back'?b2v:o2v);if(!rows.length)return null;return(<div key={l} style={{marginBottom:13}}><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.08em'}}>{l}</div>{rows.map((row,i)=>(<div key={i} className="pay-row"><span className="pay-lbl">{row.label}{row.teams&&row.teams.length>0?' - '+row.teams.map(t=>t.name).join(' & '):''}{row.isTie&&<span style={{marginLeft:5,fontSize:10,color:'#f59e0b',fontWeight:700}}>SPLIT</span>}</span><span className={'pay-amt '+(row.isTie?'tie':'win')}>{f$(row.amt)}{row.isTie?' ea':''}</span></div>))}</div>);})}
        {parseFloat(sv||0)>0&&(<div style={{marginBottom:13}}><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.08em'}}>Skins</div><div className="pay-row"><span className="pay-lbl">Net skins pot</span><span className="pay-amt win">{f$(snet)}</span></div>{tsk>0&&<div className="pay-row"><span className="pay-lbl">Per skin ({tsk} total)</span><span className="pay-amt win">{f$(perSk.toFixed(2))}</span></div>}{Object.entries(sk).filter(([,c])=>c>0).map(([tid,c])=>{const t=dayTeams.find(t=>String(t.id)===String(tid));return t?<div key={tid} className="pay-row"><span className="pay-lbl" style={{paddingLeft:8}}>{t.name} - {c} skin{c!==1?'s':''}</span><span className="pay-amt win">{f$(c*perSk)}</span></div>:null;})}<div className="pay-row"><span className="pay-lbl" style={{color:'#f59e0b'}}>Tournament fund</span><span className="pay-amt tie">{f$(pc)}</span></div></div>)}
        {parseFloat(drawAdj||0)>0&&(<div className="pay-row" style={{color:'#d97706'}}><span className="pay-lbl" style={{color:'#d97706'}}>Manual pot adjustment</span><span className="pay-amt tie">-{f$(drawAdj)}</span></div>)}
        <div className="pay-total"><span>Total pot</span><span style={{color:'#15803d'}}>{f$(pc*25-(parseFloat(drawAdj)||0))}</span></div>
      </div>)}
      {isAdmin&&!isDemo&&(<div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}><button className="btn btn-dark btn-full" onClick={handleSaveAndPublish}>{scoresSaved?'Update & Publish Results':'Save & Publish Results'}</button>{justSaved&&<div className="alert alert-ok" style={{marginBottom:0}}>Saved - players can see scores and payouts.</div>}{scoresSaved&&(<button className="btn btn-outline btn-full" onClick={()=>onMoveToHistory(activeDay)}>Move to History</button>)}{scoresSaved&&(<button className="btn btn-outline btn-sm" style={{alignSelf:'flex-start'}} onClick={()=>onReopenDay(activeDay)}>Edit Scores</button>)}</div>)}
    </div>
  );
}

// -- HISTORY VIEW -------------------------------------------------------------
function HistoryView({history,isAdmin,onDelete,onClearAll,onEditRound}){
  const [open,setOpen]=useState(null);const [view,setView]=useState('rounds');
  const rounds=Object.entries(history||{}).sort((a,b)=>(b[1].date||'').localeCompare(a[1].date||''));
  const leaderboard=useMemo(()=>{
    const players={};
    rounds.forEach(([,r])=>{if(!r.teams||!r.scores)return;const pc=r.playerCount||0;
      r.teams.forEach(team=>{safeArray(team.players).forEach(p=>{if(!players[p.name])players[p.name]={name:p.name,rounds:0,won:0};players[p.name].rounds++;});});
      [{seg:'front',pot:r.scores.frontPot,pl:r.scores.frontPlaces||1},{seg:'back',pot:r.scores.backPot,pl:r.scores.backPlaces||1},{seg:'overall',pot:r.scores.overallPot,pl:r.scores.overallPlaces||1}].forEach(({seg,pot:segPot,pl})=>{
        const p=parseFloat(segPot||0);if(!p)return;
        const sc=r.teams.map(t=>({...t,score:parseFloat((r.scores.teamScores&&r.scores.teamScores[t.id]?r.scores.teamScores[t.id][seg]:NaN))})).filter(t=>!isNaN(t.score));if(!sc.length)return;
        sc.sort((a,b)=>a.score-b.score);const best=sc[0].score;const tied=sc.filter(t=>t.score===best);const second=sc.find(t=>t.score!==best);
        const first=pl===1?p:p*0.6;const sec=p*0.4;
        if(tied.length>1){const split=pl===1?first/tied.length:(first+sec)/tied.length;tied.forEach(t=>safeArray(t.players).forEach(p=>{if(players[p.name])players[p.name].won+=split/safeArray(t.players).length;}));}
        else{safeArray(tied[0].players).forEach(p=>{if(players[p.name])players[p.name].won+=first/safeArray(tied[0].players).length;});if(pl===2&&second)safeArray(second.players).forEach(p=>{if(players[p.name])players[p.name].won+=sec/safeArray(second.players).length;});}
      });
      const snet=Math.max(0,parseFloat(r.scores.skinsPot||0)-(r.scores.tournFund||0));const tsk=Object.values(r.scores.skinCounts||{}).reduce((s,x)=>s+x,0);
      if(tsk>0){Object.entries(r.scores.skinCounts||{}).forEach(([tid,cnt])=>{if(!cnt)return;const team=r.teams.find(t=>String(t.id)===String(tid));if(!team)return;safeArray(team.players).forEach(p=>{if(players[p.name])players[p.name].won+=(snet/tsk*cnt)/safeArray(team.players).length;});});}
    });return Object.values(players).sort((a,b)=>b.won-a.won);
  },[rounds.length]);

  if(!rounds.length)return(<div className="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div className="empty-title">No rounds yet</div><div className="empty-sub">Completed rounds appear here.</div></div>);

  function calcHistPay(scores,teams,pot,places,seg){const p=parseFloat(pot||0);if(!p||!teams)return[];const sc=teams.map(t=>({...t,score:parseFloat((scores.teamScores&&scores.teamScores[t.id]?scores.teamScores[t.id][seg]:NaN))})).filter(t=>!isNaN(t.score));if(!sc.length)return[];sc.sort((a,b)=>a.score-b.score);const best=sc[0].score;const tied=sc.filter(t=>t.score===best);const second=sc.find(t=>t.score!==best);const rows=[];if(tied.length>1){const split=places===1?p/tied.length:(p*0.6+p*0.4)/tied.length;rows.push({label:'1st Tie',names:tied.map(t=>t.name).join(' & '),amt:split,isTie:true});}else{rows.push({label:'1st',names:tied[0]?tied[0].name:'',amt:places===1?p:p*0.6,isTie:false});if(places===2&&second)rows.push({label:'2nd',names:second.name,amt:p*0.4,isTie:false});}return rows;}

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div className="tog" style={{marginBottom:0,flex:1,marginRight:10}}><button className={'tog-opt'+(view==='rounds'?' on':'')} onClick={()=>setView('rounds')}>Rounds</button><button className={'tog-opt'+(view==='leaders'?' on':'')} onClick={()=>setView('leaders')}>Leaderboard</button></div>
        {isAdmin&&view==='rounds'&&rounds.length>0&&<button className="btn btn-red btn-xs" onClick={onClearAll}>Clear all</button>}
      </div>
      {view==='leaders'&&(<div className="card" style={{marginBottom:10}}><div style={{padding:'13px 14px 8px',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div className="slbl" style={{marginBottom:0}}>Season standings</div><span style={{fontSize:11,color:'#94a3b8'}}>{rounds.length} round{rounds.length!==1?'s':''}</span></div><div style={{display:'grid',gridTemplateColumns:'1fr auto auto',padding:'8px 14px 4px',gap:8}}><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.07em'}}>Player</div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.07em',textAlign:'center'}}>Rounds</div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.07em',textAlign:'right'}}>Won</div></div>{leaderboard.slice(0,20).map((p,i)=>(<div key={p.name} className="lb-row"><div className={'lb-rank'+(i<3?' top':'')}>{i+1}</div><div className="lb-name">{p.name}</div><div className="lb-stat">{p.rounds}r</div><div className="lb-money">{f$(Math.round(p.won))}</div></div>))}{leaderboard.length===0&&<div style={{padding:'16px',textAlign:'center',fontSize:13,color:'#94a3b8'}}>No data yet</div>}</div>)}
      {view==='rounds'&&rounds.map(([k,r])=>(
        <div key={k} className="hi"><div className="hi-hdr" onClick={()=>setOpen(open===k?null:k)}><div><div className="hi-title">{r.day} - {fmtDFull(r.date)}</div><div className="hi-meta">{r.playerCount||0} players - {f$((r.playerCount||0)*25)} pot</div></div><div style={{display:'flex',alignItems:'center',gap:6}}>{isAdmin&&<button className="btn btn-outline btn-xs" onClick={e=>{e.stopPropagation();onEditRound(k,r);}}>Edit</button>}{isAdmin&&<button className="btn btn-red btn-xs" onClick={e=>{e.stopPropagation();onDelete(k);}}>Delete</button>}<svg style={{width:15,height:15,color:'#94a3b8',transition:'transform 0.2s',transform:open===k?'rotate(180deg)':'none',flexShrink:0}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg></div></div>
          {open===k&&(<div className="hi-body">
            {r.teams&&r.teams.map(t=>(<div key={t.id} style={{marginBottom:9}}><div style={{fontSize:13,fontWeight:700,color:'#10b981',marginBottom:3}}>{t.name} <span style={{fontWeight:500,color:'#94a3b8',fontSize:11}}>HCP {t.totalHcp&&t.totalHcp.toFixed(1)}</span></div><div style={{display:'flex',flexWrap:'wrap',gap:4}}>{safeArray(t.players).map((p,i)=><span key={i} style={{fontSize:11,background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:'2px 7px',display:'inline-flex',alignItems:'center',gap:4}}><span className="slot" style={{fontSize:9,padding:'1px 4px'}}>{p.slot}</span>{p.name}</span>)}</div></div>))}
            {r.scores&&r.teams&&(<div style={{marginTop:10,paddingTop:10,borderTop:'1px solid #f1f5f9'}}><div className="slbl">Scores</div><div style={{display:'grid',gridTemplateColumns:'1fr repeat(3,44px)',gap:'3px 5px',fontSize:12,marginBottom:11}}><div style={{color:'#94a3b8',fontWeight:600}}>Team</div>{['Front','Back','Ovr'].map(h=><div key={h} style={{color:'#94a3b8',textAlign:'center',fontWeight:600}}>{h}</div>)}{r.teams.map(t=>{const sc=(r.scores.teamScores&&r.scores.teamScores[t.id])||{};return(<React.Fragment key={t.id}><div style={{fontWeight:600}}>{t.name}</div>{['front','back','overall'].map(s=>{const v=sc[s];return<div key={s} style={{textAlign:'center',fontWeight:600,color:typeof v==='number'?v<0?'#15803d':v>0?'#dc2626':'#0f172a':'#94a3b8'}}>{typeof v==='number'?(v>0?'+'+v:v):'--'}</div>;})}</React.Fragment>);})}</div>
              <div className="slbl">Payouts</div>
              {[{l:'Front 9',pot:r.scores.frontPot,pl:r.scores.frontPlaces||1,seg:'front'},{l:'Back 9',pot:r.scores.backPot,pl:r.scores.backPlaces||1,seg:'back'},{l:'Overall',pot:r.scores.overallPot,pl:r.scores.overallPlaces||1,seg:'overall'}].map(({l,pot,pl,seg})=>{const rows=calcHistPay(r.scores,r.teams,pot,pl,seg);if(!rows.length)return null;return(<div key={l} style={{marginBottom:9}}><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>{l}</div>{rows.map((row,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0',borderBottom:'1px solid #f8fafc'}}><span style={{color:'#475569'}}>{row.label}{row.names?' - '+row.names:''}</span><span style={{fontWeight:700,color:row.isTie?'#f59e0b':'#15803d'}}>{f$(row.amt)}{row.isTie?' ea':''}</span></div>))}</div>);})}
              {parseFloat(r.scores.skinsPot||0)>0&&(<div style={{marginBottom:9}}><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>Skins</div>{Object.entries(r.scores.skinCounts||{}).filter(([,c])=>c>0).map(([tid,c])=>{const t=r.teams.find(t=>String(t.id)===String(tid));const net=Math.max(0,parseFloat(r.scores.skinsPot||0)-(r.scores.tournFund||0));const total=Object.values(r.scores.skinCounts||{}).reduce((s,x)=>s+x,0);return t?<div key={tid} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0',borderBottom:'1px solid #f8fafc'}}><span style={{color:'#475569'}}>{t.name} - {c} skin{c!==1?'s':''}</span><span style={{fontWeight:700,color:'#15803d'}}>{f$(total>0?(net/total)*c:0)}</span></div>:null;})}</div>)}
              <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:700,borderTop:'2px solid #0f172a',paddingTop:8}}><span>Total pot</span><span style={{color:'#15803d'}}>{f$((r.playerCount||0)*25)}</span></div>
            </div>)}
          </div>)}
        </div>
      ))}
    </div>
  );
}

function DayChecklist({day,week,onGoTo}){

function getUpcomingDays(week){
  if(!week)return[];
  const today=td();
  return sortDays(safeArray(week.activeDays)).filter(d=>{
    const date=week.dates&&week.dates[d];
    return date&&date>=today;
  });
}

function getDateRange(week,days){
  if(!days.length)return'';
  const dates=days.map(d=>(week.dates&&week.dates[d])||'').filter(Boolean).sort();
  if(!dates.length)return'';
  const first=dates[0];const last=dates[dates.length-1];
  const[,m1,d1]=first.split('-');const[,m2,d2]=last.split('-');
  const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];
  if(m1===m2)return mo[parseInt(m1)-1]+' '+parseInt(d1)+' – '+parseInt(d2);
  return mo[parseInt(m1)-1]+' '+parseInt(d1)+' – '+mo[parseInt(m2)-1]+' '+parseInt(d2);
}

function getShortDateRange(week,days){
  if(!days.length)return'';
  const dates=days.map(d=>(week.dates&&week.dates[d])||'').filter(Boolean).sort();
  if(!dates.length)return'';
  const first=dates[0];const last=dates[dates.length-1];
  const[,m1,d1]=first.split('-');const[,m2,d2]=last.split('-');
  if(m1===m2)return MO[parseInt(m1)-1]+' '+parseInt(d1)+'-'+parseInt(d2);
  return MO[parseInt(m1)-1]+' '+parseInt(d1)+'-'+MO[parseInt(m2)-1]+' '+parseInt(d2);
}

function renderEmailPlainText(week,notes,subject){
  const days=getUpcomingDays(week);
  const dateRange=getShortDateRange(week,days);
  const allSignups=week?.signups||{};
  const nl='\n';
  const div1='\u2550'.repeat(39);
  const div2='\u2500'.repeat(39);

  let txt=div1+nl+'   CLARK GOLF GROUP'+nl+'   Weekly Update \u00B7 '+dateRange+nl+div1+nl+nl;

  const lockedDays=days.filter(d=>week.teamsPublished&&week.teamsPublished[d]);
  const openDays=days.filter(d=>!(week.teamsPublished&&week.teamsPublished[d]));
  if(lockedDays.length&&openDays.length)txt+=lockedDays.join(' and ')+' teams are locked. Sign-ups open for '+openDays.join(' and ')+'.'+nl;
  else if(lockedDays.length)txt+='All teams locked for the weekend.'+nl;
  else if(openDays.length)txt+='Sign-ups are open for the weekend.'+nl;

  days.forEach(day=>{
    const date=week.dates&&week.dates[day];
    const isLocked=week.teamsPublished&&week.teamsPublished[day];
    const daySignups=Object.values(allSignups).filter(s=>s.day===day);
    const teams=safeArray(week.teams&&week.teams[day]);
    const teeInfo=week.teeTimes&&week.teeTimes[day];
    const teeStr=teeInfo?(teeInfo.lottery?'LOTTERY':teeInfo.time):'TBD';
    const playerCount=isLocked?teams.reduce((s,t)=>s+safeArray(t.players).length,0):daySignups.length;
    const note=(notes&&notes[day])||'';
    const dateFmt=fmtDFull(date);

    txt+=nl+nl+div2+nl;
    txt+=day.toUpperCase()+' \u00B7 '+dateFmt.toUpperCase()+nl;
    txt+=(isLocked?'TEAMS LOCKED':'SIGN-UPS OPEN')+' \u00B7 '+playerCount+' '+(isLocked?'PLAYERS':'SIGNED UP')+' \u00B7 TEE '+teeStr+nl;
    txt+=div2+nl;

    if(note.trim()){
      txt+=nl+'NOTE FROM THE ADMIN:'+nl+note.trim()+nl;
    }

    if(isLocked&&teams.length){
      teams.forEach(t=>{
        txt+=nl+(t.name||'Group '+t.id).toUpperCase()+'  (HCP '+(t.totalHcp||0).toFixed(0)+')'+nl;
        safeArray(t.players).forEach(p=>{
          const nm=(p.name||'').padEnd(20);
          txt+='  '+p.slot+' \u00B7 '+nm+(p.tee||'Whites')+' \u00B7 HCP '+p.handicap+nl;
        });
      });
    } else {
      const names=daySignups.map(s=>s.name).sort((a,b)=>a.localeCompare(b));
      txt+=nl;
      for(let i=0;i<names.length;i+=2){
        const left='  \u2022 '+(names[i]||'').padEnd(24);
        const right=names[i+1]?'\u2022 '+names[i+1]:'';
        txt+=left+right+nl;
      }
    }
  });

  txt+=nl+nl+'\u2192 Manage sign-ups: https://clark-golf-group-two.vercel.app/'+nl;
  return txt;
}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'20px 4px 10px'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:16,fontWeight:700,color:'#0f172a',textTransform:'uppercase',letterSpacing:1}}>Subject Line</div>
        <div style={{fontSize:11,color:'#94a3b8',fontWeight:500}}>Editable</div>
      </div>
      <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:'12px 14px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#94a3b8',letterSpacing:1,marginBottom:4}}>Subject</div>
        <input value={subject} onChange={e=>updateSubject(e.target.value)} style={{width:'100%',border:'none',outline:'none',fontFamily:'DM Sans,sans-serif',fontSize:14,fontWeight:600,color:'#0f172a',padding:0,background:'transparent'}}/>
        <div style={{marginTop:6,fontSize:11,color:'#94a3b8',fontStyle:'italic'}}>Auto-generated from current state. Edit to customize.</div>
      </div>

      {/* Day notes */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'20px 4px 10px'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:16,fontWeight:700,color:'#0f172a',textTransform:'uppercase',letterSpacing:1}}>Day Notes</div>
        <div style={{fontSize:11,color:'#94a3b8',fontWeight:500}}>Optional</div>
      </div>

      {days.map(day=>{
        const isLocked=week.teamsPublished&&week.teamsPublished[day];
        const date=week.dates&&week.dates[day];
        const val=notes[day]||'';
        return(
          <div key={day} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,marginBottom:10,overflow:'hidden'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:isLocked?'#fffbeb':'#f8fafc',borderBottom:'1px solid '+(isLocked?'#fde68a':'#e2e8f0')}}>
              <div>
                <span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:16,fontWeight:700,color:'#0f172a',textTransform:'uppercase',letterSpacing:0.5}}>{day}</span>
                <span style={{fontSize:11,color:'#64748b',fontWeight:500,marginLeft:6}}>{fmtD(date)}</span>
