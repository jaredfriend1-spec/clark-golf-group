<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Clark Golf Group</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#f1f5f9;color:#0f172a;-webkit-font-smoothing:antialiased;font-size:15px}
#root{min-height:100%}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}

/* LANDING */
.land{min-height:100vh;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px}
.land-title{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:#fff;text-align:center;line-height:1.05;margin-bottom:4px}
.land-title em{color:#10b981;font-style:normal}
.land-week{font-size:11px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:36px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.land-btn{width:100%;padding:16px 18px;border-radius:12px;border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:all 0.15s;text-align:left}
.land-btn:active{transform:scale(0.98)}
.land-btn-player{background:#10b981;color:#0f172a;border-bottom:3px solid #059669}
.land-btn-admin{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15)}
.land-btn-demo{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.2);margin-top:4px}
.land-btn-icon{width:36px;height:36px;border-radius:8px;background:rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.land-btn-icon svg{width:17px;height:17px}
.land-btn-text{flex:1}
.land-btn-main{font-size:14px;font-weight:700;display:block}
.land-btn-sub{font-size:11px;font-weight:500;opacity:0.55;display:block;margin-top:1px}
.land-arrow{font-size:18px;opacity:0.35}
.pw-box{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:20px}
.pw-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);text-align:center;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.pw-input{width:100%;padding:13px;border-radius:9px;border:1.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:#fff;font-size:16px;font-family:'Inter',sans-serif;outline:none;text-align:center;letter-spacing:0.12em;margin-bottom:10px}
.pw-input.err{border-color:#f87171}
.pw-err{color:#f87171;font-size:12px;font-weight:600;text-align:center;margin-bottom:8px}
.pw-row{display:flex;gap:8px}
.pw-go{flex:1;padding:12px;background:#10b981;color:#0f172a;border:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.pw-back{padding:12px 14px;background:none;border:1px solid rgba(255,255,255,0.14);border-radius:9px;color:rgba(255,255,255,0.45);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer}

/* HEADER */
.hdr{background:#0f172a;padding:20px 16px 0;position:relative;overflow:hidden}
.hdr-curve{position:absolute;bottom:-1px;left:0;right:0;height:18px;background:#fff;border-radius:18px 18px 0 0}
.hdr-inner{position:relative;z-index:1;padding-bottom:22px}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.hdr-brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;line-height:1.1}
.hdr-brand em{color:#10b981;font-style:normal}
.hdr-week{font-size:9px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:5px}
.admin-tag{background:#f59e0b;color:#0f172a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.demo-tag{background:#10b981;color:#0f172a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.switch-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 9px;color:rgba(255,255,255,0.4);font-size:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.hdr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px}
.hdr-stat{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:9px;padding:9px 6px;text-align:center}
.hdr-stat-n{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#10b981}
.hdr-stat-l{font-size:9px;font-weight:600;letter-spacing:0.08em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:2px}
.hdr-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.65)}
.hdr-dot{width:5px;height:5px;border-radius:50%;background:#10b981;flex-shrink:0}

/* NAV */
.nav{background:#fff;display:flex;border-bottom:1px solid #e2e8f0}
.nb{flex:1;padding:10px 2px 9px;background:none;border:none;color:#94a3b8;font-family:'Inter',sans-serif;font-size:9px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:0.06em;text-transform:uppercase;position:relative;transition:color 0.15s}
.nb svg{width:17px;height:17px;flex-shrink:0}
.nb.on{color:#0f172a}
.nb.on::after{content:'';position:absolute;bottom:0;left:18%;right:18%;height:2px;background:#f59e0b;border-radius:2px 2px 0 0}
.nb.locked{opacity:0.3;cursor:not-allowed}
.content{flex:1;padding:16px 13px 48px}

/* CARDS */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:10px}
.card-pad{padding:14px}

/* DAY CARDS */
.day-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:10px}
.day-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px;user-select:none;-webkit-user-select:none}
.day-hdr:active{background:#f8fafc}
.day-left{flex:1;min-width:0}
.day-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#0f172a}
.day-sub{font-size:11px;color:#94a3b8;font-weight:500;margin-top:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tee-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.tee-tag.lottery{background:#fef3c7;color:#d97706}
.tee-tag.set{background:#dcfce7;color:#15803d}
.tee-tag.done{background:#dbeafe;color:#1d4ed8}
.day-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.day-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.day-pill.has{background:#10b981;color:#fff}
.day-pill.none{background:#f1f5f9;color:#94a3b8}
.day-chev{width:15px;height:15px;color:#cbd5e1;transition:transform 0.2s;flex-shrink:0}
.day-chev.open{transform:rotate(180deg)}
.day-body{border-top:1px solid #f1f5f9}

/* PLAYER ROWS */
.p-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #f8fafc;gap:9px}
.p-row:last-child{border-bottom:none}
.avi{width:30px;height:30px;border-radius:50%;background:#dcfce7;color:#15803d;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Syne',sans-serif}
.p-name{font-size:13px;font-weight:600;color:#0f172a}
.p-meta{font-size:11px;color:#94a3b8;font-weight:500;display:flex;align-items:center;gap:4px;margin-top:1px}
.tee-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.edit-btn{font-size:10px;color:#94a3b8;background:none;border:none;cursor:pointer;font-weight:600;padding:0 2px;font-family:'Inter',sans-serif}
.rm-btn{background:none;border:none;cursor:pointer;color:#cbd5e1;padding:4px;display:flex;flex-shrink:0;margin-left:auto}
.rm-btn:hover{color:#ef4444}
.rm-btn svg{width:14px;height:14px}
.guest-tag{display:inline-block;padding:1px 6px;background:#f1f5f9;color:#64748b;border-radius:20px;font-size:10px;font-weight:600;margin-left:4px}

/* INLINE EDIT */
.ie{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.ie input{width:52px;padding:3px 6px;border:1.5px solid #10b981;border-radius:6px;font-size:12px;font-weight:600;outline:none;font-family:'Inter',sans-serif}
.ie select{padding:3px 5px;border:1.5px solid #10b981;border-radius:6px;font-size:11px;font-weight:500;outline:none;font-family:'Inter',sans-serif}
.ie-save{font-size:11px;font-weight:700;color:#15803d;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.ie-cancel{font-size:11px;color:#94a3b8;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif}

/* SIGNUP BUTTON AREA */
.day-actions{padding:10px 14px;display:flex;gap:7px;align-items:center;border-top:1px solid #f1f5f9}
.signup-btn{padding:8px 14px;background:#10b981;color:#0f172a;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.teeadd-btn{padding:8px 12px;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;color:#475569}

/* STATS ROW */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:#0f172a;border-radius:10px;padding:11px 6px;text-align:center}
.stat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#10b981}
.stat-l{font-size:9px;color:rgba(255,255,255,0.3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em}

/* TEAM CARDS */
.team-card{border:1px solid #e2e8f0;border-radius:12px;margin-bottom:10px;overflow:hidden}
.team-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:#0f172a}
.team-nm{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff}
.team-hcp{font-size:11px;color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:20px;font-weight:600}
.team-row{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid #f8fafc}
.team-row:last-child{border-bottom:none}
.slot{font-size:10px;font-weight:700;background:#f59e0b;color:#0f172a;padding:2px 6px;border-radius:4px;flex-shrink:0;min-width:20px;text-align:center}

/* SCORE PICKER */
.sc-grid{display:grid;grid-template-columns:1fr 78px 78px 78px;gap:7px;align-items:center}
.sc-hd{font-size:9px;font-weight:700;color:#94a3b8;text-align:center;letter-spacing:0.07em;text-transform:uppercase}
.sp{display:flex;align-items:center;border:1.5px solid #e2e8f0;border-radius:7px;overflow:hidden;background:#f8fafc}
.sp button{background:none;border:none;cursor:pointer;font-size:16px;font-weight:700;color:#475569;padding:5px 8px;font-family:'Inter',sans-serif;line-height:1;flex-shrink:0}
.sp button:hover{background:#e2e8f0}
.sp-val{flex:1;text-align:center;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;min-width:26px}
.sp-val.neg{color:#15803d}
.sp-val.pos{color:#dc2626}
.sp-val.zero{color:#94a3b8}

/* SKINS */
.skin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px}
.skin-btn{padding:16px 8px;border:1.5px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;text-align:center;user-select:none;-webkit-user-select:none;transition:border-color 0.12s}
.skin-btn:active{transform:scale(0.94)}
.skin-btn.on{border-color:#10b981;background:#ecfdf5}
.skin-team{font-size:11px;font-weight:700;color:#64748b;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em}
.skin-num{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:#0f172a;line-height:1}
.skin-lbl{font-size:10px;color:#94a3b8;margin-top:3px}
.skin-undo{font-size:10px;color:#ef4444;margin-top:4px;cursor:pointer;font-weight:700;text-transform:uppercase}

/* PAYOUTS */
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f8fafc;font-size:13px}
.pay-row:last-child{border-bottom:none}
.pay-lbl{color:#475569;font-weight:500}
.pay-amt{font-weight:700;font-family:'Inter',sans-serif;font-size:14px}
.pay-amt.win{color:#15803d}
.pay-amt.tie{color:#f59e0b}
.pay-amt.fund{color:#f59e0b}
.pay-total{display:flex;justify-content:space-between;padding:10px 0 0;font-size:15px;font-weight:700;border-top:2px solid #0f172a;margin-top:4px}

/* HISTORY */
.hi{border:1px solid #e2e8f0;border-radius:12px;margin-bottom:9px;overflow:hidden}
.hi-hdr{padding:12px 14px;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hi-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#0f172a}
.hi-meta{font-size:11px;color:#94a3b8;font-weight:500;margin-top:2px}
.hi-body{padding:13px 14px;border-top:1px solid #f1f5f9}

/* ADMIN */
.admin-bar{background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:13px;margin-bottom:10px}
.admin-lbl{font-size:10px;font-weight:700;letter-spacing:0.08em;color:#92400e;text-transform:uppercase;margin-bottom:9px}

/* FORMS */
.fg{margin-bottom:12px}
.fl{font-size:10px;font-weight:700;color:#64748b;margin-bottom:4px;display:block;letter-spacing:0.08em;text-transform:uppercase}
.fi{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-family:'Inter',sans-serif;font-size:14px;color:#0f172a;background:#fff;outline:none;transition:border-color 0.15s}
.fi:focus{border-color:#10b981}
.fs{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-family:'Inter',sans-serif;font-size:14px;color:#0f172a;background:#fff;outline:none;appearance:none}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sw{position:relative;margin-bottom:8px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#94a3b8}
.si{width:100%;padding:10px 12px 10px 32px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:'Inter',sans-serif;outline:none;background:#f8fafc}
.si:focus{border-color:#10b981;background:#fff}

/* TOGGLE */
.tog{display:flex;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:20px;overflow:hidden;padding:3px;margin-bottom:12px}
.tog-opt{flex:1;padding:7px 8px;border:none;background:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:#64748b;border-radius:16px;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.04em}
.tog-opt.on{background:#0f172a;color:#fff}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 15px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn-green{background:#10b981;color:#0f172a}
.btn-green:hover{background:#34d399}
.btn-dark{background:#0f172a;color:#fff}
.btn-dark:hover{background:#1e293b}
.btn-gold{background:#f59e0b;color:#0f172a}
.btn-gold:hover{background:#fbbf24}
.btn-red{background:#ef4444;color:#fff}
.btn-red:hover{background:#f87171}
.btn-outline{background:#fff;border:1.5px solid #e2e8f0;color:#475569}
.btn-outline:hover{background:#f8fafc}
.btn-sm{padding:6px 11px;font-size:11px}
.btn-xs{padding:4px 9px;font-size:10px}
.btn-full{width:100%}

/* ALERTS */
.alert{border-radius:9px;padding:10px 12px;font-size:13px;margin-bottom:10px;font-weight:500}
.alert-ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#15803d}
.alert-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:flex-end;z-index:200}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:16px 15px 36px;width:100%;max-height:88vh;overflow-y:auto}
.modal-handle{width:34px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 14px}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#0f172a;margin-bottom:13px}
.p-pick{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid #f1f5f9;cursor:pointer}
.p-pick:last-child{border-bottom:none}
.p-pick:hover{background:#f8fafc}
.p-pick.sel{background:#ecfdf5}

/* MISC */
.slbl{font-size:10px;font-weight:700;letter-spacing:0.1em;color:#94a3b8;text-transform:uppercase;margin-bottom:8px}
.demo-bar{background:#fef3c7;border:1.5px solid #f59e0b;border-radius:9px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.demo-lbl{font-size:11px;font-weight:700;color:#b45309;text-transform:uppercase;letter-spacing:0.07em}
.empty{text-align:center;padding:44px 16px}
.empty svg{width:38px;height:38px;opacity:0.18;margin-bottom:11px}
.empty-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:5px}
.empty-sub{font-size:13px;color:#64748b;line-height:1.55}
.pill-gray{display:inline-block;padding:1px 6px;background:#f1f5f9;color:#64748b;border-radius:20px;font-size:10px;font-weight:600}
.pill-green{display:inline-block;padding:1px 6px;background:#dcfce7;color:#15803d;border-radius:20px;font-size:10px;font-weight:600}
.section-btn{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;cursor:pointer;border-bottom:1px solid #f1f5f9}
.section-title{font-size:14px;font-weight:700;color:#0f172a}
.section-body{padding:13px}
/* checkbox */
.cb-row{display:flex;align-items:center;gap:9px;padding:8px 0;cursor:pointer}
.cb-row input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:#10b981}
.cb-label{font-size:14px;font-weight:500;color:#0f172a}
.cb-sub{font-size:11px;color:#94a3b8;font-weight:500}
</style>
</head>

<div id="root"></div>

function useDB(){
  const [db,setDb]=useState(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    try{if(!firebase.apps.length)firebase.initializeApp(FB);setDb(firebase.database());setReady(true);}
    catch(e){setReady(true);}
  },[]);
  const read=useCallback((p,cb)=>{if(!db){cb(LS.g(p));return()=>{};}const r=db.ref(p);r.on('value',s=>cb(s.val()));return()=>r.off();},[db]);
  const write=useCallback((p,v)=>{if(!db){LS.s(p,v);return Promise.resolve();}return db.ref(p).set(v);},[db]);
  const push=useCallback((p,v)=>{if(!db){const e=LS.g(p)||{};const k=Date.now().toString();e[k]=v;LS.s(p,e);return Promise.resolve(k);}return db.ref(p).push(v).then(r=>r.key);},[db]);
  const del=useCallback((p)=>{if(!db){localStorage.removeItem(p);return Promise.resolve();}return db.ref(p).remove();},[db]);
  return{ready,read,write,push,del};
}

const fmtDFull=d=>{if(!d)return'';const[y,m,dy]=d.split('-');return MO[parseInt(m)-1]+' '+parseInt(dy)+', '+y;};

function getWeekDates(){
  const now=new Date();
  const day=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-day+(day===0?-6:1));
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);
  const sat=new Date(mon);sat.setDate(mon.getDate()+5);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const fmt=d=>d.toISOString().split('T')[0];
  return{Friday:fmt(fri),Saturday:fmt(sat),Sunday:fmt(sun)};
}

function getWeekLabel(){
  const wd=getWeekDates();
  return'Week of '+fmtD(wd.Friday)+' - '+fmtD(wd.Sunday);
}

function buildTeams(players){
  const sorted=[...players].sort((a,b)=>parseFloat(a.handicap)-parseFloat(b.handicap));
  const n=sorted.length;
  if(n<3)return[];
  const nt=Math.ceil(n/4);
  const teams=Array.from({length:nt},(_,i)=>({id:i+1,name:'Team '+(i+1),players:[],totalHcp:0}));
  sorted.forEach((p,idx)=>{
    const round=Math.floor(idx/nt);
    const pos=idx%nt;
    const ti=round%2===0?pos:nt-1-pos;
    teams[ti].players.push({...p,slot:['A','B','C','D'][Math.min(round,3)]});
    teams[ti].totalHcp+=parseFloat(p.handicap)||0;
  });
  return teams;
}

function calcPot(playerCount){
  const skins=playerCount*10;
  const side=playerCount*5;
  return{skins,front:side,back:side,overall:side,total:skins+side*3};
}

function getWinners(teams,scores,seg){
  if(!teams||!teams.length)return null;
  const sc=teams.map(t=>({...t,score:parseFloat((scores[t.id]||{})[seg])})).filter(t=>!isNaN(t.score));
  if(!sc.length)return null;
  sc.sort((a,b)=>a.score-b.score);
  const best=sc[0].score;
  const tied=sc.filter(t=>t.score===best);
  const second=sc.find(t=>t.score!==best);
  return{best,tied,second};
}

function buildPayouts(pot,places,teams,scores,seg){
  const p=parseFloat(pot||0);
  if(!p)return[];
  const w=getWinners(teams,scores,seg);
  if(!w)return places===1?[{label:'1st place',amt:p,teams:[],isTie:false}]:[{label:'1st place',amt:p*0.6,teams:[],isTie:false},{label:'2nd place',amt:p*0.4,teams:[],isTie:false}];
  const rows=[];
  if(w.tied.length>1){
    const split=places===1?p/w.tied.length:(p*0.6+p*0.4)/w.tied.length;
    rows.push({label:'1st (Tie)',amt:split,teams:w.tied,isTie:true});
  } else {
    rows.push({label:'1st',amt:places===1?p:p*0.6,teams:w.tied,isTie:false});
    if(places===2&&w.second)rows.push({label:'2nd',amt:p*0.4,teams:[w.second],isTie:false});
  }
  return rows;
}

              <div className="fg"><label className="fl">Handicap</label><input className="fi" type="number" placeholder="e.g. 14" value={hcp} onChange={e=>setHcp(e.target.value)}/></div>

              </div>
            </div>
            <div className="fg"><label className="fl">{isLottery?'Requested time':'Tee time'}</label><TimePicker onChange={setNewTime}/></div>
            <button className="btn btn-green btn-full" onClick={()=>{onUpdateTeeTime(teeModal,{time:isLottery?'LOTTERY':newTime,lottery:isLottery});setTeeModal(null);}}>Save</button>
          </div>
        </div>
      )}

      {editTeeModal&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setEditTeeModal(null);}}>
          <div className="modal">
            <div className="modal-handle"></div>
            <div className="modal-title">Update tee time — {editTeeModal}</div>
            <div className="alert alert-blue" style={{marginBottom:12}}>Enter the confirmed tee time.</div>
            <div className="fg"><label className="fl">Confirmed time</label><TimePicker onChange={setNewTime}/></div>
            <button className="btn btn-gold btn-full" onClick={()=>{onUpdateTeeTime(editTeeModal,{time:newTime,lottery:false});setEditTeeModal(null);}}>Update</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── TEAMS VIEW (per day) ─────────────────────────────────────────────────────
function TeamsView({week,isAdmin,onSaveTeams,onPublishTeams}){
  const [activeDay,setActiveDay]=useState(null);
  const [editTeams,setEditTeams]=useState(null);
  const [drag,setDrag]=useState(null);
  const [editKey,setEditKey]=useState(null);
  const [editVal,setEditVal]=useState({hcp:'',tee:'Whites'});

  const activeDays=(week&&week.activeDays)||[];

  useEffect(()=>{
    if(!activeDay&&activeDays.length>0)setActiveDay(activeDays[0]);
  },[activeDays.join(',')]);

  if(!week||activeDays.length===0){
    return<div className="empty"><div className="empty-title">No active games</div></div>;
  }

  const daySignups=Object.entries((week.signups)||{}).filter(([,s])=>s.day===activeDay).map(([,s])=>s);
  const savedTeams=(week.teams&&week.teams[activeDay])||[];
  const display=editTeams||savedTeams;
  const cnt=daySignups.length;
  const published=(week.teamsPublished&&week.teamsPublished[activeDay])||false;

  function gen(){
    if(daySignups.length<3)return;
    setEditTeams(buildTeams(daySignups));
  }

  function drop(ti,pi){
    if(!drag||!isAdmin||!editTeams)return;
    const u=editTeams.map(t=>({...t,players:[...t.players]}));
    const p=u[drag.ti].players[drag.pi];
    u[drag.ti].players.splice(drag.pi,1);
    u[ti].players.splice(pi,0,p);
    u.forEach(t=>{t.players.forEach((p,i)=>{p.slot=['A','B','C','D'][i]||'D';});t.totalHcp=t.players.reduce((s,p)=>s+parseFloat(p.handicap||0),0);});
    setEditTeams(u);setDrag(null);
  }

  function savePlayerEdit(ti,pi){
    const u=(editTeams||savedTeams).map(t=>({...t,players:[...t.players]}));
    if(editVal.hcp!=='')u[ti].players[pi].handicap=parseFloat(editVal.hcp);
    u[ti].players[pi].tee=editVal.tee;
    u[ti].totalHcp=u[ti].players.reduce((s,p)=>s+parseFloat(p.handicap||0),0);
    if(editTeams)setEditTeams(u);else onSaveTeams(activeDay,u);
    setEditKey(null);
  }

  return(
    <div>
      {activeDays.length>1&&(
        <div className="tog" style={{marginBottom:12}}>
          {activeDays.map(d=><button key={d} className={'tog-opt'+(activeDay===d?' on':'')} onClick={()=>{setActiveDay(d);setEditTeams(null);setEditKey(null);}}>{d.slice(0,3)}</button>)}
        </div>
      )}

      <div className="stat-row">
        <div className="stat-box"><div className="stat-n">{cnt}</div><div className="stat-l">Players</div></div>
        <div className="stat-box"><div className="stat-n">{display.length}</div><div className="stat-l">Teams</div></div>
        <div className="stat-box"><div className="stat-n" style={{fontSize:11,paddingTop:5,color:'rgba(255,255,255,0.4)'}}>{published?'Live':'Pending'}</div><div className="stat-l">Status</div></div>
      </div>

      {isAdmin&&(
        <div className="admin-bar">
          <div className="admin-lbl">Team builder — {activeDay}</div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            <button className="btn btn-dark btn-sm" onClick={gen} disabled={cnt<3}>{display.length?'Regenerate':'Auto-generate'}</button>
            {editTeams&&<button className="btn btn-gold btn-sm" onClick={()=>{onSaveTeams(activeDay,editTeams);setEditTeams(null);}}>Save</button>}
            {editTeams&&<button className="btn btn-outline btn-sm" onClick={()=>setEditTeams(null)}>Cancel</button>}
            {!editTeams&&display.length>0&&!published&&<button className="btn btn-gold btn-sm" onClick={()=>onPublishTeams(activeDay)}>Publish</button>}
          </div>
          {editTeams&&<div className="alert alert-warn" style={{marginTop:9,marginBottom:0}}>Drag to rebalance. Anyone can edit tee/handicap inline.</div>}
        </div>
      )}

      {display.length===0&&(
        <div className="empty">
          <div className="empty-title">No teams yet for {activeDay}</div>
          <div className="empty-sub">{cnt>0?'Admin will generate teams shortly.':'No sign-ups yet for this day.'}</div>
        </div>
      )}

      {display.map((team,ti)=>(
        <div key={team.id} className="team-card">
          <div className="team-hdr">
            <span className="team-nm">{team.name}</span>
            <span className="team-hcp">HCP {team.totalHcp.toFixed(1)}</span>
          </div>
          {team.players.map((p,pi)=>(
            <div key={pi} className="team-row"
              draggable={!!(editTeams&&isAdmin)}
              onDragStart={()=>{if(isAdmin)setDrag({ti,pi});}}
              onDragOver={e=>e.preventDefault()}
              onDrop={()=>drop(ti,pi)}>
              {editTeams&&isAdmin&&<span style={{color:'#cbd5e1',cursor:'grab',fontSize:13,flexShrink:0}}>⠿</span>}
              <span className="slot">{p.slot}</span>
              <div className="avi" style={{width:27,height:27,fontSize:10}}>{ini(p.name)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                {editKey===ti+'-'+pi?(
                  <div className="ie">
                    <input autoFocus type="number" value={editVal.hcp} onChange={e=>setEditVal(v=>({...v,hcp:e.target.value}))}/>
                    <select value={editVal.tee} onChange={e=>setEditVal(v=>({...v,tee:e.target.value}))}>
                      {TEES.map(t=><option key={t}>{t}</option>)}
                    </select>
                    <button className="ie-save" onClick={()=>savePlayerEdit(ti,pi)}>Save</button>
                    <button className="ie-cancel" onClick={()=>setEditKey(null)}>x</button>
                  </div>
                ):(
                  <div style={{fontSize:11,color:'#94a3b8',display:'flex',alignItems:'center',gap:4,marginTop:1}}>
                    <span className="tee-dot" style={{background:TC[p.tee]||'#ccc'}}></span>
                    {p.tee} HCP {p.handicap}
                    <button className="edit-btn" onClick={()=>{setEditKey(ti+'-'+pi);setEditVal({hcp:String(p.handicap),tee:p.tee});}}>edit</button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ── SCORING VIEW (per day) ───────────────────────────────────────────────────
function ScoringView({week,isAdmin,onSaveScores,onMoveToHistory}){
  const [activeDay,setActiveDay]=useState(null);
  const [ts,setTs]=useState({});
  const [sk,setSk]=useState({});
  const [fp,setFp]=useState(2);const [bp,setBp]=useState(2);const [op,setOp]=useState(2);
  const [fv,setFv]=useState('');const [bv,setBv]=useState('');const [ov,setOv]=useState('');const [sv,setSv]=useState('');
  const [saved,setSaved]=useState(false);

  const activeDays=(week&&week.activeDays)||[];

  useEffect(()=>{
    if(!activeDay&&activeDays.length>0)setActiveDay(activeDays[0]);
  },[activeDays.join(',')]);

  useEffect(()=>{
    if(!activeDay)return;
    const sc=(week&&week.scores&&week.scores[activeDay])||{};
    setTs(sc.teamScores||{});setSk(sc.skinCounts||{});
    setFv(sc.frontPot!==undefined?String(sc.frontPot):'');
    setBv(sc.backPot!==undefined?String(sc.backPot):'');
    setOv(sc.overallPot!==undefined?String(sc.overallPot):'');
    setSv(sc.skinsPot!==undefined?String(sc.skinsPot):'');
    setFp(sc.frontPlaces||2);setBp(sc.backPlaces||2);setOp(sc.overallPlaces||2);
    setSaved(false);
  },[activeDay]);

  if(!week||activeDays.length===0)return<div className="empty"><div className="empty-title">No active games</div></div>;

  const dayTeams=(week.teams&&week.teams[activeDay])||[];
  const daySignups=Object.values(week.signups||{}).filter(s=>s.day===activeDay);
  const pc=daySignups.length;
  const pot=calcPot(pc);
  const dayComplete=week.complete&&week.complete[activeDay];
  const scoresExist=!!(week.scores&&week.scores[activeDay]&&week.scores[activeDay].savedAt);

  const alloc=parseFloat(fv||0)+parseFloat(bv||0)+parseFloat(ov||0)+parseFloat(sv||0);
  const ok=pc>0&&Math.abs(alloc-pot.total)<0.01;
  const snet=Math.max(0,parseFloat(sv||0)-pc);
  const tsk=Object.values(sk).reduce((s,c)=>s+c,0);
  const perSk=tsk>0?snet/tsk:0;

  function tap(id){if(!isAdmin)return;setSk(p=>({...p,[id]:(p[id]||0)+1}));}
  function untap(id){setSk(p=>({...p,[id]:Math.max(0,(p[id]||0)-1)}));}

  function save(){
    onSaveScores(activeDay,{teamScores:ts,skinCounts:sk,frontPot:parseFloat(fv)||0,backPot:parseFloat(bv)||0,overallPot:parseFloat(ov)||0,skinsPot:parseFloat(sv)||0,frontPlaces:fp,backPlaces:bp,overallPlaces:op,tournFund:pc,playerCount:pc,savedAt:Date.now()});
    setSaved(true);
  }

  function autoPot(){
    setFv(String(pot.front));setBv(String(pot.back));setOv(String(pot.overall));setSv(String(pot.skins));
  }

  if(!dayTeams.length&&!scoresExist){
    return(
      <div>
        {activeDays.length>1&&<div className="tog" style={{marginBottom:12}}>{activeDays.map(d=><button key={d} className={'tog-opt'+(activeDay===d?' on':'')} onClick={()=>setActiveDay(d)}>{d.slice(0,3)}</button>)}</div>}
        <div className="empty"><div className="empty-title">Teams not published yet for {activeDay}</div></div>
      </div>
    );
  }

  return(
    <div>
      {activeDays.length>1&&(
        <div className="tog" style={{marginBottom:12}}>
          {activeDays.map(d=><button key={d} className={'tog-opt'+(activeDay===d?' on':'')} onClick={()=>setActiveDay(d)}>{d.slice(0,3)}</button>)}
        </div>
      )}

      {dayComplete&&<div className="alert alert-ok" style={{marginBottom:10}}>{activeDay} round complete — final results below.</div>}
      {!dayComplete&&scoresExist&&<div className="alert alert-blue" style={{marginBottom:10}}>Scores saved — players can see this live. Mark complete to finalize payouts.</div>}

      {isAdmin&&(
        <div className="admin-bar">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div className="admin-lbl" style={{marginBottom:0}}>Pot — {pc} players — {f$(pot.total)} total</div>
            {!fv&&!bv&&!ov&&!sv&&<button className="btn btn-outline btn-xs" onClick={autoPot}>Auto-fill ($10 skins / $5 sides)</button>}
          </div>
          <div className="fr" style={{marginBottom:8}}>
            <div className="fg" style={{marginBottom:0}}><label className="fl">Front 9</label><input className="fi" type="number" value={fv} onChange={e=>setFv(e.target.value)} placeholder={'$'+pot.front}/></div>
            <div className="fg" style={{marginBottom:0}}><label className="fl">Back 9</label><input className="fi" type="number" value={bv} onChange={e=>setBv(e.target.value)} placeholder={'$'+pot.back}/></div>
          </div>
          <div className="fr">
            <div className="fg" style={{marginBottom:0}}><label className="fl">Overall</label><input className="fi" type="number" value={ov} onChange={e=>setOv(e.target.value)} placeholder={'$'+pot.overall}/></div>
            <div className="fg" style={{marginBottom:0}}><label className="fl">Skins</label><input className="fi" type="number" value={sv} onChange={e=>setSv(e.target.value)} placeholder={'$'+pot.skins}/></div>
          </div>
          {alloc>0&&<div style={{marginTop:7,fontSize:12,fontWeight:700,color:ok?'#15803d':'#dc2626'}}>{ok?'Pot balanced — '+f$(pot.total):'Allocated '+f$(alloc)+' of '+f$(pot.total)}</div>}
        </div>
      )}

      {isAdmin&&(
        <div className="card card-pad" style={{marginBottom:10}}>
          <div className="slbl">Places paid</div>
          {[{l:'Front 9',v:fp,s:setFp},{l:'Back 9',v:bp,s:setBp},{l:'Overall',v:op,s:setOp}].map(({l,v,s})=>(
            <div key={l} style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:500}}>{l}</span>
              <div className="tog" style={{width:155,marginBottom:0}}>
                <button className={'tog-opt'+(v===1?' on':'')} onClick={()=>s(1)}>1st only</button>
                <button className={'tog-opt'+(v===2?' on':'')} onClick={()=>s(2)}>1st + 2nd</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="card card-pad" style={{marginBottom:10}}>
        <div className="slbl">Team scores — {activeDay}</div>
        <div className="sc-grid" style={{marginBottom:8}}>
          <div></div>
          <div className="sc-hd">Front</div>
          <div className="sc-hd">Back</div>
          <div className="sc-hd">Overall</div>
        </div>
        {dayTeams.map(t=>(
          <div key={t.id} className="sc-grid" style={{marginBottom:8,alignItems:'center'}}>
            <div style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:4}}>{t.name}</div>
            {['front','back','overall'].map(seg=>(
              <ScorePicker key={seg} value={ts[t.id]?ts[t.id][seg]:undefined} readOnly={!isAdmin} onChange={v=>setTs(p=>({...p,[t.id]:{...(p[t.id]||{}),[seg]:v}}))}/>
            ))}
          </div>
        ))}
      </div>

      <div className="card card-pad" style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:11}}>
          <div className="slbl" style={{marginBottom:0}}>Skins tapper</div>
          <div style={{fontSize:11,color:'#94a3b8',fontWeight:600}}>{tsk} skin{tsk!==1?'s':''}{sv?' — '+f$(snet)+' net':''}</div>
        </div>
        <div className="skin-grid">
          {dayTeams.map(t=>(
            <div key={t.id} className={'skin-btn'+((sk[t.id]||0)>0?' on':'')} onClick={()=>tap(t.id)}>
              <div className="skin-team">{t.name}</div>
              <div className="skin-num">{sk[t.id]||0}</div>
              <div className="skin-lbl">skin{(sk[t.id]||0)!==1?'s':''}</div>
              {(sk[t.id]||0)>0&&<div className="skin-undo" onClick={e=>{e.stopPropagation();untap(t.id);}}>- undo</div>}
            </div>
          ))}
        </div>
        {sv&&snet>0&&<div className="alert alert-ok">Tournament fund: {f$(pc)} — Net skins: {f$(snet)}{tsk>0?' — '+f$(perSk.toFixed(2))+' per skin':''}</div>}
      </div>

      {(fv||bv||ov||sv)&&(
        <div className="card card-pad" style={{marginBottom:10}}>
          <div className="slbl">Payout breakdown{!dayComplete?<span style={{fontWeight:400,color:'#94a3b8',fontSize:9,marginLeft:6,textTransform:'none',letterSpacing:0}}>(final when round is complete)</span>:''}</div>
          {[{l:'Front 9',pot:fv,pl:fp,seg:'front'},{l:'Back 9',pot:bv,pl:bp,seg:'back'},{l:'Overall',pot:ov,pl:op,seg:'overall'}].map(({l,pot,pl,seg})=>{
            const rows=buildPayouts(pot,pl,dayTeams,ts,seg);
            if(!rows.length)return null;
            return(
              <div key={l} style={{marginBottom:13}}>
                <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.08em'}}>{l}</div>
                {rows.map((row,i)=>(
                  <div key={i} className="pay-row">
                    <span className="pay-lbl">{row.label}{row.teams.length>0?' — '+row.teams.map(t=>t.name).join(' & '):''}{row.isTie?<span style={{marginLeft:5,fontSize:10,color:'#f59e0b',fontWeight:700}}>SPLIT</span>:''}</span>
                    <span className={'pay-amt '+(row.isTie?'tie':'win')}>{f$(row.amt)}{row.isTie?' ea':''}</span>
                  </div>
                ))}
              </div>
            );
          })}
          {parseFloat(sv||0)>0&&(
            <div style={{marginBottom:13}}>
              <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.08em'}}>Skins</div>
              <div className="pay-row"><span className="pay-lbl">Net skins pot</span><span className="pay-amt win">{f$(snet)}</span></div>
              {tsk>0&&<div className="pay-row"><span className="pay-lbl">Per skin ({tsk} total)</span><span className="pay-amt win">{f$(perSk.toFixed(2))}</span></div>}
              {Object.entries(sk).filter(([,c])=>c>0).map(([tid,c])=>{const t=dayTeams.find(t=>String(t.id)===String(tid));return t?<div key={tid} className="pay-row"><span className="pay-lbl" style={{paddingLeft:8}}>{t.name} — {c} skin{c!==1?'s':''}</span><span className="pay-amt win">{f$(c*perSk)}</span></div>:null;})}
              <div className="pay-row"><span className="pay-lbl" style={{color:'#f59e0b'}}>Tournament fund</span><span className="pay-amt fund">{f$(pc)}</span></div>
            </div>
          )}
          <div className="pay-total"><span>Total pot</span><span style={{color:'#15803d'}}>{f$(pc*25)}</span></div>
        </div>
      )}

      {isAdmin&&(
        <div style={{display:'flex',gap:8,marginTop:4}}>
          <button className="btn btn-dark" style={{flex:1}} onClick={save}>Save scores &amp; payouts</button>
          {saved&&<button className="btn btn-green btn-sm" onClick={()=>{if(window.confirm('Move '+activeDay+' to history?'))onMoveToHistory(activeDay);}}>Move to history</button>}
        </div>
      )}
      {saved&&<div className="alert alert-ok" style={{marginTop:8}}>Saved — players can see scores now.</div>}
    </div>
  );
}

// ── HISTORY VIEW ─────────────────────────────────────────────────────────────
function HistoryView({history,isAdmin,onDelete,onClearAll,onEditRound}){
  const [open,setOpen]=useState(null);
  const rounds=Object.entries(history||{}).sort((a,b)=>(b[1].date||'').localeCompare(a[1].date||''));

  if(!rounds.length){
    return(
      <div className="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div className="empty-title">No rounds yet</div>
        <div className="empty-sub">Completed rounds appear here.</div>
      </div>
    );
  }

  function calcHistPay(scores,teams,pot,places,seg){
    const p=parseFloat(pot||0);if(!p||!teams)return[];
    const sc=teams.map(t=>({...t,score:parseFloat((scores.teamScores&&scores.teamScores[t.id]?scores.teamScores[t.id][seg]:NaN))})).filter(t=>!isNaN(t.score));
    if(!sc.length)return[];
    sc.sort((a,b)=>a.score-b.score);
    const best=sc[0].score;const tied=sc.filter(t=>t.score===best);const second=sc.find(t=>t.score!==best);
    const rows=[];
    if(tied.length>1){const split=places===1?p/tied.length:(p*0.6+p*0.4)/tied.length;rows.push({label:'1st Tie',names:tied.map(t=>t.name).join(' & '),amt:split,isTie:true});}
    else{rows.push({label:'1st',names:tied[0]?tied[0].name:'',amt:places===1?p:p*0.6,isTie:false});if(places===2&&second)rows.push({label:'2nd',names:second.name,amt:p*0.4,isTie:false});}
    return rows;
  }

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div className="slbl" style={{marginBottom:0}}>{rounds.length} round{rounds.length!==1?'s':''} on record</div>
        {isAdmin&&rounds.length>0&&<button className="btn btn-red btn-xs" onClick={()=>{if(window.confirm('Delete ALL history?'))onClearAll();}}>Clear all</button>}
      </div>
      {rounds.map(([k,r])=>(
        <div key={k} className="hi">
          <div className="hi-hdr" onClick={()=>setOpen(open===k?null:k)}>
            <div>
              <div className="hi-title">{r.day} — {fmtDFull(r.date)}</div>
              <div className="hi-meta">{r.playerCount||0} players — {f$((r.playerCount||0)*25)} pot</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              {isAdmin&&<button className="btn btn-outline btn-xs" onClick={e=>{e.stopPropagation();onEditRound(k,r);}}>Edit</button>}
              {isAdmin&&<button className="btn btn-red btn-xs" onClick={e=>{e.stopPropagation();if(window.confirm('Delete this round?'))onDelete(k);}}>Delete</button>}
              <svg style={{width:15,height:15,color:'#94a3b8',transition:'transform 0.2s',transform:open===k?'rotate(180deg)':'none',flexShrink:0}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          {open===k&&(
            <div className="hi-body">
              {r.teams&&r.teams.map(t=>(
                <div key={t.id} style={{marginBottom:9}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#10b981',marginBottom:3}}>{t.name} <span style={{fontWeight:500,color:'#94a3b8',fontSize:11}}>HCP {t.totalHcp&&t.totalHcp.toFixed(1)}</span></div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {t.players&&t.players.map((p,i)=><span key={i} style={{fontSize:11,background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:'2px 7px',display:'inline-flex',alignItems:'center',gap:4}}><span className="slot" style={{fontSize:9,padding:'1px 4px'}}>{p.slot}</span>{p.name}</span>)}
                  </div>
                </div>
              ))}
              {r.scores&&r.teams&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid #f1f5f9'}}>
                  <div className="slbl">Scores</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr repeat(3,44px)',gap:'3px 5px',fontSize:12,marginBottom:11}}>
                    <div style={{color:'#94a3b8',fontWeight:600}}>Team</div>
                    {['Front','Back','Ovr'].map(h=><div key={h} style={{color:'#94a3b8',textAlign:'center',fontWeight:600}}>{h}</div>)}
                    {r.teams.map(t=>{
                      const sc=(r.scores.teamScores&&r.scores.teamScores[t.id])||{};
                      return(
                        <React.Fragment key={t.id}>
                          <div style={{fontWeight:600}}>{t.name}</div>
                          {['front','back','overall'].map(s=>{const v=sc[s];return<div key={s} style={{textAlign:'center',fontWeight:600,color:typeof v==='number'?v<0?'#15803d':v>0?'#dc2626':'#0f172a':'#94a3b8'}}>{typeof v==='number'?(v>0?'+'+v:v):'--'}</div>;})}
                        </React.Fragment>
                      );
                    })}
                  </div>
                  <div className="slbl">Payouts</div>
                  {[{l:'Front 9',pot:r.scores.frontPot,pl:r.scores.frontPlaces||2,seg:'front'},{l:'Back 9',pot:r.scores.backPot,pl:r.scores.backPlaces||2,seg:'back'},{l:'Overall',pot:r.scores.overallPot,pl:r.scores.overallPlaces||2,seg:'overall'}].map(({l,pot,pl,seg})=>{
                    const rows=calcHistPay(r.scores,r.teams,pot,pl,seg);
                    if(!rows.length)return null;
                    return(
                      <div key={l} style={{marginBottom:9}}>
                        <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>{l}</div>
                        {rows.map((row,i)=>(
                          <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0',borderBottom:'1px solid #f8fafc'}}>
                            <span style={{color:'#475569'}}>{row.label}{row.names?' — '+row.names:''}</span>
                            <span style={{fontWeight:700,color:row.isTie?'#f59e0b':'#15803d'}}>{f$(row.amt)}{row.isTie?' ea':''}</span>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                  {parseFloat(r.scores.skinsPot||0)>0&&(
                    <div style={{marginBottom:9}}>
                      <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>Skins</div>
                      {Object.entries(r.scores.skinCounts||{}).filter(([,c])=>c>0).map(([tid,c])=>{
                        const t=r.teams.find(t=>String(t.id)===String(tid));
                        const net=Math.max(0,parseFloat(r.scores.skinsPot||0)-(r.scores.tournFund||0));
                        const total=Object.values(r.scores.skinCounts||{}).reduce((s,x)=>s+x,0);
                        return t?<div key={tid} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0',borderBottom:'1px solid #f8fafc'}}><span style={{color:'#475569'}}>{t.name} — {c} skin{c!==1?'s':''}</span><span style={{fontWeight:700,color:'#15803d'}}>{f$(total>0?(net/total)*c:0)}</span></div>:null;
                      })}
                    </div>
                  )}
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:700,borderTop:'2px solid #0f172a',paddingTop:8}}>
                    <span>Total pot</span><span style={{color:'#15803d'}}>{f$((r.playerCount||0)*25)}</span>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

        </div>
        {showRoster&&(

            <div className="fr" style={{marginBottom:8}}>

              <div className="fg" style={{marginBottom:0}}><label className="fl">Email (opt)</label><input className="fi" placeholder="email" value={np.email} onChange={e=>setNp({...np,email:e.target.value})}/></div>

}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [role,setRole]=useState(null);
  const [tab,setTab]=useState('home');
  const [isAdmin,setIsAdmin]=useState(false);
  const [isDemo,setIsDemo]=useState(false);
  const [week,setWeek]=useState(null);
  const [history,setHistory]=useState({});
  const [extra,setExtra]=useState([]);
  const {ready,read,write,push,del}=useDB();
  const fullRoster=[...ROSTER,...extra];

  useEffect(()=>{
    if(!ready||isDemo)return;
    const u=[];
    u.push(read('week',v=>setWeek(v)));
    u.push(read('history',v=>setHistory(v||{})));
    u.push(read('extraPlayers',v=>setExtra(v||[])));
    return()=>u.forEach(f=>{if(typeof f==='function')f();});
  },[ready,isDemo]);

  function createWeek(data){
    write('week',{...data,signups:{},teams:{},scores:{},complete:{},teaTimes:{},teamsPublished:{}});
  }

  function archiveDay(day){
    if(!week)return;
    const daySignups=Object.values(week.signups||{}).filter(s=>s.day===day);
    const dayTeams=(week.teams&&week.teams[day])||[];
    const dayScores=(week.scores&&week.scores[day])||null;
    const dayDate=(week.dates&&week.dates[day])||td();
    push('history',{day,date:dayDate,teams:dayTeams,scores:dayScores,playerCount:daySignups.length,archivedAt:Date.now()});
    const newWeek={...week};
    newWeek.activeDays=(newWeek.activeDays||[]).filter(d=>d!==day);
    const newSignups={};
    Object.entries(week.signups||{}).forEach(([k,s])=>{if(s.day!==day)newSignups[k]=s;});
    newWeek.signups=newSignups;
    if(newWeek.teams)delete newWeek.teams[day];
    if(newWeek.scores)delete newWeek.scores[day];
    if(newWeek.complete)delete newWeek.complete[day];
    write('week',newWeek);
  }

  function saveTeams(day,teams){
    const newWeek={...week,teams:{...(week.teams||{}),[day]:teams}};
    write('week',newWeek);
  }

  function publishTeams(day){
    const newWeek={...week,teamsPublished:{...(week.teamsPublished||{}),[day]:true}};
    write('week',newWeek);
  }

  function markComplete(day){
    const newWeek={...week,complete:{...(week.complete||{}),[day]:true}};
    write('week',newWeek);
    setTab('scoring');
  }

  function reopenDay(day){
    const newWeek={...week,complete:{...(week.complete||{}),[day]:false}};
    write('week',newWeek);
  }

  function updateTeeTime(day,data){
    const newWeek={...week,teeTimes:{...(week.teeTimes||{}),[day]:data}};
    write('week',newWeek);
  }

  function saveScores(day,scores){
    const newWeek={...week,scores:{...(week.scores||{}),[day]:scores}};
    write('week',newWeek);
  }

  function moveToHistory(day){
    archiveDay(day);
    setTab('history');
  }

  function updateSignup(key,vals){
    const s=week&&week.signups&&week.signups[key];
    if(s)write('week/signups/'+key,{...s,...vals});
  }

  function startDemo(){
    const d=makeDemoData();
    const wd=getWeekDates();
    setWeek({activeDays:['Saturday'],dates:{Saturday:wd.Saturday},signups:d.signups,teams:{Saturday:d.teams},scores:{Saturday:d.scores},complete:{Saturday:false},teamsPublished:{Saturday:true},teeTimes:{Saturday:{time:'08:30',lottery:false}}});
    setIsDemo(true);setIsAdmin(true);setRole('admin');setTab('home');
  }

  function editHistoryRound(key,round){
    if(window.confirm('Reopen this round for editing? It will be removed from history and restored as the active round for '+round.day+'.')){
      del('history/'+key);
      const newWeek=week?{...week}:{activeDays:[],dates:{},signups:{},teams:{},scores:{},complete:{},teeTimes:{},teamsPublished:{}};
      if(!newWeek.activeDays.includes(round.day))newWeek.activeDays=[...(newWeek.activeDays||[]),round.day];
      if(newWeek.dates)newWeek.dates[round.day]=round.date;
      if(round.teams)newWeek.teams={...(newWeek.teams||{}),[round.day]:round.teams};
      if(round.scores)newWeek.scores={...(newWeek.scores||{}),[round.day]:round.scores};
      newWeek.complete={...(newWeek.complete||{}),[round.day]:true};
      newWeek.teamsPublished={...(newWeek.teamsPublished||{}),[round.day]:true};
      write('week',newWeek);
      setTab('scoring');
    }
  }

  if(!role){
    return<Landing onPlayer={()=>{setRole('player');setTab('home');}} onAdmin={()=>{setRole('admin');setIsAdmin(true);setTab('home');}} onDemo={startDemo}/>;
  }

  const activeDays=(week&&week.activeDays)||[];
  const totalSignups=Object.keys((week&&week.signups)||{}).length;
  const hasScores=activeDays.some(d=>week&&week.scores&&week.scores[d]&&week.scores[d].savedAt);
  const scoringVisible=isAdmin||hasScores;

  const PTABS=[
    {id:'home',label:'This Week',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>},
    {id:'teams',label:'Teams',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>},
    {id:'scoring',label:'Scoring',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="8 21 12 21 16 21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M7 4H4a2 2 0 00-2 2v1c0 4 3 7 7 7h2c4 0 7-3 7-7V6a2 2 0 00-2-2h-3"/><rect x="7" y="2" width="10" height="5" rx="1"/></svg>,locked:!scoringVisible},
    {id:'history',label:'History',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>},
  ];
  const ATABS=[...PTABS.map(t=>({...t,locked:false})),{id:'admin',label:'Admin',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>}];
  const TABS=role==='admin'?ATABS:PTABS;

  return(
    <div className="app">
      <div className="hdr">
        <div className="hdr-curve"></div>
        <div className="hdr-inner">
          <div className="hdr-top">
            <div>
              <div className="hdr-brand">Clark <em>Golf</em> Group</div>
              <div className="hdr-week">{getWeekLabel()}</div>
            </div>
            <div className="hdr-right">
              {isAdmin&&<span className="admin-tag">Admin</span>}
              {isDemo&&<span className="demo-tag">Demo</span>}
              <button className="switch-btn" onClick={()=>{setRole(null);setIsAdmin(false);setIsDemo(false);}}>Switch</button>
            </div>
          </div>
          <div className="hdr-stats">
            {activeDays.length>0?activeDays.map(d=>{
              const cnt=Object.values((week&&week.signups)||{}).filter(s=>s.day===d).length;
              return<div key={d} className="hdr-stat"><div className="hdr-stat-n">{cnt}</div><div className="hdr-stat-l">{d.slice(0,3)}</div></div>;
            }):[<div key="t" className="hdr-stat"><div className="hdr-stat-n">{totalSignups}</div><div className="hdr-stat-l">Signed Up</div></div>,<div key="d" className="hdr-stat"><div className="hdr-stat-n">0</div><div className="hdr-stat-l">Days</div></div>,<div key="tm" className="hdr-stat"><div className="hdr-stat-n">0</div><div className="hdr-stat-l">Teams</div></div>]}
          </div>
          <div style={{marginTop:7}}>
            {activeDays.length>0?(
              <div className="hdr-pill"><span className="hdr-dot"></span>{activeDays.join(' / ')}</div>
            ):(
              <div className="hdr-pill" style={{opacity:0.35}}>No games scheduled</div>
            )}
          </div>
        </div>
      </div>

      <nav className="nav">
        {TABS.map(t=>(
          <button key={t.id} className={'nb'+(tab===t.id?' on':'')+(t.locked?' locked':'')} onClick={()=>{if(!t.locked)setTab(t.id);}}>
            {t.icon}{t.label}
          </button>
        ))}
      </nav>

      <div className="content">
        {tab==='home'&&<WeekView week={week} isAdmin={isAdmin} isDemo={isDemo} onSignup={d=>write('week/signups/'+Date.now(),d)} onRemove={k=>del('week/signups/'+k)} onUpdateSignup={updateSignup} onUpdateTeeTime={updateTeeTime} onMarkComplete={markComplete} onReopenDay={reopenDay}/>}
        {tab==='teams'&&<TeamsView week={week} isAdmin={isAdmin} onSaveTeams={saveTeams} onPublishTeams={publishTeams}/>}
        {tab==='scoring'&&<ScoringView week={week} isAdmin={isAdmin} onSaveScores={saveScores} onMoveToHistory={moveToHistory}/>}
        {tab==='history'&&<HistoryView history={history} isAdmin={isAdmin} onDelete={k=>del('history/'+k)} onClearAll={()=>write('history',{})} onEditRound={editHistoryRound}/>}
        {tab==='admin'&&<AdminView isAdmin={isAdmin} onLogout={()=>{setIsAdmin(false);setRole(null);}} week={week} onCreate={createWeek} onArchiveDay={archiveDay} onAddPlayer={p=>write('extraPlayers',[...extra,{...p,id:1000+extra.length+1}])} onRemovePlayer={id=>write('extraPlayers',extra.filter(p=>p.id!==id))} roster={fullRoster} onRemoveSignup={k=>del('week/signups/'+k)} onAddSignup={d=>write('week/signups/'+Date.now(),d)}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
