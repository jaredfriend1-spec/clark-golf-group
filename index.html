          )}

          {/* Reopen */}
          {scoresSaved&&(
            <button className="btn btn-outline btn-sm" style={{alignSelf:'flex-start'}} onClick={()=>onReopenDay(activeDay)}>
              Reopen / Edit Scores
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ── HISTORY VIEW ─────────────────────────────────────────────────────────────
function HistoryView({history,isAdmin,onDelete,onClearAll,onEditRound}){
  const [open,setOpen]=useState(null);
  const rounds=Object.entries(history||{}).sort((a,b)=>(b[1].date||'').localeCompare(a[1].date||''));

  if(!rounds.length){
    return(
      <div className="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div className="empty-title">No rounds yet</div>
        <div className="empty-sub">Completed rounds appear here.</div>
      </div>
    );
  }

  function calcHistPay(scores,teams,pot,places,seg){
    const p=parseFloat(pot||0);if(!p||!teams)return[];
    const sc=teams.map(t=>({...t,score:parseFloat((scores.teamScores&&scores.teamScores[t.id]?scores.teamScores[t.id][seg]:NaN))})).filter(t=>!isNaN(t.score));
    if(!sc.length)return[];
    sc.sort((a,b)=>a.score-b.score);
    const best=sc[0].score;const tied=sc.filter(t=>t.score===best);const second=sc.find(t=>t.score!==best);
    const rows=[];
    if(tied.length>1){const split=places===1?p/tied.length:(p*0.6+p*0.4)/tied.length;rows.push({label:'1st Tie',names:tied.map(t=>t.name).join(' & '),amt:split,isTie:true});}
    else{rows.push({label:'1st',names:tied[0]?tied[0].name:'',amt:places===1?p:p*0.6,isTie:false});if(places===2&&second)rows.push({label:'2nd',names:second.name,amt:p*0.4,isTie:false});}
    return rows;
  }

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div className="slbl" style={{marginBottom:0}}>{rounds.length} round{rounds.length!==1?'s':''} on record</div>
        {isAdmin&&rounds.length>0&&<button className="btn btn-red btn-xs" onClick={onClearAll}>Clear all</button>}
      </div>
      {rounds.map(([k,r])=>(
        <div key={k} className="hi">
          <div className="hi-hdr" onClick={()=>setOpen(open===k?null:k)}>
            <div>
              <div className="hi-title">{r.day} — {fmtDFull(r.date)}</div>
              <div className="hi-meta">{r.playerCount||0} players — {f$((r.playerCount||0)*25)} pot</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              {isAdmin&&<button className="btn btn-outline btn-xs" onClick={e=>{e.stopPropagation();onEditRound(k,r);}}>Edit</button>}
              {isAdmin&&<button className="btn btn-red btn-xs" onClick={e=>{e.stopPropagation();onDelete(k);}}>Delete</button>}
              <svg style={{width:15,height:15,color:'#94a3b8',transition:'transform 0.2s',transform:open===k?'rotate(180deg)':'none',flexShrink:0}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          {open===k&&(
            <div className="hi-body">
              {r.teams&&r.teams.map(t=>(
                <div key={t.id} style={{marginBottom:9}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#10b981',marginBottom:3}}>{t.name} <span style={{fontWeight:500,color:'#94a3b8',fontSize:11}}>HCP {t.totalHcp&&t.totalHcp.toFixed(1)}</span></div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {t.players&&t.players.map((p,i)=><span key={i} style={{fontSize:11,background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:'2px 7px',display:'inline-flex',alignItems:'center',gap:4}}><span className="slot" style={{fontSize:9,padding:'1px 4px'}}>{p.slot}</span>{p.name}</span>)}
                  </div>
                </div>
              ))}
              {r.scores&&r.teams&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid #f1f5f9'}}>
                  <div className="slbl">Scores</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr repeat(3,44px)',gap:'3px 5px',fontSize:12,marginBottom:11}}>
                    <div style={{color:'#94a3b8',fontWeight:600}}>Team</div>
                    {['Front','Back','Ovr'].map(h=><div key={h} style={{color:'#94a3b8',textAlign:'center',fontWeight:600}}>{h}</div>)}
                    {r.teams.map(t=>{
                      const sc=(r.scores.teamScores&&r.scores.teamScores[t.id])||{};
                      return(
                        <React.Fragment key={t.id}>
                          <div style={{fontWeight:600}}>{t.name}</div>
                          {['front','back','overall'].map(s=>{const v=sc[s];return<div key={s} style={{textAlign:'center',fontWeight:600,color:typeof v==='number'?v<0?'#15803d':v>0?'#dc2626':'#0f172a':'#94a3b8'}}>{typeof v==='number'?(v>0?'+'+v:v):'--'}</div>;})}
                        </React.Fragment>
                      );
                    })}
                  </div>
                  <div className="slbl">Payouts</div>
                  {[{l:'Front 9',pot:r.scores.frontPot,pl:r.scores.frontPlaces||2,seg:'front'},{l:'Back 9',pot:r.scores.backPot,pl:r.scores.backPlaces||2,seg:'back'},{l:'Overall',pot:r.scores.overallPot,pl:r.scores.overallPlaces||2,seg:'overall'}].map(({l,pot,pl,seg})=>{
                    const rows=calcHistPay(r.scores,r.teams,pot,pl,seg);
                    if(!rows.length)return null;
                    return(
                      <div key={l} style={{marginBottom:9}}>
                        <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>{l}</div>
                        {rows.map((row,i)=>(
                          <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0',borderBottom:'1px solid #f8fafc'}}>
                            <span style={{color:'#475569'}}>{row.label}{row.names?' — '+row.names:''}</span>
                            <span style={{fontWeight:700,color:row.isTie?'#f59e0b':'#15803d'}}>{f$(row.amt)}{row.isTie?' ea':''}</span>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                  {parseFloat(r.scores.skinsPot||0)>0&&(
                    <div style={{marginBottom:9}}>
                      <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:3}}>Skins</div>
                      {Object.entries(r.scores.skinCounts||{}).filter(([,c])=>c>0).map(([tid,c])=>{
                        const t=r.teams.find(t=>String(t.id)===String(tid));
                        const net=Math.max(0,parseFloat(r.scores.skinsPot||0)-(r.scores.tournFund||0));
                        const total=Object.values(r.scores.skinCounts||{}).reduce((s,x)=>s+x,0);
                        return t?<div key={tid} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0',borderBottom:'1px solid #f8fafc'}}><span style={{color:'#475569'}}>{t.name} — {c} skin{c!==1?'s':''}</span><span style={{fontWeight:700,color:'#15803d'}}>{f$(total>0?(net/total)*c:0)}</span></div>:null;
                      })}
                    </div>
                  )}
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:700,borderTop:'2px solid #0f172a',paddingTop:8}}>
                    <span>Total pot</span><span style={{color:'#15803d'}}>{f$((r.playerCount||0)*25)}</span>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── ADMIN VIEW ───────────────────────────────────────────────────────────────
function AdminView({isAdmin,onLogout,week,onCreate,onAddPlayer,onRemovePlayer,roster,onRemoveSignup,onAddSignup,onArchiveDay,onUpdateTeeTime}){
  const [showCreate,setShowCreate]=useState(!(week&&week.activeDays&&week.activeDays.length>0));
  const [selDays,setSelDays]=useState({Friday:true,Saturday:true,Sunday:true});
  const [teeTimes,setTeeTimes]=useState({Friday:'',Saturday:'',Sunday:''});
  const [lotteries,setLotteries]=useState({Friday:false,Saturday:false,Sunday:false});
  const [addQ,setAddQ]=useState('');
  const [quickAddSel,setQuickAddSel]=useState(null);
  const [quickAddTee,setQuickAddTee]=useState('Whites');
  const [quickAddHcp,setQuickAddHcp]=useState('');
  const [addDay,setAddDay]=useState('Saturday');
  const [showRoster,setShowRoster]=useState(false);
  const [np,setNp]=useState({name:'',tee:'Whites',hcp:''});
  const [gp,setGp]=useState({name:'',tee:'Whites',hcp:''});
  const [showGuest,setShowGuest]=useState(false);
  const [editTeeDay,setEditTeeDay]=useState(null);
  const [editTeeVal,setEditTeeVal]=useState('');
  const [addDayModal,setAddDayModal]=useState(false);
  const [newDay,setNewDay]=useState('Friday');
  const wd=getWeekDates();
  const rosterSearch=[...ROSTER,...(roster.filter(p=>p.id>96))].filter(p=>p.name.toLowerCase().includes(addQ.toLowerCase())).slice(0,12);
  const activeDays=(week&&week.activeDays)||[];
  const allSignups=week&&week.signups?Object.entries(week.signups):[];

  function createWeek(){
    const days=DAYS_OF_WEEK.filter(d=>selDays[d]);
    if(!days.length){return;}
    const dates={};const tt={};
    days.forEach(d=>{
      dates[d]=wd[d];
      if(teeTimes[d]||lotteries[d])tt[d]={time:lotteries[d]?'LOTTERY':teeTimes[d],lottery:lotteries[d]};
    });
    onCreate({activeDays:days,dates,teeTimes:tt,createdAt:Date.now()});
    setShowCreate(false);
  }

  function _unused(){
    if(!newDay||activeDays.includes(newDay))return;
    const newWeek={...week,activeDays:[...activeDays,newDay],dates:{...(week.dates||{}),[newDay]:wd[newDay]}};
    onCreate(newWeek);
    setAddDayModal(false);
  }

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <span className="admin-tag">Admin</span>
          <span style={{fontSize:14,fontWeight:600}}>Control Panel</span>
        </div>
        <button className="btn btn-outline btn-sm" onClick={onLogout}>Sign out</button>
      </div>

      {/* Create/manage week */}
      <div className="card" style={{marginBottom:10}}>
        <div className="section-btn" onClick={()=>setShowCreate(!showCreate)}>
          <div className="section-title">{activeDays.length?'Current week — '+activeDays.join(', '):'Set up this week'}</div>
          <svg style={{width:15,height:15,color:'#94a3b8',transform:showCreate?'rotate(180deg)':'none',transition:'transform 0.2s'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        {showCreate&&(
          <div className="section-body">
            <div style={{fontSize:12,fontWeight:500,color:'#64748b',marginBottom:10}}>Select days for {getWeekLabel()}</div>
            {DAYS_OF_WEEK.map(d=>(
              <div key={d} style={{marginBottom:12,paddingBottom:12,borderBottom:'1px solid #f1f5f9'}}>
                <label className="cb-row" style={{marginBottom:selDays[d]?8:0}}>
                  <input type="checkbox" checked={selDays[d]||false} onChange={e=>setSelDays(p=>({...p,[d]:e.target.checked}))}/>
                  <div>
                    <div className="cb-label">{d}</div>
                    <div className="cb-sub">{fmtDFull(wd[d])}</div>
                  </div>
                </label>
                {selDays[d]&&(
                  <div style={{marginLeft:26}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                      <input type="checkbox" checked={lotteries[d]||false} onChange={e=>setLotteries(p=>({...p,[d]:e.target.checked}))} id={'lot'+d}/>
                      <label htmlFor={'lot'+d} style={{fontSize:12,fontWeight:500,color:'#64748b',cursor:'pointer'}}>Waiting on lottery</label>
                    </div>
                    {!lotteries[d]&&(
                      <div>
                        <label className="fl">Tee time (optional)</label>
                        <TimePicker onChange={v=>setTeeTimes(p=>({...p,[d]:v}))}/>
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
            <button className="btn btn-green btn-full btn-sm" style={{marginTop:6}} onClick={createWeek}>
              {activeDays.length?'Create new week (replaces current)':'Create week'}
            </button>
            {activeDays.length>0&&(
              <button className="btn btn-outline btn-full btn-sm" style={{marginTop:8}} onClick={()=>setAddDayModal(true)}>
                Add a day to current week
              </button>
            )}
          </div>
        )}
      </div>

      {/* Tee time editing per day */}
      {activeDays.length>0&&(
        <div className="card card-pad" style={{marginBottom:10}}>
          <div className="slbl">Tee times</div>
          {activeDays.map(d=>{
            const ti=week&&week.teeTimes&&week.teeTimes[d];
            return(
              <div key={d} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid #f8fafc'}}>
                <div>
                  <span style={{fontSize:13,fontWeight:600}}>{d}</span>
                  {ti&&<span style={{fontSize:11,color:'#64748b',marginLeft:8}}>{ti.lottery?'Lottery':ti.time}</span>}
                  {!ti&&<span style={{fontSize:11,color:'#94a3b8',marginLeft:8}}>No tee time set</span>}
                </div>
                <button className="btn btn-outline btn-xs" onClick={()=>{setEditTeeDay(d);setEditTeeVal(ti&&!ti.lottery?ti.time:'');}}>
                  {ti?'Edit':'Set'}
                </button>
              </div>
            );
          })}
        </div>
      )}

      {/* Manage sign-ups */}
      {activeDays.length>0&&(
        <div className="card card-pad" style={{marginBottom:10}}>
          <div className="slbl">Manage sign-ups</div>
          <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'center'}}>
            <select className="fs" style={{flex:1}} value={addDay} onChange={e=>setAddDay(e.target.value)}>
              {activeDays.map(d=><option key={d}>{d}</option>)}
            </select>
            <span style={{fontSize:12,color:'#94a3b8',flexShrink:0}}>{allSignups.filter(([,s])=>s.day===addDay).length} signed up</span>
          </div>
          <div className="sw" style={{marginBottom:8}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input className="si" placeholder="Quick-add player..." value={addQ} onChange={e=>setAddQ(e.target.value)}/>
          </div>
          {addQ.length>0&&(
            <div style={{border:'1px solid #e2e8f0',borderRadius:9,marginBottom:10,maxHeight:220,overflowY:'auto'}}>
              {rosterSearch.map(p=>{
                const inDay=allSignups.some(([,s])=>s.day===addDay&&s.name===p.name);
                const isExpanded=quickAddSel===p.id;
                return(
                  <div key={p.id} style={{borderBottom:'1px solid #f1f5f9'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 11px'}}>
                      <span style={{fontSize:13,fontWeight:500,color:inDay?'#94a3b8':'#0f172a'}}>{p.name}{inDay?' (signed up)':''}</span>
                      {!inDay&&<button className="btn btn-green btn-xs" onClick={()=>setQuickAddSel(isExpanded?null:p.id)}>
                        {isExpanded?'Cancel':'Add'}
                      </button>}
                    </div>
                    {isExpanded&&!inDay&&(
                      <div style={{padding:'0 11px 10px',display:'flex',gap:6,flexWrap:'wrap',alignItems:'flex-end'}}>
                        <div style={{flex:'1 1 80px'}}>
                          <label className="fl">Tees</label>
                          <select className="fs" value={quickAddTee} onChange={e=>setQuickAddTee(e.target.value)}>
                            {TEES.map(t=><option key={t}>{t}</option>)}
                          </select>
                        </div>
                        <div style={{flex:'1 1 70px'}}>
                          <label className="fl">HCP</label>
                          <input className="fi" type="number" placeholder="e.g. 14" value={quickAddHcp} onChange={e=>setQuickAddHcp(e.target.value)}/>
                        </div>
                        <button className="btn btn-green btn-sm" disabled={!quickAddHcp} style={{opacity:!quickAddHcp?0.4:1,alignSelf:'flex-end'}}
                          onClick={()=>{
                            onAddSignup({playerId:p.id,name:p.name,tee:quickAddTee,handicap:parseFloat(quickAddHcp)||10,day:addDay,signedUpAt:Date.now()});
                            setAddQ('');setQuickAddSel(null);setQuickAddHcp('');setQuickAddTee('Whites');
                          }}>Confirm</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          {/* Guest quick-add */}
          <button className="btn btn-outline btn-sm" style={{marginBottom:8}} onClick={()=>setShowGuest(!showGuest)}>
            {showGuest?'Cancel':'+ Add Guest'}
          </button>
          {showGuest&&(
            <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:9,padding:12,marginBottom:10}}>
              <div className="fr" style={{marginBottom:8}}>
                <div className="fg" style={{marginBottom:0}}><label className="fl">Guest name</label><input className="fi" placeholder="Full name" value={gp.name} onChange={e=>setGp({...gp,name:e.target.value})}/></div>
                <div className="fg" style={{marginBottom:0}}><label className="fl">Tees</label><select className="fs" value={gp.tee} onChange={e=>setGp({...gp,tee:e.target.value})}>{TEES.map(t=><option key={t}>{t}</option>)}</select></div>
              </div>
              <div className="fr">
                <div className="fg" style={{marginBottom:0}}><label className="fl">Handicap</label><input className="fi" type="number" placeholder="e.g. 14" value={gp.hcp} onChange={e=>setGp({...gp,hcp:e.target.value})}/></div>
                <div style={{display:'flex',alignItems:'flex-end',paddingBottom:0}}>
                  <button className="btn btn-green btn-sm" onClick={()=>{
                    if(!gp.name||!gp.hcp)return;
                    onAddSignup({playerId:'g_'+Date.now(),name:gp.name,isGuest:true,tee:gp.tee,handicap:parseFloat(gp.hcp),day:addDay,signedUpAt:Date.now()});
                    onAddPlayer({name:gp.name,isGuest:true});
                    setGp({name:'',tee:'Whites',hcp:''});setShowGuest(false);
                  }}>Add Guest</button>
                </div>
              </div>
            </div>
          )}
          <div style={{maxHeight:190,overflowY:'auto'}}>
            {allSignups.filter(([,s])=>s.day===addDay).sort((a,b)=>a[1].signedUpAt-b[1].signedUpAt).map(([key,s])=>(
              <div key={key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid #f8fafc'}}>
                <div>
                  <span style={{fontSize:13,fontWeight:600}}>{s.name}</span>
                  <span style={{fontSize:11,color:'#94a3b8',marginLeft:6}}>{s.tee} HCP {s.handicap}</span>
                  {s.isGuest&&<span className="guest-tag" style={{marginLeft:4}}>Guest</span>}
                </div>
                <button className="rm-btn" onClick={()=>onRemoveSignup(key)}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Quick-add player to roster with tee/hcp */}
      <div className="card" style={{marginBottom:10}}>
        <div className="section-btn" onClick={()=>setShowRoster(!showRoster)}>
          <div className="section-title">Roster ({[...ROSTER,...roster.filter(p=>p.id>96)].length} members)</div>
          <svg style={{width:15,height:15,color:'#94a3b8',transform:showRoster?'rotate(180deg)':'none',transition:'transform 0.2s'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        {showRoster&&(
          <div className="section-body">
            <div className="fr" style={{marginBottom:8}}>
              <div className="fg" style={{marginBottom:0}}><label className="fl">Name</label><input className="fi" placeholder="Full name" value={np.name} onChange={e=>setNp({...np,name:e.target.value})}/></div>
              <div className="fg" style={{marginBottom:0}}><label className="fl">Default Tees</label><select className="fs" value={np.tee} onChange={e=>setNp({...np,tee:e.target.value})}>{TEES.map(t=><option key={t}>{t}</option>)}</select></div>
            </div>
            <div className="fr" style={{marginBottom:8}}>
              <div className="fg" style={{marginBottom:0}}><label className="fl">Handicap</label><input className="fi" type="number" placeholder="e.g. 14" value={np.hcp} onChange={e=>setNp({...np,hcp:e.target.value})}/></div>
              <div style={{display:'flex',alignItems:'flex-end'}}>
                <button className="btn btn-green btn-sm" onClick={()=>{if(np.name){onAddPlayer({name:np.name,tee:np.tee,handicap:parseFloat(np.hcp)||0});setNp({name:'',tee:'Whites',hcp:''});}}}>Add</button>
              </div>
            </div>
            <div style={{maxHeight:220,overflowY:'auto',marginTop:8}}>
              {[...ROSTER,...roster.filter(p=>p.id>96)].map(p=>(
                <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #f8fafc',fontSize:13}}>
                  <span style={{fontWeight:500}}>{p.name}{p.isGuest&&<span className="guest-tag" style={{marginLeft:4}}>Guest</span>}</span>
                  <div style={{display:'flex',gap:5,alignItems:'center'}}>
                    {p.id>96&&<span className="pill-green">New</span>}
                    {p.id>96&&<button className="rm-btn" onClick={()=>onRemovePlayer(p.id)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg></button>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Add day modal */}
      {addDayModal&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setAddDayModal(false);}}>
          <div className="modal">
            <div className="modal-handle"></div>
            <div className="modal-title">Add a day to this week</div>
            <div className="fg">
              <label className="fl">Day</label>
              <select className="fs" value={newDay} onChange={e=>setNewDay(e.target.value)}>
                {DAYS_OF_WEEK.filter(d=>!activeDays.includes(d)).map(d=>(
                  <option key={d}>{d} — {fmtDFull(wd[d])}</option>
                ))}
              </select>
            </div>
            {DAYS_OF_WEEK.filter(d=>!activeDays.includes(d)).length===0&&(
              <div className="alert alert-blue">All three days are already active.</div>
            )}
            <button className="btn btn-green btn-full" onClick={()=>{const day=newDay.split(' ')[0];if(!activeDays.includes(day)){const newWeek={...week,activeDays:[...activeDays,day],dates:{...(week.dates||{}),[day]:wd[day]}};onCreate(newWeek);}setAddDayModal(false);}}>Add Day</button>
          </div>
        </div>
      )}

      {/* Edit tee time modal */}
      {editTeeDay&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setEditTeeDay(null);}}>
          <div className="modal">
            <div className="modal-handle"></div>
            <div className="modal-title">Tee time — {editTeeDay}</div>
            <div className="fg" style={{marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#f8fafc',borderRadius:9,border:'1.5px solid #e2e8f0',cursor:'pointer',marginBottom:10}}
                onClick={()=>onUpdateTeeTime(editTeeDay,{time:'LOTTERY',lottery:true})&&setEditTeeDay(null)}>
                <span style={{fontSize:13,fontWeight:600}}>Set as Lottery</span>
              </div>
            </div>
            <div className="fg"><label className="fl">Set confirmed time</label><TimePicker onChange={setEditTeeVal}/></div>
            <button className="btn btn-green btn-full" onClick={()=>{onUpdateTeeTime(editTeeDay,{time:editTeeVal,lottery:false});setEditTeeDay(null);}}>Save time</button>
            <button className="btn btn-outline btn-full" style={{marginTop:8}} onClick={()=>{onUpdateTeeTime(editTeeDay,null);setEditTeeDay(null);}}>Remove tee time</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [role,setRole]=useState(null);
  const [tab,setTab]=useState('home');
  const [isAdmin,setIsAdmin]=useState(false);
  const [isDemo,setIsDemo]=useState(false);
  const [week,setWeek]=useState(null);
  const [history,setHistory]=useState({});
  const [extra,setExtra]=useState([]);
  const {ready,read,write,push,del}=useDB();
  const fullRoster=[...ROSTER,...extra];

  useEffect(()=>{
    if(!ready||isDemo)return;
    const u=[];
    u.push(read('week',v=>setWeek(v)));
    u.push(read('history',v=>setHistory(v||{})));
    u.push(read('extraPlayers',v=>setExtra(v||[])));
    return()=>u.forEach(f=>{if(typeof f==='function')f();});
  },[ready,isDemo]);

  function createWeek(data){
    write('week',{activeDays:[],dates:{},signups:{},teams:{},scores:{},complete:{},teeTimes:{},teamsPublished:{},...data});
  }

  function archiveDay(day){
    if(!week)return;
    const daySignups=Object.values(week.signups||{}).filter(s=>s.day===day);
    const dayTeams=(week.teams&&week.teams[day])||[];
    const dayScores=(week.scores&&week.scores[day])||null;
    const dayDate=(week.dates&&week.dates[day])||td();
    push('history',{day,date:dayDate,teams:dayTeams,scores:dayScores,playerCount:daySignups.length,archivedAt:Date.now()});
    const newWeek={...week};
    newWeek.activeDays=(newWeek.activeDays||[]).filter(d=>d!==day);
    const ns={};
    Object.entries(week.signups||{}).forEach(([k,s])=>{if(s.day!==day)ns[k]=s;});
    newWeek.signups=ns;
    const nt={...(week.teams||{})};delete nt[day];newWeek.teams=nt;
    const nsc={...(week.scores||{})};delete nsc[day];newWeek.scores=nsc;
    const nc={...(week.complete||{})};delete nc[day];newWeek.complete=nc;
    write('week',newWeek);
  }

  function saveTeams(day,teams){write('week',{...week,teams:{...(week.teams||{}),[day]:teams}});}
  function publishTeams(day){write('week',{...week,teamsPublished:{...(week.teamsPublished||{}),[day]:true}});}
  function markComplete(day){write('week',{...week,complete:{...(week.complete||{}),[day]:true}});}
  function reopenDay(day){
    const sc=(week.scores&&week.scores[day])||{};
    write('week',{...week,
      complete:{...(week.complete||{}),[day]:false},
      scores:{...(week.scores||{}),[day]:{...sc,payoutsCalculated:false,savedAt:sc.savedAt||null}}
    });
  }
  function updateTeeTime(day,data){
    const tt={...(week.teeTimes||{})};
    if(data===null)delete tt[day];else tt[day]=data;
    write('week',{...week,teeTimes:tt});
  }
  function saveScores(day,scores){write('week',{...week,scores:{...(week.scores||{}),[day]:scores}});}
  function calcPayouts(day,scores){
    write('week',{...week,scores:{...(week.scores||{}),[day]:scores},complete:{...(week.complete||{}),[day]:true}});
  }
  function moveToHistory(day){archiveDay(day);setTab('history');}
  function updateSignup(key,vals){const s=week&&week.signups&&week.signups[key];if(s)write('week/signups/'+key,{...s,...vals});}
  function addPlayer(p){
    const newExtra=[...extra,{...p,id:1000+extra.length+1}];
    write('extraPlayers',newExtra);
  }
  function removePlayer(id){write('extraPlayers',extra.filter(p=>p.id!==id));}
  function toggleLock(day,locked){write('week',{...week,locked:{...(week.locked||{}),[day]:locked}});}
  function editHistoryRound(key,round){
    del('history/'+key);
    const newWeek=week?{...week}:{activeDays:[],dates:{},signups:{},teams:{},scores:{},complete:{},teeTimes:{},teamsPublished:{}};
    if(!newWeek.activeDays.includes(round.day))newWeek.activeDays=[...(newWeek.activeDays||[]),round.day];
    newWeek.dates={...(newWeek.dates||{}),[round.day]:round.date};
    if(round.teams)newWeek.teams={...(newWeek.teams||{}),[round.day]:round.teams};
    if(round.scores)newWeek.scores={...(newWeek.scores||{}),[round.day]:round.scores};
    newWeek.complete={...(newWeek.complete||{}),[round.day]:true};
    newWeek.teamsPublished={...(newWeek.teamsPublished||{}),[round.day]:true};
    write('week',newWeek);
    setTab('scoring');
  }

  function startDemo(){
    const d=makeDemoData();
    const wd=getWeekDates();
    setWeek({activeDays:['Saturday'],dates:{Saturday:wd.Saturday},signups:d.signups,teams:{Saturday:d.teams},scores:{Saturday:d.scores},complete:{Saturday:false},teamsPublished:{Saturday:true},teeTimes:{Saturday:{time:'08:30',lottery:false}},locked:{}});
    setHistory({});
    setIsDemo(true);setIsAdmin(true);setRole('admin');setTab('home');
  }

  if(!role){
    return<Landing onPlayer={()=>{setRole('player');setTab('home');}} onAdmin={()=>{setRole('admin');setIsAdmin(true);setTab('home');}} onDemo={startDemo}/>;
  }

  const activeDays=(week&&week.activeDays)||[];
  const hasScores=activeDays.some(d=>week&&week.scores&&week.scores[d]&&week.scores[d].savedAt);
  const hasPayouts=activeDays.some(d=>week&&week.scores&&week.scores[d]&&week.scores[d].payoutsCalculated);
  const scoringVisible=isAdmin||hasScores;

  const PTABS=[
    {id:'home',label:'This Week',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>},
    {id:'teams',label:'Teams',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>},
    {id:'scoring',label:'Scoring',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="8 21 12 21 16 21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M7 4H4a2 2 0 00-2 2v1c0 4 3 7 7 7h2c4 0 7-3 7-7V6a2 2 0 00-2-2h-3"/><rect x="7" y="2" width="10" height="5" rx="1"/></svg>,locked:!scoringVisible},
    {id:'history',label:'History',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>},
  ];
  const ATABS=[...PTABS.map(t=>({...t,locked:false})),{id:'admin',label:'Admin',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>}];
  const TABS=role==='admin'?ATABS:PTABS;

  return(
    <div className="app">
      <div className="hdr">
        <div className="hdr-curve"></div>
        <div className="hdr-inner">
          <div className="hdr-top">
            <div>
              <div className="hdr-brand">Clark <em>Golf</em> Group</div>
              <div className="hdr-week">{getWeekLabel()}</div>
            </div>
            <div className="hdr-right">
              {isAdmin&&<span className="admin-tag">Admin</span>}
              {isDemo&&<span className="demo-tag">Demo</span>}
              <button className="switch-btn" onClick={()=>{setRole(null);setIsAdmin(false);setIsDemo(false);}}>Switch</button>
            </div>
          </div>
          <div className="hdr-stats">
            {activeDays.length>0?activeDays.map(d=>{
              const cnt=Object.values((week&&week.signups)||{}).filter(s=>s.day===d).length;
              return<div key={d} className="hdr-stat"><div className="hdr-stat-n">{cnt}</div><div className="hdr-stat-l">{d.slice(0,3)}</div></div>;
            }):[
              <div key="t" className="hdr-stat"><div className="hdr-stat-n">0</div><div className="hdr-stat-l">Signed Up</div></div>,
              <div key="d" className="hdr-stat"><div className="hdr-stat-n">0</div><div className="hdr-stat-l">Days</div></div>,
              <div key="tm" className="hdr-stat"><div className="hdr-stat-n">0</div><div className="hdr-stat-l">Teams</div></div>
            ]}
          </div>
          <div style={{marginTop:7}}>
            {activeDays.length>0?(
              <div className="hdr-pill"><span className="hdr-dot"></span>{activeDays.join(' / ')}</div>
            ):(
              <div className="hdr-pill" style={{opacity:0.35}}>No games scheduled</div>
            )}
          </div>
        </div>
      </div>

      <nav className="nav">
        {TABS.map(t=>(
          <button key={t.id} className={'nb'+(tab===t.id?' on':'')+(t.locked?' locked':'')} onClick={()=>{if(!t.locked)setTab(t.id);}}>
            {t.icon}{t.label}
          </button>
        ))}
      </nav>

      <div className="content">
        {tab==='home'&&<WeekView week={week} isAdmin={isAdmin} isDemo={isDemo}
          onSignup={d=>write('week/signups/'+Date.now(),d)}
          onRemove={k=>del('week/signups/'+k)}
          onUpdateSignup={updateSignup}
          onUpdateTeeTime={updateTeeTime}
          onMarkComplete={markComplete}
          onReopenDay={reopenDay}
          onToggleLock={toggleLock}/>}
        {tab==='teams'&&<TeamsView week={week} isAdmin={isAdmin}
          onSaveTeams={saveTeams}
          onPublishTeams={publishTeams}
          onAssignBlindDraw={saveTeams}/>}
        {tab==='scoring'&&<ScoringView week={week} isAdmin={isAdmin} isDemo={isDemo}
          onSaveScores={saveScores}
          onCalcPayouts={calcPayouts}
          onMoveToHistory={moveToHistory}
          onMarkComplete={markComplete}
          onReopenDay={reopenDay}/>}
        {tab==='history'&&<HistoryView history={history} isAdmin={isAdmin}
          onDelete={k=>del('history/'+k)}
          onClearAll={()=>write('history',{})}
          onEditRound={editHistoryRound}/>}
        {tab==='admin'&&<AdminView isAdmin={isAdmin}
          onLogout={()=>{setIsAdmin(false);setRole(null);}}
          week={week}
          onCreate={createWeek}
          onArchiveDay={archiveDay}
          onAddPlayer={addPlayer}
          onRemovePlayer={removePlayer}
          roster={extra}
          onRemoveSignup={k=>del('week/signups/'+k)}
          onAddSignup={d=>write('week/signups/'+Date.now(),d)}
          onUpdateTeeTime={updateTeeTime}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
