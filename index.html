              <span style={{fontSize:9,fontWeight:700,padding:'3px 7px',borderRadius:4,textTransform:'uppercase',letterSpacing:0.5,background:isLocked?'#f59e0b':'#dcfce7',color:isLocked?'#fff':'#15803d'}}>{isLocked?'Teams Locked':'Sign-ups Open'}</span>
            </div>
            <textarea value={val} onChange={e=>updateNote(day,e.target.value)} placeholder={'Add a note for '+day+'...'} style={{width:'100%',border:'none',outline:'none',padding:'11px 14px',fontFamily:'DM Sans,sans-serif',fontSize:13,color:'#1e293b',resize:'none',minHeight:60,background:'#fff'}}/>
            <div style={{padding:'6px 14px',borderTop:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:10,color:'#94a3b8'}}>
              <span>{val.length} / 280 characters</span>
              <button onClick={()=>clearNote(day)} style={{color:'#94a3b8',background:'transparent',border:'none',fontSize:10,fontWeight:600,textTransform:'uppercase',cursor:'pointer',letterSpacing:0.5,opacity:val?1:0.3,fontFamily:'DM Sans,sans-serif'}}>Clear</button>
            </div>
          </div>
        );
      })}

      {/* Preview */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'20px 4px 10px'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:16,fontWeight:700,color:'#0f172a',textTransform:'uppercase',letterSpacing:1}}>Preview</div>
        <div style={{fontSize:11,color:'#94a3b8',fontWeight:500}}>What recipients see</div>
      </div>
      <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,overflow:'hidden'}}>
        <div style={{background:'#f8fafc',padding:'8px 12px',borderBottom:'1px solid #e2e8f0',display:'flex',alignItems:'center',gap:6,fontSize:10,color:'#94a3b8',fontWeight:600,textTransform:'uppercase',letterSpacing:1}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'#10b981',flexShrink:0,display:'inline-block'}}></span>Live Preview
        </div>
        <div style={{padding:12,background:'#f1f5f9',maxHeight:400,overflowY:'auto'}}>
          <iframe srcDoc={previewDoc} style={{width:'100%',border:'none',minHeight:500,borderRadius:8,background:'#fff'}} title="Email Preview"/>
        </div>
      </div>

      {/* Sticky action bar */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #e2e8f0',padding:'12px 16px',display:'flex',gap:8,boxShadow:'0 -4px 12px rgba(0,0,0,0.04)',zIndex:50,maxWidth:1100,margin:'0 auto'}}>
        <button onClick={copyEmail} style={{flex:1,padding:12,borderRadius:9,fontFamily:'DM Sans,sans-serif',fontWeight:700,fontSize:13,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,background:copiedMain?'#10b981':'#0f172a',color:'#fff',transition:'background 0.2s'}}>
          {copiedMain?(<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>Copied!</>):(<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy Email</>)}
        </button>
        <button onClick={copyPlainText} style={{flex:1,padding:12,borderRadius:9,fontFamily:'DM Sans,sans-serif',fontWeight:700,fontSize:13,border:'1.5px solid #e2e8f0',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,background:copiedText?'#ecfdf5':'#fff',color:copiedText?'#15803d':'#475569',transition:'background 0.2s'}}>
          {copiedText?(<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>Copied!</>):(<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>Plain Text</>)}
        </button>
      </div>
    </div>
  );
}

function AdminView({isAdmin,onLogout,week,onCreate,onAddPlayer,onRemovePlayer,roster,effectiveRoster,onEditRosterName,onHidePlayer,onUnhidePlayer,rosterHidden,onRemoveSignup,onAddSignup,onUpdateTeeTime,onDeactivateDay,onEndWeek,onGoTo,guestHistory,onSaveTeams,onPublishTeams,onToggleLock,isDemo}){
  const [addQ,setAddQ]=useState('');const [quickAddSel,setQuickAddSel]=useState(null);const [quickAddTee,setQuickAddTee]=useState('Whites');
  const [editRosterId,setEditRosterId]=useState(null);const [editRosterVal,setEditRosterVal]=useState('');
  const [showHidden,setShowHidden]=useState(false);
  const [rosterQ,setRosterQ]=useState('');
  const [quickAddHcp,setQuickAddHcp]=useState('');const [addDay,setAddDay]=useState('Saturday');const [showRoster,setShowRoster]=useState(false);
  const [np,setNp]=useState({name:'',tee:'Whites',hcp:''});const [gp,setGp]=useState({name:'',tee:'Whites',hcp:''});
  const [showGuest,setShowGuest]=useState(false);const [showSignups,setShowSignups]=useState(false);
  const [dayEdit,setDayEdit]=useState({});const [warnDeact,setWarnDeact]=useState(null);const [closeoutConfirm,setCloseoutConfirm]=useState(false);
  const [wizDay,setWizDay]=useState(null);const [showChecklist,setShowChecklist]=useState(false);

  const wd=getWeekDates();
  const rosterSearch=[...(effectiveRoster||ROSTER),...(safeArray(roster).filter(p=>p.id>96))].filter(p=>p.name.toLowerCase().includes(addQ.toLowerCase())).sort((a,b)=>a.name.localeCompare(b.name)).slice(0,12);
  const activeDays=sortDays(safeArray(week?.activeDays));
  const allSignups=Object.entries(week?.signups||{});

  function toggleDay(day){const isActive=activeDays.includes(day);if(isActive){const cnt=allSignups.filter(([,s])=>s.day===day).length;if(cnt>0){setWarnDeact({day,cnt});return;}onDeactivateDay(day);}else{const newWeek={...week,activeDays:[...(safeArray(week?.activeDays)),day],dates:{...(week?.dates||{}),[day]:wd[day]}};onCreate(newWeek);}}

  function handleSetupDay(day){const isAct=activeDays.includes(day);if(!isAct){const newWeek={...week,activeDays:[...safeArray(week?.activeDays),day],dates:{...(week?.dates||{}),[day]:wd[day]}};onCreate(newWeek);}setWizDay(wizDay===day?null:day);}

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:7}}><span className="admin-tag">Admin</span><span style={{fontSize:14,fontWeight:600}}>Control Panel</span></div>
        <div style={{display:'flex',gap:6}}><button className="btn btn-outline btn-sm" onClick={onLogout}>Sign out</button></div>
      </div>

      {/* === MANAGE DAYS (moved to top) === */}
      <div className="card card-pad" style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><div className="slbl" style={{marginBottom:0}}>Manage Days</div></div>
        {DAYS_OF_WEEK.map((day,di)=>{
          const isActive=activeDays.includes(day);const teeInfo=week?.teeTimes?.[day];
          return(
            <div key={day} style={{borderTop:di>0?'1px solid #f1f5f9':'none',paddingTop:di>0?12:0,marginTop:di>0?12:0}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div><div style={{fontSize:14,fontWeight:600,color:isActive?'#0f172a':'#94a3b8'}}>{day}</div><div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>{fmtDFull(wd[day])}</div>{isActive&&teeInfo&&(<div style={{fontSize:11,color:'#15803d',fontWeight:600,marginTop:2}}>{teeInfo.lottery?'Lottery':'Tee: '+teeInfo.time}</div>)}</div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>{isActive&&(<button className="btn btn-red btn-xs" onClick={()=>toggleDay(day)}>Remove</button>)}<button className="btn btn-green btn-sm" onClick={()=>handleSetupDay(day)}>{wizDay===day?'Close':(teeInfo||week?.locked?.[day]||safeArray(week?.teams?.[day]).length>0?'Continue set up':'Set up '+day)}</button></div>
              </div>
              {wizDay===day&&(<SetupWizard day={day} week={week} onClose={()=>setWizDay(null)} onGoTo={onGoTo} onUpdateTeeTime={onUpdateTeeTime} onToggleLock={onToggleLock}/>)}
            </div>
          );
        })}
      </div>

      {warnDeact&&(<div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:13,marginBottom:10}}><div style={{fontSize:13,fontWeight:700,color:'#dc2626',marginBottom:6}}>{warnDeact.day} has {warnDeact.cnt} player{warnDeact.cnt!==1?'s':''} signed up</div><div style={{fontSize:12,color:'#64748b',marginBottom:10}}>Deactivating will hide this day from players.</div><div style={{display:'flex',gap:8}}><button className="btn btn-red btn-sm" onClick={()=>{onDeactivateDay(warnDeact.day);setWarnDeact(null);}}>Deactivate anyway</button><button className="btn btn-outline btn-sm" onClick={()=>setWarnDeact(null)}>Keep active</button></div></div>)}

      {/* === COLLAPSIBLE CHECKLISTS === */}
      {activeDays.length>0&&(
        <div className="card" style={{marginBottom:10}}>
          <div className="section-btn" onClick={()=>setShowChecklist(!showChecklist)}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><div className="section-title">Day Checklists</div></div>
            <svg style={{width:15,height:15,color:'#94a3b8',transform:showChecklist?'rotate(180deg)':'none',transition:'transform 0.2s'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          {showChecklist&&<div className="section-body"><AdminChecklist week={week} activeDays={activeDays} onGoTo={onGoTo}/></div>}
        </div>
      )}

      {/* Manage sign-ups */}
      <div className="card card-pad" style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:showSignups?12:0,cursor:'pointer'}} onClick={()=>setShowSignups(!showSignups)}>
          <div style={{fontSize:13,fontWeight:700,color:'#0f172a',marginBottom:0}}>Manage Existing Sign-Ups For The Week</div>
          <svg style={{width:14,height:14,color:'#94a3b8',transform:showSignups?'rotate(180deg)':'none',transition:'transform 0.2s'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        {showSignups&&activeDays.length>0&&(
          <div>
            <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'center'}}><select className="fs" style={{flex:1}} value={addDay} onChange={e=>setAddDay(e.target.value)}>{activeDays.map(d=><option key={d}>{d}</option>)}</select><span style={{fontSize:12,color:'#94a3b8',flexShrink:0}}>{allSignups.filter(([,s])=>s.day===addDay).length} signed up</span></div>
            <div className="sw" style={{marginBottom:8}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input className="si" placeholder="Quick-add player..." value={addQ} onChange={e=>setAddQ(e.target.value)}/></div>
            {addQ.length>0&&(<div style={{border:'1px solid #e2e8f0',borderRadius:9,marginBottom:10,maxHeight:150,overflowY:'auto'}}>{rosterSearch.map(p=>{const inDay=allSignups.some(([,s])=>s.day===addDay&&s.name===p.name);const isExpanded=quickAddSel===p.id;return(<div key={p.id} style={{borderBottom:'1px solid #f1f5f9'}}><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 11px'}}><span style={{fontSize:13,fontWeight:500,color:inDay?'#94a3b8':'#0f172a'}}>{p.name}{inDay?' (signed up)':''}</span>{!inDay&&<button className="btn btn-green btn-xs" onClick={()=>setQuickAddSel(isExpanded?null:p.id)}>{isExpanded?'Cancel':'Add'}</button>}</div>{isExpanded&&!inDay&&(<div style={{padding:'0 11px 10px',display:'flex',gap:6,flexWrap:'wrap',alignItems:'flex-end'}}><div style={{flex:'1 1 80px'}}><label className="fl">Tees</label><select className="fs" value={quickAddTee} onChange={e=>setQuickAddTee(e.target.value)}>{TEES.map(t=><option key={t}>{t}</option>)}</select></div><div style={{flex:'1 1 70px'}}><label className="fl">HCP</label><input className="fi" type="number" placeholder="e.g. 14" value={quickAddHcp} onChange={e=>setQuickAddHcp(e.target.value)}/></div><button className="btn btn-green btn-sm" disabled={!quickAddHcp} style={{opacity:!quickAddHcp?0.4:1,alignSelf:'flex-end'}} onClick={()=>{onAddSignup({playerId:p.id,name:p.name,tee:quickAddTee,handicap:parseFloat(quickAddHcp)||10,day:addDay,signedUpAt:Date.now()});setAddQ('');setQuickAddSel(null);setQuickAddHcp('');setQuickAddTee('Whites');}}>Confirm</button></div>)}</div>);})}</div>)}
            <button className="btn btn-outline btn-sm" style={{marginBottom:8}} onClick={()=>setShowGuest(!showGuest)}>{showGuest?'Cancel':'+ Add Guest'}</button>
            {showGuest&&(<div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:9,padding:12,marginBottom:10}}><div className="fr" style={{marginBottom:8}}><div className="fg" style={{marginBottom:0}}><label className="fl">Guest name</label><input className="fi" placeholder="Full name" value={gp.name} onChange={e=>setGp({...gp,name:e.target.value})}/></div><div className="fg" style={{marginBottom:0}}><label className="fl">Tees</label><select className="fs" value={gp.tee} onChange={e=>setGp({...gp,tee:e.target.value})}>{TEES.map(t=><option key={t}>{t}</option>)}</select></div></div><div className="fr"><div className="fg" style={{marginBottom:0}}><label className="fl">Handicap</label><input className="fi" type="number" placeholder="e.g. 14" value={gp.hcp} onChange={e=>setGp({...gp,hcp:e.target.value})}/></div><div style={{display:'flex',alignItems:'flex-end'}}><button className="btn btn-green btn-sm" onClick={()=>{if(!gp.name||!gp.hcp)return;onAddSignup({playerId:'g_'+Date.now(),name:gp.name,isGuest:true,tee:gp.tee,handicap:parseFloat(gp.hcp),day:addDay,signedUpAt:Date.now()});onAddPlayer({name:gp.name,isGuest:true});setGp({name:'',tee:'Whites',hcp:''});setShowGuest(false);}}>Add Guest</button></div></div></div>)}
            <div style={{maxHeight:190,overflowY:'auto'}}>{allSignups.filter(([,s])=>s.day===addDay).sort((a,b)=>a[1].signedUpAt-b[1].signedUpAt).map(([key,s])=>(<div key={key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid #f8fafc'}}><div><span style={{fontSize:13,fontWeight:600}}>{s.name}</span><span style={{fontSize:11,color:'#94a3b8',marginLeft:6}}>{s.tee} HCP {s.handicap}</span>{s.isGuest&&<span className="guest-tag" style={{marginLeft:4}}>Guest</span>}</div><button className="rm-btn" onClick={()=>onRemoveSignup(key)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg></button></div>))}</div>
          </div>
        )}
      </div>

      {/* Roster */}
      <div className="card" style={{marginBottom:10}}>
        <div className="section-btn" onClick={()=>setShowRoster(!showRoster)}>
          <div className="section-title">Roster ({[...(effectiveRoster||ROSTER),...safeArray(roster).filter(p=>p.id>96)].length} members)</div>
          <svg style={{width:15,height:15,color:'#94a3b8',transform:showRoster?'rotate(180deg)':'none',transition:'transform 0.2s'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        {showRoster&&(<div className="section-body">
          <div style={{position:'relative',marginBottom:10}}>
            <svg style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',width:14,height:14,color:'#94a3b8'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input style={{width:'100%',padding:'9px 12px 9px 32px',border:'1.5px solid #e2e8f0',borderRadius:9,fontSize:13,fontFamily:'DM Sans,sans-serif',outline:'none',background:'#f8fafc'}} placeholder="Search roster..." value={rosterQ} onChange={e=>setRosterQ(e.target.value)}/>
          </div>
          <div className="fr" style={{marginBottom:8}}><div className="fg" style={{marginBottom:0}}><label className="fl">Name</label><input className="fi" placeholder="Full name" value={np.name} onChange={e=>setNp({...np,name:e.target.value})}/></div><div className="fg" style={{marginBottom:0}}><label className="fl">Default Tees</label><select className="fs" value={np.tee} onChange={e=>setNp({...np,tee:e.target.value})}>{TEES.map(t=><option key={t}>{t}</option>)}</select></div></div>
          <div className="fr" style={{marginBottom:8}}><div className="fg" style={{marginBottom:0}}><label className="fl">Handicap</label><input className="fi" type="number" placeholder="e.g. 14" value={np.hcp} onChange={e=>setNp({...np,hcp:e.target.value})}/></div><div style={{display:'flex',alignItems:'flex-end'}}><button className="btn btn-green btn-sm" onClick={()=>{if(np.name){onAddPlayer({name:np.name,tee:np.tee,handicap:parseFloat(np.hcp)||0});setNp({name:'',tee:'Whites',hcp:''});}}}>Add</button></div></div>
          <div style={{maxHeight:280,overflowY:'auto',marginTop:8}}>{[...(effectiveRoster||ROSTER),...safeArray(roster).filter(p=>p.id>96)].sort((a,b)=>a.name.localeCompare(b.name)).filter(p=>p.name.toLowerCase().includes(rosterQ.toLowerCase())).map(p=>(
            <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #f8fafc',fontSize:13}}>
              {editRosterId===p.id?(
                <div style={{display:'flex',gap:5,alignItems:'center',flex:1}}>
                  <input autoFocus className="fi" style={{fontSize:12,padding:'5px 8px',flex:1}} value={editRosterVal} onChange={e=>setEditRosterVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&editRosterVal.trim()){onEditRosterName(p.id,editRosterVal.trim());setEditRosterId(null);}}}/>
                  <button style={{background:'none',border:'none',color:'#15803d',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}} onClick={()=>{if(editRosterVal.trim()){onEditRosterName(p.id,editRosterVal.trim());setEditRosterId(null);}}}>Save</button>
                  <button style={{background:'none',border:'none',color:'#94a3b8',fontSize:11,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}} onClick={()=>setEditRosterId(null)}>x</button>
                </div>
              ):(
                <span style={{fontWeight:500,flex:1}}>{p.name}{p.isGuest&&<span className="guest-tag" style={{marginLeft:4}}>Guest</span>}{p.id>96&&<span className="pill-green" style={{marginLeft:4}}>New</span>}</span>
              )}

                <div style={{display:'flex',gap:5,alignItems:'center'}}>
                  <button style={{background:'none',border:'none',color:'#94a3b8',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}} onClick={()=>{setEditRosterId(p.id);setEditRosterVal(p.name);}}>edit</button>
                  <button className="rm-btn" onClick={()=>{if(confirm('Remove '+p.name+' from roster?')){if(p.id>96)onRemovePlayer(p.id);else onHidePlayer(p.id);}}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg></button>
                </div>

            </div>

          {Object.keys(rosterHidden||{}).length>0&&(
            <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid #f1f5f9'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setShowHidden(!showHidden)}>
                <span style={{fontSize:11,fontWeight:600,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.06em'}}>Hidden players ({Object.keys(rosterHidden).length})</span>
                <svg style={{width:12,height:12,color:'#94a3b8',transform:showHidden?'rotate(180deg)':'none',transition:'transform 0.2s'}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
              {showHidden&&(<div style={{marginTop:6}}>
                {ROSTER.filter(p=>rosterHidden[p.id]).map(p=>(
                  <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid #f8fafc',fontSize:12,color:'#94a3b8'}}>
                    <span>{p.name}</span>
                    <button className="btn btn-outline btn-xs" onClick={()=>onUnhidePlayer(p.id)}>Restore</button>
                  </div>
                ))}
              </div>)}
            </div>
          )}
        </div>)}
      </div>

      {/* End Week */}
      {(activeDays.length>0||allSignups.length>0)&&(<div>{closeoutConfirm?(<div style={{background:'#fef2f2',border:'1.5px solid #fecaca',borderRadius:10,padding:13,marginBottom:12}}><div style={{fontSize:13,fontWeight:700,color:'#dc2626',marginBottom:5}}>End Week & Start Fresh?</div><div style={{fontSize:12,color:'#64748b',marginBottom:10}}>All games from this week will be permanently saved to History, and the board will be cleared for the new week.</div><div style={{display:'flex',gap:8}}><button className="btn btn-red btn-sm" onClick={()=>{onEndWeek();setCloseoutConfirm(false);}}>Archive & Start New Week</button><button className="btn btn-outline btn-sm" onClick={()=>setCloseoutConfirm(false)}>Cancel</button></div></div>):(<button className="btn btn-dark btn-full" style={{marginTop:10}} onClick={()=>setCloseoutConfirm(true)}>End Week & Start Fresh</button>)}</div>)}
    </div>
  );
}

function App(){
  const [role,setRole]=useState(null);const [tab,setTab]=useState('home');
  const [week,setWeek]=useState(null);const [history,setHistory]=useState({});
  const [extra,setExtra]=useState([]);const [guestHistory,setGuestHistory]=useState([]);
  const [rosterEdits,setRosterEdits]=useState({});
  const [rosterHidden,setRosterHidden]=useState({});
  const {ready,read,write,push,del,update}=useDB();
  const [isDemo,setIsDemo]=useState(false);

  // Hide loading spinner once app renders
  useEffect(()=>{const l=document.getElementById('loader');if(l){setTimeout(()=>{l.classList.add('hide');setTimeout(()=>l.remove(),500);},150);}},[]);

  useEffect(()=>{
    if(!ready||isDemo)return;const u=[];
    u.push(read('week',v=>setWeek(v)));u.push(read('history',v=>setHistory(v||{})));
    u.push(read('extraPlayers',v=>setExtra(safeArray(v))));u.push(read('guests',v=>setGuestHistory(safeArray(v))));
    u.push(read('rosterEdits',v=>setRosterEdits(v||{})));
    u.push(read('rosterHidden',v=>setRosterHidden(v||{})));
    return()=>u.forEach(f=>{if(typeof f==='function')f();});
  },[ready,isDemo]);

  const effectiveRoster=useMemo(()=>ROSTER.map(p=>rosterEdits[p.id]?{...p,name:rosterEdits[p.id]}:p).filter(p=>!rosterHidden[p.id]),[rosterEdits,rosterHidden]);

  function editRosterName(id,newName){
    const updated={...rosterEdits,[id]:newName};
    write('rosterEdits',updated);
  }

  function hideRosterPlayer(id){
    const updated={...rosterHidden,[id]:true};
    write('rosterHidden',updated);
  }

  function unhideRosterPlayer(id){
    const updated={...rosterHidden};delete updated[id];
    write('rosterHidden',updated);
  }

  function createWeek(data){write('week',{activeDays:[],dates:{},signups:{},teams:{},scores:{},complete:{},teeTimes:{},teamsPublished:{},...data});}
  function clearWeek(){const emptyWeek={activeDays:[],dates:{},signups:{},teams:{},scores:{},complete:{},teeTimes:{},teamsPublished:{},locked:{},emailNotes:null,emailSubject:null};if(isDemo){setWeek(emptyWeek);}else write('week',emptyWeek);}

  function endWeek(){
    const updates={};const newHistory={...history};let hasHistoryUpdates=false;
    safeArray(week?.activeDays).forEach((day,index)=>{
      const daySignups=Object.values(week?.signups||{}).filter(s=>s.day===day);
      if(daySignups.length>0){const dayTeams=safeArray(week?.teams?.[day]);const dayScores=week?.scores?.[day]||null;const dayDate=week?.dates?.[day]||td();
        const roundData={day,date:dayDate,teams:dayTeams,scores:dayScores,playerCount:daySignups.length,archivedAt:Date.now()};
        const k='dr_'+Date.now()+'_'+index;
        if(isDemo){newHistory[k]=roundData;}else{updates['history/'+k]=roundData;}hasHistoryUpdates=true;
        pushToAttendance(day);}
    });
    const emptyWeek={activeDays:[],dates:{},signups:{},teams:{},scores:{},complete:{},teeTimes:{},teamsPublished:{},locked:{},paid:{},emailNotes:null,emailSubject:null};
    if(isDemo){if(hasHistoryUpdates)setHistory(newHistory);setWeek(emptyWeek);setTab('home');}
    else{updates['week']=emptyWeek;update(updates);setTab('home');}
  }

  function pushToAttendance(day){
    if(isDemo)return;
    const dayTeams=safeArray(week?.teams?.[day]);
    const dayDate=(week?.dates&&week.dates[day])||td();
    const playerNames=dayTeams.flatMap(t=>safeArray(t.players).map(p=>p.name)).sort();
    if(!playerNames.length)return;
    read('attendance/rounds',existing=>{
      const arr=Array.isArray(existing)?existing:Object.values(existing||{});
      // One entry per date - if date already exists, replace it; otherwise append
      const existingIdx=arr.findIndex(r=>r.date===dayDate);
      if(existingIdx>=0){arr[existingIdx]={date:dayDate,players:playerNames};}
      else{arr.push({date:dayDate,players:playerNames});}
      write('attendance/rounds',arr.sort((a,b)=>b.date.localeCompare(a.date)));
    });
  }

  function archiveDay(day){
    if(!week)return;const daySignups=Object.values(week.signups||{}).filter(s=>s.day===day);
    const dayTeams=safeArray(week.teams?.[day]);const dayScores=(week.scores&&week.scores[day])||null;
    const dayDate=(week.dates&&week.dates[day])||td();
    const roundData={day,date:dayDate,teams:dayTeams,scores:dayScores,playerCount:daySignups.length,archivedAt:Date.now()};
    if(isDemo){const k='dr_'+Date.now();setHistory(h=>({...h,[k]:roundData}));}else push('history',roundData);
    pushToAttendance(day);
    const newWeek={...week};newWeek.activeDays=safeArray(newWeek.activeDays).filter(d=>d!==day);
    const ns={};Object.entries(week.signups||{}).forEach(([k,s])=>{if(s.day!==day)ns[k]=s;});newWeek.signups=ns;
    const nt={...(week.teams||{})};delete nt[day];newWeek.teams=nt;
    const nsc={...(week.scores||{})};delete nsc[day];newWeek.scores=nsc;
    const nc={...(week.complete||{})};delete nc[day];newWeek.complete=nc;
    if(isDemo){setWeek(newWeek);}else write('week',newWeek);
  }

  function saveTeams(day,teams){if(isDemo){setWeek(w=>({...w,teams:{...(w?.teams||{}),[day]:teams}}));}else write('week/teams/'+day,teams);}
  function publishAndLockTeams(day,teams){if(isDemo){setWeek(w=>({...w,teams:{...(w?.teams||{}),[day]:teams},teamsPublished:{...(w?.teamsPublished||{}),[day]:true},locked:{...(w?.locked||{}),[day]:true}}));}else{update({['week/teams/'+day]:teams,['week/teamsPublished/'+day]:true,['week/locked/'+day]:true});}}

  function unpublishTeams(day){
    if(isDemo){setWeek(w=>({...w,teams:{...(w?.teams||{}),[day]:null},teamsPublished:{...(w?.teamsPublished||{}),[day]:false},locked:{...(w?.locked||{}),[day]:false}}));}
    else{update({['week/teams/'+day]:null,['week/teamsPublished/'+day]:false,['week/locked/'+day]:false});}
  }

  function editTeamsInPlace(day){
    if(isDemo){setWeek(w=>({...w,teamsPublished:{...(w?.teamsPublished||{}),[day]:false},locked:{...(w?.locked||{}),[day]:false}}));}
    else{update({['week/teamsPublished/'+day]:false,['week/locked/'+day]:false});}
  }
  function saveScoresAndPayouts(day,scores){if(isDemo){setWeek(w=>({...w,scores:{...(w?.scores||{}),[day]:scores},complete:{...(w?.complete||{}),[day]:true}}));}else{update({['week/scores/'+day]:scores,['week/complete/'+day]:true});}}
  function markComplete(day){const nw={...week,complete:{...(week.complete||{}),[day]:true}};if(isDemo){setWeek(nw);}else write('week',nw);}
  function reopenDay(day){if(isDemo){setWeek(w=>{const sc=w?.scores?.[day]||{};return{...w,complete:{...(w?.complete||{}),[day]:false},scores:{...(w?.scores||{}),[day]:{...sc,payoutsCalculated:false,savedAt:sc.savedAt||null}}};});}else{update({['week/complete/'+day]:false,['week/scores/'+day+'/payoutsCalculated']:false});}}
  function updateTeeTime(day,data){const tt={...(week.teeTimes||{})};if(data===null)delete tt[day];else tt[day]=data;const nw={...week,teeTimes:tt};if(isDemo){setWeek(nw);}else write('week',nw);}
  function saveScores(day,scores){const nw={...week,scores:{...(week.scores||{}),[day]:scores}};if(isDemo){setWeek(nw);}else write('week',nw);}
  function moveToHistory(day){archiveDay(day);setTab('history');}
  function updateSignup(key,vals){const s=week&&week.signups&&week.signups[key];if(s)write('week/signups/'+key,{...s,...vals});}
  function addPlayer(p){const newExtra=[...extra,{...p,id:1000+extra.length+1}];write('extraPlayers',newExtra);if(p.isGuest){const existing=safeArray(guestHistory).find(g=>g.name===p.name);if(existing){const updated=safeArray(guestHistory).map(g=>g.name===p.name?{...g,rounds:(g.rounds||1)+1,lastPlayed:Date.now()}:g);write('guests',updated);}else{write('guests',[...safeArray(guestHistory),{name:p.name,addedAt:Date.now(),rounds:1}]);}}}
  function removePlayer(id){write('extraPlayers',safeArray(extra).filter(p=>p.id!==id));}
  function toggleLock(day,locked){const nw={...week,locked:{...(week.locked||{}),[day]:locked}};if(isDemo){setWeek(nw);}else write('week',nw);}
  function deactivateDay(day){const newWeek={...week,activeDays:safeArray(week.activeDays).filter(d=>d!==day)};const tt={...(week.teeTimes||{})};delete tt[day];newWeek.teeTimes=tt;write('week',newWeek);}
  function updatePaid(day,playerName,paid){const nw={...week,paid:{...(week?.paid||{}),[day]:{...((week?.paid||{})[day]||{}),[playerName]:paid}}};if(isDemo){setWeek(nw);}else write('week/paid/'+day+'/'+playerName,paid);}
  function editHistoryRound(key,round){del('history/'+key);const newWeek=week?{...week}:{activeDays:[],dates:{},signups:{},teams:{},scores:{},complete:{},teeTimes:{},teamsPublished:{}};if(!safeArray(newWeek.activeDays).includes(round.day))newWeek.activeDays=[...safeArray(newWeek.activeDays),round.day];newWeek.dates={...(newWeek.dates||{}),[round.day]:round.date};if(round.teams)newWeek.teams={...(newWeek.teams||{}),[round.day]:round.teams};if(round.scores)newWeek.scores={...(newWeek.scores||{}),[round.day]:round.scores};newWeek.complete={...(newWeek.complete||{}),[round.day]:true};newWeek.teamsPublished={...(newWeek.teamsPublished||{}),[round.day]:true};write('week',newWeek);setTab('scoring');}

  function buildDemoWeek(){const d=makeDemoData();const wd=getWeekDates();return{activeDays:['Saturday'],dates:{Saturday:wd.Saturday},signups:d.signups,teams:{Saturday:d.teams},scores:{Saturday:d.scores},complete:{Saturday:false},teamsPublished:{Saturday:true},teeTimes:{Saturday:{time:'08:30',lottery:false}},locked:{}};}
  function startDemoPlayer(){setIsDemo(true);setWeek(buildDemoWeek());setHistory({});setRole('player');setTab('home');}
  function startDemoAdmin(){setIsDemo(true);setWeek(buildDemoWeek());setHistory({});setRole('admin');setTab('home');}

  if(!role)return<Landing onPlayer={()=>{setRole('player');setTab('home');}} onAdmin={()=>{setRole('admin');}} onDemoPlayer={startDemoPlayer} onDemoAdmin={startDemoAdmin}/>;

  const isAdmin=role==='admin';const activeDays=safeArray(week?.activeDays);
  const hasScores=isDemo||activeDays.some(d=>week&&week.scores&&week.scores[d]&&week.scores[d].savedAt);
  const scoringVisible=isAdmin||hasScores;

  const PTABS=[
    {id:'home',label:'This Week',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>},
    {id:'teams',label:'Teams',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>},
    {id:'scoring',label:'Scoring',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="8 21 12 21 16 21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M7 4H4a2 2 0 00-2 2v1c0 4 3 7 7 7h2c4 0 7-3 7-7V6a2 2 0 00-2-2h-3"/><rect x="7" y="2" width="10" height="5" rx="1"/></svg>,locked:!scoringVisible},
    {id:'history',label:'History',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>},
  ];
  const ATABS=[...PTABS.map(t=>({...t,locked:false})),{id:'email',label:'Email',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>},{id:'admin',label:'Admin',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>}];
  const TABS=role==='admin'?ATABS:PTABS;

  return(
    <div className="app">
      <div className="hdr"><div className="hdr-curve"></div><div className="hdr-inner">
        <div className="hdr-top"><div><div className="hdr-brand">Clark <em>Golf</em> Group</div><div className="hdr-week">{getWeekLabel()}</div></div><div className="hdr-right">{isAdmin&&<span className="admin-tag">Admin</span>}{isDemo&&<span className="demo-tag">Demo</span>}<button className="switch-btn" onClick={()=>{setRole(null);setIsDemo(false);}}>Switch</button></div></div>
        <div className="hdr-stats">{activeDays.length>0?sortDays(activeDays).map(d=>{const cnt=Object.values((week&&week.signups)||{}).filter(s=>s.day===d).length;return<div key={d} className="hdr-stat"><div className="hdr-stat-n">{cnt}</div><div className="hdr-stat-l">{d.slice(0,3)}</div></div>;}):[<div key="t" className="hdr-stat"><div className="hdr-stat-n">0</div><div className="hdr-stat-l">Signed Up</div></div>,<div key="d" className="hdr-stat"><div className="hdr-stat-n">0</div><div className="hdr-stat-l">Days</div></div>,<div key="tm" className="hdr-stat"><div className="hdr-stat-n">0</div><div className="hdr-stat-l">Teams</div></div>]}</div>
        <div style={{marginTop:7,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>{activeDays.length>0?(<div className="hdr-pill"><span className="hdr-dot"></span>{activeDays.join(' / ')}</div>):(<div className="hdr-pill" style={{opacity:0.35}}>No games scheduled</div>)}<a href="attendance.html" className="hdr-pill" style={{textDecoration:'none',color:'#f59e0b',borderColor:'rgba(245,158,11,0.3)',cursor:'pointer'}}>Season Attendance →</a></div>
      </div></div>
      <nav className="nav">{TABS.map(t=>(<button key={t.id} className={'nb'+(tab===t.id?' on':'')+(t.locked?' locked':'')} onClick={()=>{if(!t.locked)setTab(t.id);}}>{t.icon}{t.label}</button>))}</nav>
      <div className="content">
        {tab==='home'&&<WeekView week={week} isAdmin={isAdmin} isDemo={isDemo} extraRoster={extra} effectiveRoster={effectiveRoster}
          onSignup={d=>{if(isDemo){const k='ds_'+Date.now();setWeek(w=>({...w,signups:{...(w.signups||{}),[k]:d}}));}else push('week/signups',d);if(d.isGuest&&d.name){const existing=safeArray(guestHistory).find(g=>g.name===d.name);if(existing){const updated=safeArray(guestHistory).map(g=>g.name===d.name?{...g,rounds:(g.rounds||1)+1,lastPlayed:Date.now()}:g);write('guests',updated);}else{write('guests',[...safeArray(guestHistory),{name:d.name,addedAt:Date.now(),rounds:1}]);}}}}
          onRemove={k=>{if(isDemo){setWeek(w=>{const s={...(w.signups||{})};delete s[k];return{...w,signups:s};});}else del('week/signups/'+k);}}
          onUpdateSignup={updateSignup} onUpdateTeeTime={updateTeeTime} onMarkComplete={markComplete} onReopenDay={reopenDay} onToggleLock={toggleLock}/>}
        {tab==='teams'&&<TeamsView week={week} history={history} isAdmin={isAdmin} onSaveTeams={saveTeams} onPublishAndLock={publishAndLockTeams} onUnpublish={unpublishTeams} onEditInPlace={editTeamsInPlace} onUpdatePaid={updatePaid} onToggleLock={toggleLock} myName={typeof localStorage!=='undefined'?localStorage.getItem('cgMyName'):null}/>}
        {tab==='scoring'&&<ScoringView week={week} isAdmin={isAdmin} isDemo={isDemo} onSaveScores={saveScores} onSaveScoresAndPayouts={saveScoresAndPayouts} onMoveToHistory={moveToHistory} onMarkComplete={markComplete} onReopenDay={reopenDay} onUpdatePaid={updatePaid} myName={typeof localStorage!=='undefined'?localStorage.getItem('cgMyName'):null}/>}
        {tab==='history'&&<HistoryView history={history} isAdmin={isAdmin} onDelete={k=>del('history/'+k)} onClearAll={()=>write('history',{})} onEditRound={editHistoryRound}/>}
        {tab==='email'&&<EmailView week={week} isAdmin={isAdmin} isDemo={isDemo} onSaveNotes={n=>{if(!isDemo)write('week/emailNotes',n);else setWeek(w=>({...w,emailNotes:n}));}} onSaveSubject={s=>{if(!isDemo)write('week/emailSubject',s);else setWeek(w=>({...w,emailSubject:s}));}}/>}
        {tab==='admin'&&<AdminView isAdmin={isAdmin} onLogout={()=>{setRole(null);setIsDemo(false);}} week={week} onCreate={createWeek} onAddPlayer={addPlayer} onRemovePlayer={removePlayer} roster={extra} effectiveRoster={effectiveRoster} onEditRosterName={editRosterName} onHidePlayer={hideRosterPlayer} onUnhidePlayer={unhideRosterPlayer} rosterHidden={rosterHidden} onRemoveSignup={k=>{if(isDemo){setWeek(w=>{const s={...(w.signups||{})};delete s[k];return{...w,signups:s};});}else del('week/signups/'+k);}} onAddSignup={d=>{if(isDemo){const k='ds_'+Date.now();setWeek(w=>({...w,signups:{...(w.signups||{}),[k]:d}}));}else push('week/signups',d);}} onUpdateTeeTime={updateTeeTime} onDeactivateDay={deactivateDay} onClearWeek={clearWeek} onEndWeek={endWeek} onGoTo={t=>setTab(t)} guestHistory={guestHistory} onSaveTeams={saveTeams} onPublishTeams={d=>update({['week/teamsPublished/'+d]:true})} onToggleLock={toggleLock} isDemo={isDemo}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
