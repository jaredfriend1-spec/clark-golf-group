<!DOCTYPE html>

<title>Clark Golf Group</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#0f1a0f;--dark2:#1a2a1a;--dark3:#243024;
  --green:#2d6a27;--green-mid:#3d8a35;--green-accent:#4ec942;
  --green-light:#e3f5e0;--green-pale:#f0faf0;
  --gold:#c9a84c;--gold-light:#fdf8ed;--gold-dark:#a8841a;
  --white:#ffffff;--off:#f7f9f6;
  --text:#0d120d;--text-mid:#3a453a;--text-muted:#7a8a7a;
  --border:#e0e8de;--border-mid:#cad6c8;
  --danger:#d63031;--danger-light:#fef0ef;
  --r:14px;--rs:9px;--rx:5px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:#e8ede6;color:var(--text);-webkit-font-smoothing:antialiased}
#root{min-height:100%}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--white);display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{background:var(--dark);padding:28px 20px 0;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-40px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(78,201,66,0.06)}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:22px;background:var(--white);border-radius:22px 22px 0 0}
.hdr-inner{position:relative;z-index:1;padding-bottom:28px}
.hdr-eyebrow{font-size:9px;font-weight:700;letter-spacing:0.18em;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:5px}
.hdr-title{font-family:'Syne',sans-serif;font-size:27px;font-weight:800;color:var(--white);line-height:1.0;margin-bottom:2px;letter-spacing:-0.01em}
.hdr-title span{color:var(--green-accent)}
.hdr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
.hdr-stat{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 8px;text-align:center}
.hdr-stat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--green-accent)}
.hdr-stat-lbl{font-size:9px;font-weight:700;letter-spacing:0.1em;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:2px}
.hdr-game-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.75);margin-top:10px}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--green-accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── NAV ── */
.nav{display:flex;background:var(--white);border-bottom:1px solid var(--border);padding:0 4px}
.nav-btn{flex:1;padding:12px 2px 10px;background:none;border:none;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.15s;letter-spacing:0.04em;text-transform:uppercase;position:relative}
.nav-btn svg{width:19px;height:19px;stroke-width:1.8}
.nav-btn.active{color:var(--green)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:16%;right:16%;height:2.5px;background:var(--gold);border-radius:2px 2px 0 0}
.content{flex:1;padding:20px 14px 40px}

/* ── LANDING ── */
.landing{min-height:100vh;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative;overflow:hidden}
.landing::before{content:'';position:absolute;top:-80px;right:-60px;width:280px;height:280px;border-radius:50%;background:rgba(78,201,66,0.05)}
.landing::after{content:'';position:absolute;bottom:-60px;left:-40px;width:200px;height:200px;border-radius:50%;background:rgba(201,168,76,0.05)}
.land-logo{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.2em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:32px}
.land-title{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--white);text-align:center;line-height:1.05;margin-bottom:6px}
.land-title span{color:var(--green-accent)}
.land-sub{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:48px;font-weight:500}
.land-btn{width:100%;padding:18px 24px;border-radius:14px;border:none;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;letter-spacing:0.02em}
.land-btn-primary{background:var(--green-accent);color:var(--dark)}
.land-btn-primary:hover{background:#5de858}
.land-btn-secondary{background:rgba(255,255,255,0.07);color:var(--white);border:1px solid rgba(255,255,255,0.15)}
.land-btn-secondary:hover{background:rgba(255,255,255,0.12)}
.land-btn-arrow{font-size:20px;opacity:0.6}

/* ── CARDS ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-flush{padding:0;overflow:hidden}

/* ── DAY CARDS (week dashboard) ── */
.day-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:box-shadow 0.15s}
.day-card-hdr{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.day-card-hdr:hover{background:var(--off)}
.day-left{display:flex;align-items:center;gap:10px}
.day-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.01em}
.day-date{font-size:12px;color:var(--text-muted);font-weight:500}
.day-right{display:flex;align-items:center;gap:8px}
.day-count{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;background:var(--green);color:var(--white);padding:3px 10px;border-radius:20px}
.day-count.zero{background:var(--border);color:var(--text-muted)}
.day-chevron{color:var(--text-muted);transition:transform 0.2s;width:18px;height:18px;flex-shrink:0}
.day-chevron.open{transform:rotate(180deg)}
.day-body{border-top:1px solid var(--border);background:var(--off)}
.day-empty{padding:16px;text-align:center;font-size:13px;color:var(--text-muted);font-style:italic}
.player-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.player-row:last-child{border-bottom:none}
.player-info{display:flex;align-items:center;gap:9px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--green-light);color:var(--green);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Syne',sans-serif}
.player-name-text{font-size:13px;font-weight:600}
.player-meta{display:flex;align-items:center;gap:5px;margin-top:2px}
.tee-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.player-meta-text{font-size:11px;color:var(--text-muted)}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:5px;border-radius:6px;transition:color 0.15s;display:flex}
.remove-btn:hover{color:var(--danger)}

/* ── SIGNUP MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;z-index:200}
.modal{background:var(--white);border-radius:22px 22px 0 0;padding:20px 18px 40px;width:100%;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border-mid);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:18px;letter-spacing:-0.01em}

/* ── FORMS ── */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--text-mid);margin-bottom:5px;display:block;letter-spacing:0.06em;text-transform:uppercase}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:15px;color:var(--text);background:var(--white);outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--green-accent)}
.form-select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:15px;color:var(--text);background:var(--white);outline:none;appearance:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;padding:11px 14px 11px 36px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:'Inter',sans-serif;outline:none;background:var(--off)}
.search-input:focus{border-color:var(--green-accent);background:var(--white)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);width:15px;height:15px}
.player-pick{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s}
.player-pick:last-child{border-bottom:none}
.player-pick:hover{background:var(--off)}
.player-pick.sel{background:var(--green-light)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;letter-spacing:0.01em}
.btn-primary{background:var(--green);color:white}
.btn-primary:hover{background:var(--dark2)}
.btn-primary:active{transform:scale(0.97)}
.btn-accent{background:var(--green-accent);color:var(--dark);font-family:'Syne',sans-serif;font-weight:800}
.btn-accent:hover{background:#5de858}
.btn-secondary{background:var(--white);border:1.5px solid var(--border-mid);color:var(--text-mid)}
.btn-secondary:hover{background:var(--off)}
.btn-gold{background:var(--gold);color:white}
.btn-gold:hover{background:var(--gold-dark)}
.btn-danger{background:var(--danger);color:white}
.btn-ghost{background:none;border:none;cursor:pointer;padding:7px;color:var(--text-muted)}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-xs{padding:5px 10px;font-size:12px}
.btn-full{width:100%}
.btn:disabled{opacity:0.35;cursor:not-allowed}

/* ── SECTION LABEL ── */
.slbl{font-size:10px;font-weight:700;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px}

/* ── TEAM CARDS ── */
.team-card{border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.team-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--dark)}
.team-name-lbl{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:white}
.team-hcp-lbl{font-size:12px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.1);padding:3px 9px;border-radius:20px}
.team-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border)}
.team-row:last-child{border-bottom:none}
.slot{font-size:10px;font-weight:800;font-family:'Syne',sans-serif;background:var(--gold);color:white;padding:2px 6px;border-radius:4px;flex-shrink:0;min-width:20px;text-align:center}

/* ── STATS ROW ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.stat-box{background:var(--dark);border-radius:var(--rs);padding:14px 8px;text-align:center}
.stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--green-accent)}
.stat-lbl{font-size:10px;color:rgba(255,255,255,0.4);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em}

/* ── SCORING ── */
.score-grid{display:grid;grid-template-columns:1fr 68px 68px 68px;gap:8px;align-items:center}
.score-hd{font-size:10px;font-weight:700;color:var(--text-muted);text-align:center;letter-spacing:0.06em;text-transform:uppercase}
.score-input{width:100%;padding:9px 4px;border:1.5px solid var(--border);border-radius:var(--rx);font-size:16px;font-weight:700;text-align:center;font-family:'Syne',sans-serif;color:var(--text);outline:none;background:var(--off)}
.score-input:focus{border-color:var(--green-accent);background:var(--white)}
.skin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.skin-btn{padding:20px 10px;border:2px solid var(--border);border-radius:var(--r);background:var(--white);cursor:pointer;text-align:center;transition:all 0.12s;user-select:none;-webkit-user-select:none}
.skin-btn:active{transform:scale(0.93)}
.skin-btn.on{border-color:var(--green-accent);background:var(--green-pale)}
.skin-team{font-size:11px;font-weight:700;color:var(--text-mid);margin-bottom:5px;letter-spacing:0.04em;text-transform:uppercase}
.skin-num{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;color:var(--green);line-height:1}
.skin-lbl{font-size:11px;color:var(--text-muted);margin-top:4px}
.skin-undo{font-size:11px;color:var(--danger);margin-top:6px;cursor:pointer;font-weight:700}
.payout-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.payout-row:last-child{border-bottom:none}
.payout-lbl{color:var(--text-mid)}
.payout-amt{font-weight:800;color:var(--green);font-family:'Syne',sans-serif;font-size:15px}
.payout-amt.gold{color:var(--gold)}
.payout-total{display:flex;justify-content:space-between;padding:12px 0 0;font-size:17px;font-weight:800;border-top:2px solid var(--green);margin-top:4px;font-family:'Syne',sans-serif}

/* ── HISTORY ── */
.hist-item{border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.hist-hdr{padding:14px 16px;background:var(--off);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hist-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800}
.hist-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.hist-body{padding:14px 16px;border-top:1px solid var(--border)}

/* ── ADMIN ── */
.admin-bar{background:var(--gold-light);border:1.5px solid #e8d49a;border-radius:var(--r);padding:16px;margin-bottom:12px}
.admin-bar-title{font-size:10px;font-weight:800;letter-spacing:0.12em;color:#7a5e10;text-transform:uppercase;margin-bottom:10px}
.admin-tag{background:var(--gold);color:white;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:0.06em;font-family:'Syne',sans-serif}

/* ── TOGGLE ── */
.toggle{display:flex;background:var(--off);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;padding:3px}
.tog{flex:1;padding:7px 10px;border:none;background:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-muted);border-radius:16px;transition:all 0.15s}
.tog.on{background:var(--green);color:white}

/* ── ALERTS ── */
.alert{border-radius:var(--rs);padding:11px 13px;font-size:13px;margin-bottom:12px;font-weight:500}
.alert-warn{background:#fffbeb;border:1px solid #f0c040;color:#7a5c00}
.alert-ok{background:var(--green-pale);border:1px solid var(--green-light);color:var(--green)}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px}
.empty svg{width:42px;height:42px;opacity:0.18;margin-bottom:14px}
.empty-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px}
.empty-sub{font-size:14px;color:var(--text-muted);line-height:1.6}
.divider{height:1px;background:var(--border);margin:14px 0}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pill-green{background:var(--green-light);color:var(--green)}
.pill-gold{background:var(--gold-light);color:#7a5e10}
.pill-gray{background:#f0f0ee;color:#555}
.pill-dark{background:var(--dark);color:white}
</style>
</head>

const LS={g:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

function useDB(){
  const [db,setDb]=useState(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{try{if(!firebase.apps.length)firebase.initializeApp(FB);setDb(firebase.database());setReady(true)}catch{setReady(true)}},[]);
  const read=useCallback((p,cb)=>{if(!db){cb(LS.g(p));return()=>{}}const r=db.ref(p);r.on('value',s=>cb(s.val()));return()=>r.off()},[db]);
  const write=useCallback((p,v)=>{if(!db){LS.s(p,v);return Promise.resolve()}return db.ref(p).set(v)},[db]);
  const push=useCallback((p,v)=>{if(!db){const e=LS.g(p)||{};const k=Date.now().toString();e[k]=v;LS.s(p,e);return Promise.resolve(k)}return db.ref(p).push(v).then(r=>r.key)},[db]);
  const del=useCallback((p)=>{if(!db){localStorage.removeItem(p);return Promise.resolve()}return db.ref(p).remove()},[db]);
  return{ready,read,write,push,del};
}

const ini=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const f$=n=>{const v=parseFloat(n||0);return '$'+(Number.isInteger(v)?v:v.toFixed(2))};
const td=()=>new Date().toISOString().split('T')[0];
const fmtD=d=>{if(!d)return'';const[,m,dy]=d.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]+' '+parseInt(dy)};
const fmtDFull=d=>{if(!d)return'';const[y,m,dy]=d.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]+' '+parseInt(dy)+', '+y};

function buildTeams(players){
  const s=[...players].sort((a,b)=>parseFloat(a.handicap)-parseFloat(b.handicap));
  const n=s.length;if(n<3)return[];
  const rem=n%4;
  const nt=rem===1?Math.ceil(n/4):Math.max(1,Math.floor(n/4)||(Math.ceil(n/4)));
  const teams=Array.from({length:nt},(_,i)=>({id:i+1,name:`Team ${i+1}`,players:[],totalHcp:0}));
  s.forEach((p,idx)=>{const round=Math.floor(idx/nt);const pos=idx%nt;const ti=round%2===0?pos:nt-1-pos;teams[ti].players.push({...p,slot:['A','B','C','D'][Math.min(round,3)]});teams[ti].totalHcp+=parseFloat(p.handicap)||0});
  return teams;
}

// ── WEEK DASHBOARD (shared by player + admin) ─────────────────────────────────
function WeekDashboard({game,signups,currentUser,onSignup,onRemove,isAdmin}){
  const [expanded,setExpanded]=useState({});
  const [signModal,setSignModal]=useState(null); // day key
  const [isGuest,setIsGuest]=useState(false);
  const [sel,setSel]=useState('');
  const [gname,setGname]=useState('');
  const [tee,setTee]=useState('Whites');
  const [hcp,setHcp]=useState('');
  const [q,setQ]=useState('');

  const DAYS=['Friday','Saturday','Sunday'];

  // Group signups by day
  const byDay={};
  DAYS.forEach(d=>{byDay[d]=Object.entries(signups||{}).filter(([,s])=>s.day===d)});

  const totalPlayers=Object.keys(signups||{}).length;
  const signedDays=DAYS.filter(d=>byDay[d].length>0).length;

  function toggle(d){setExpanded(p=>({...p,[d]:!p[d]}))}

  function openSignup(d){
    setSignModal(d);setSel('');setGname('');setHcp('');setIsGuest(false);setTee('Whites');setQ('');
  }

  function submit(){
    const name=isGuest?gname.trim():ROSTER.find(p=>p.id==sel)?.name;
    if(!name||!hcp||!signModal)return;
    onSignup({playerId:isGuest?`g_${Date.now()}`:parseInt(sel),name,isGuest,tee,handicap:parseFloat(hcp),day:signModal,signedUpAt:Date.now()});
    setSignModal(null);
  }

  const signedIds=Object.values(signups||{}).map(s=>s.playerId);
  const avail=ROSTER.filter(p=>!signedIds.includes(p.id)&&p.name.toLowerCase().includes(q.toLowerCase()));

  // Check if current user is signed up for a given day
  const userSignup=(d)=>Object.entries(signups||{}).find(([,s])=>s.name===currentUser&&s.day===d);

  if(!game) return(
    <div className="empty" style={{paddingTop:60}}>
      <div>{Ic.flag}</div>

      </div>

        const isOpen=expanded[day];
        const myEntry=userSignup(day);

        return(
          <div key={day} className="day-card">
            <div className="day-card-hdr" onClick={()=>toggle(day)}>
              <div className="day-left">
                <div>
                  <div className="day-name">{day}</div>
                  {game.date&&<div className="day-date">{fmtD(game.date)}</div>}
                </div>
              </div>
              <div className="day-right">
                {myEntry&&(
                  <span className="pill pill-green" style={{fontSize:10}}>You're in</span>
                )}
                <span className={`day-count${count===0?' zero':''}`}>{count} {count===1?'player':'players'}</span>
                <svg className={`day-chevron${isOpen?' open':''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            </div>

            {isOpen&&(
              <div className="day-body">
                {count===0&&<div className="day-empty">No sign-ups yet for {day}</div>}
                {list.map(([key,s])=>(
                  <div key={key} className="player-row">
                    <div className="player-info">
                      <div className="avatar">{ini(s.name)}</div>
                      <div>
                        <div className="player-name-text">{s.name}{s.isGuest&&<span className="pill pill-gray" style={{fontSize:10,marginLeft:5}}>Guest</span>}</div>

                      </div>
                    </div>
                    {(isAdmin||(currentUser&&s.name===currentUser))&&(
                      <button className="remove-btn" onClick={()=>onRemove(key)} title="Remove">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      </button>

                    <div key={p.id} className={`player-pick${sel==p.id?' sel':''}`} onClick={()=>{setSel(p.id);setQ('')}}>
                      <div className="avatar" style={{width:28,height:28,fontSize:10}}>{ini(p.name)}</div>

                </div>

                <label className="form-label">Guest name</label>
                <input className="form-input" placeholder="Full name" value={gname} onChange={e=>setGname(e.target.value)}/>
              </div>
            )}
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Tees</label>
                <select className="form-select" value={tee} onChange={e=>setTee(e.target.value)}>{TEES.map(t=><option key={t}>{t}</option>)}</select>
              </div>
              <div className="form-group">
                <label className="form-label">Handicap</label>
                <input className="form-input" type="number" placeholder="e.g. 14" value={hcp} onChange={e=>setHcp(e.target.value)}/>
              </div>
            </div>
            <button className="btn btn-primary btn-full" onClick={submit} disabled={(!sel&&!gname)||!hcp}>Confirm sign-up</button>
          </div>
        </div>
      )}
    </div>
  );
}

function TeamsView({game,teams,signups,isAdmin,onSave,onPublish}){

    if(!drag)return;
    const u=edit.map(t=>({...t,players:[...t.players]}));
    const p=u[drag.ti].players[drag.pi];
    u[drag.ti].players.splice(drag.pi,1);u[ti].players.splice(pi,0,p);
    u.forEach(t=>{t.players.forEach((p,i)=>{p.slot=['A','B','C','D'][i]||'D'});t.totalHcp=t.players.reduce((s,p)=>s+parseFloat(p.handicap||0),0)});

            {edit&&<button className="btn btn-secondary btn-sm" onClick={()=>setEdit(null)}>Cancel</button>}
            {!edit&&display?.length>0&&!game.teamsPublished&&<button className="btn btn-gold btn-sm" onClick={onPublish}>Publish to group</button>}
          </div>
          {edit&&<div className="alert alert-warn" style={{marginTop:10,marginBottom:0}}>Drag players between teams to rebalance, then save.</div>}
        </div>

      {(edit||teams||[]).map((team,ti)=>(

            <span className="team-name-lbl">{team.name}</span>

            <div key={pi} className="team-row" draggable={!!edit} onDragStart={()=>setDrag({ti,pi})} onDragOver={e=>e.preventDefault()} onDrop={()=>drop(ti,pi)}>
              {edit&&<span style={{color:'var(--text-muted)',fontSize:16,cursor:'grab'}}>⠿</span>}
              <span className="slot">{p.slot}</span>
              <div className="avatar" style={{width:30,height:30,fontSize:11}}>{ini(p.name)}</div>

            </div>

// ── SCORING VIEW ──────────────────────────────────────────────────────────────
function ScoringView({game,teams,scores,onSave,isAdmin}){
  const [ts,setTs]=useState({});const [sk,setSk]=useState({});
  const [fp,setFp]=useState(2);const [bp,setBp]=useState(2);const [op,setOp]=useState(2);
  const [fv,setFv]=useState('');const [bv,setBv]=useState('');const [ov,setOv]=useState('');const [sv,setSv]=useState('');
  const [saved,setSaved]=useState(false);
  useEffect(()=>{if(scores){setTs(scores.teamScores||{});setSk(scores.skinCounts||{});setFv(scores.frontPot||'');setBv(scores.backPot||'');setOv(scores.overallPot||'');setSv(scores.skinsPot||'');setFp(scores.frontPlaces||2);setBp(scores.backPlaces||2);setOp(scores.overallPlaces||2)}},[scores]);
  const pc=Object.keys(game?.signups||{}).length||0;
  const total=pc*25;const fund=pc;
  const snet=Math.max(0,parseFloat(sv||0)-fund);
  const tsk=Object.values(sk).reduce((s,c)=>s+c,0);
  const perSk=tsk>0?snet/tsk:0;
  const alloc=parseFloat(fv||0)+parseFloat(bv||0)+parseFloat(ov||0)+parseFloat(sv||0);
  const ok=Math.abs(alloc-total)<0.01;
  function tap(id){if(!isAdmin)return;setSk(p=>({...p,[id]:(p[id]||0)+1}))}
  function untap(id){setSk(p=>({...p,[id]:Math.max(0,(p[id]||0)-1)}))}
  function pay(pot,places){const p=parseFloat(pot||0);if(!p)return[];return places===1?[{l:'1st place',a:p}]:[{l:'1st place',a:p*0.6},{l:'2nd place',a:p*0.4}]}
  function save(){onSave({teamScores:ts,skinCounts:sk,frontPot:fv,backPot:bv,overallPot:ov,skinsPot:sv,frontPlaces:fp,backPlaces:bp,overallPlaces:op,tournFund:fund,playerCount:pc,savedAt:Date.now()});setSaved(true);setTimeout(()=>setSaved(false),2500)}
  if(!game)return<div className="empty"><div>{Ic.trophy}</div><div className="empty-title">No active game</div></div>;
  if(!teams?.length)return<div className="empty"><div>{Ic.trophy}</div><div className="empty-title">Teams not published yet</div></div>;
  return(
    <div>
      {isAdmin&&(
        <div className="admin-bar">
          <div className="admin-bar-title">Pot setup — {pc} players · {f$(total)} total</div>
          <div className="form-row" style={{marginBottom:10}}>
            <div className="form-group" style={{marginBottom:0}}><label className="form-label">Front 9</label><input className="form-input" type="number" placeholder="$0" value={fv} onChange={e=>setFv(e.target.value)}/></div>
            <div className="form-group" style={{marginBottom:0}}><label className="form-label">Back 9</label><input className="form-input" type="number" placeholder="$0" value={bv} onChange={e=>setBv(e.target.value)}/></div>
          </div>
          <div className="form-row">
            <div className="form-group" style={{marginBottom:0}}><label className="form-label">Overall</label><input className="form-input" type="number" placeholder="$0" value={ov} onChange={e=>setOv(e.target.value)}/></div>
            <div className="form-group" style={{marginBottom:0}}><label className="form-label">Skins</label><input className="form-input" type="number" placeholder="$0" value={sv} onChange={e=>setSv(e.target.value)}/></div>
          </div>
          {alloc>0&&<div style={{marginTop:8,fontSize:12,fontWeight:700,color:ok?'var(--green-accent)':'var(--danger)'}}>{ok?'✓ Pot balanced — '+f$(total):'⚠ '+f$(alloc)+' of '+f$(total)+' allocated'}</div>}
        </div>
      )}
      {isAdmin&&(
        <div className="card">
          <div className="slbl">Places paid per section</div>
          {[{l:'Front 9',v:fp,s:setFp},{l:'Back 9',v:bp,s:setBp},{l:'Overall',v:op,s:setOp}].map(({l,v,s})=>(
            <div key={l} style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <span style={{fontSize:14,fontWeight:500}}>{l}</span>
              <div className="toggle" style={{width:164}}>
                <button className={`tog${v===1?' on':''}`} onClick={()=>s(1)}>1st only</button>
                <button className={`tog${v===2?' on':''}`} onClick={()=>s(2)}>1st + 2nd</button>
              </div>
            </div>
          ))}
        </div>
      )}
      <div className="card">
        <div className="slbl">Team scores</div>
        <div className="score-grid" style={{marginBottom:8}}>
          <div></div><div className="score-hd">Front</div><div className="score-hd">Back</div><div className="score-hd">Ovr</div>
        </div>
        {teams.map(t=>(
          <div key={t.id} className="score-grid" style={{marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:700}}>{t.name}</div>
            {['front','back','overall'].map(seg=>(
              <input key={seg} className="score-input" type="number" placeholder="—"
                value={(ts[t.id]||{})[seg]||''}
                onChange={e=>isAdmin&&setTs(p=>({...p,[t.id]:{...(p[t.id]||{}),[seg]:e.target.value}}))}
                readOnly={!isAdmin}/>
            ))}
          </div>
        ))}
      </div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div className="slbl" style={{marginBottom:0}}>Skins tapper</div>
          <div style={{fontSize:12,color:'var(--text-muted)',fontWeight:600}}>{tsk} skin{tsk!==1?'s':''}{sv?' · '+f$(snet)+' net':''}</div>
        </div>
        <div className="skin-grid">
          {teams.map(t=>(
            <div key={t.id} className={`skin-btn${(sk[t.id]||0)>0?' on':''}`} onClick={()=>tap(t.id)}>
              <div className="skin-team">{t.name}</div>
              <div className="skin-num">{sk[t.id]||0}</div>
              <div className="skin-lbl">skin{(sk[t.id]||0)!==1?'s':''}</div>
              {isAdmin&&(sk[t.id]||0)>0&&<div className="skin-undo" onClick={e=>{e.stopPropagation();untap(t.id)}}>undo</div>}
              {!isAdmin&&<div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>view only</div>}
            </div>
          ))}
        </div>
        {sv&&snet>0&&<div className="alert alert-ok">Tournament fund: {f$(fund)} · Net skins: {f$(snet)}{tsk>0?' · '+f$(perSk.toFixed(2))+' per skin':''}</div>}
      </div>
      {(fv||bv||ov||sv)&&(
        <div className="card">
          <div className="slbl">Payout breakdown</div>
          {[{l:'Front 9',pot:fv,pl:fp,tag:'gross + net'},{l:'Back 9',pot:bv,pl:bp,tag:'net'},{l:'Overall',pot:ov,pl:op,tag:'net'}].map(({l,pot,pl,tag})=>
            parseFloat(pot||0)>0?(
              <div key={l} style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.06em'}}>{l} <span className="pill pill-gray" style={{fontSize:10}}>{tag}</span></div>
                {pay(pot,pl).map(({l:pl,a})=><div key={pl} className="payout-row"><span className="payout-lbl">{pl}</span><span className="payout-amt">{f$(a)}</span></div>)}
              </div>
            ):null
          )}
          {parseFloat(sv||0)>0&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.06em'}}>Skins</div>
              <div className="payout-row"><span className="payout-lbl">Net skins pot</span><span className="payout-amt">{f$(snet)}</span></div>
              {tsk>0&&<div className="payout-row"><span className="payout-lbl">Per skin ({tsk} total)</span><span className="payout-amt">{f$(perSk.toFixed(2))}</span></div>}
              <div className="payout-row"><span className="payout-lbl" style={{color:'var(--gold)'}}>Tournament fund</span><span className="payout-amt gold">{f$(fund)}</span></div>
            </div>
          )}
          <div className="payout-total"><span>Total pot</span><span style={{color:'var(--green)'}}>{f$(total)}</span></div>
        </div>
      )}
      {isAdmin&&<button className="btn btn-primary btn-full" style={{marginTop:8}} onClick={save}>{saved?'✓ Saved!':'Save scores & payouts'}</button>}
    </div>
  );
}

// ── HISTORY VIEW ──────────────────────────────────────────────────────────────
function HistoryView({history}){
  const [open,setOpen]=useState(null);
  const rounds=Object.entries(history||{}).sort((a,b)=>(b[1].date||'').localeCompare(a[1].date||''));
  if(!rounds.length)return<div className="empty"><div>{Ic.clock}</div><div className="empty-title">No rounds yet</div><div className="empty-sub">Completed rounds appear here.</div></div>;
  return(
    <div>
      <div className="slbl">{rounds.length} round{rounds.length!==1?'s':''} on record</div>
      {rounds.map(([k,r])=>(
        <div key={k} className="hist-item">
          <div className="hist-hdr" onClick={()=>setOpen(open===k?null:k)}>
            <div><div className="hist-title">{r.day} · {fmtDFull(r.date)}</div><div className="hist-meta">{r.playerCount||0} players · {f$((r.playerCount||0)*25)} pot</div></div>
            <span style={{color:'var(--text-muted)',display:'flex',transform:open===k?'rotate(180deg)':'none',transition:'transform 0.2s'}}>{Ic.chev}</span>
          </div>
          {open===k&&(
            <div className="hist-body">
              {r.teams?.map(t=>(
                <div key={t.id} style={{marginBottom:12}}>
                  <div style={{fontSize:14,fontWeight:800,color:'var(--green)',fontFamily:'Syne',marginBottom:4}}>{t.name} <span style={{fontWeight:400,color:'var(--text-muted)',fontSize:12}}>HCP {t.totalHcp?.toFixed(1)}</span></div>
                  {t.players?.map((p,i)=><div key={i} style={{fontSize:13,color:'var(--text-mid)',paddingLeft:8,marginBottom:3,display:'flex',alignItems:'center',gap:6}}><span className="slot" style={{fontSize:9}}>{p.slot}</span>{p.name} · {p.tee} {p.handicap}</div>)}
                </div>
              ))}
              {r.scores&&(
                <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
                  <div className="slbl">Results</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr repeat(3,50px)',gap:'4px 6px',fontSize:12}}>
                    <div style={{color:'var(--text-muted)'}}>Team</div>
                    {['Front','Back','Ovr'].map(h=><div key={h} style={{color:'var(--text-muted)',textAlign:'center'}}>{h}</div>)}
                    {r.teams?.map(t=>(
                      <React.Fragment key={t.id}>
                        <div style={{fontWeight:700}}>{t.name}</div>
                        {['front','back','overall'].map(s=><div key={s} style={{textAlign:'center'}}>{r.scores.teamScores?.[t.id]?.[s]||'—'}</div>)}
                      </React.Fragment>
                    ))}
                  </div>
                  {r.scores.skinCounts&&Object.entries(r.scores.skinCounts).some(([,c])=>c>0)&&(
                    <div style={{marginTop:8,fontSize:12,color:'var(--text-mid)'}}>Skins: {Object.entries(r.scores.skinCounts).filter(([,c])=>c>0).map(([id,c])=>{const t=r.teams?.find(t=>String(t.id)===String(id));return<span key={id} style={{marginRight:10}}>{t?.name||'Team '+id}: {c}</span>})}</div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── ADMIN VIEW ────────────────────────────────────────────────────────────────
function AdminView({isAdmin,onLogin,onLogout,gameData,onCreate,onArchive,onAddPlayer,roster}){
  const [pw,setPw]=useState('');
  const [g,setG]=useState({day:'Saturday',date:td(),course:'',teetime:''});
  const [np,setNp]=useState({name:'',email:''});
  const [showG,setShowG]=useState(false);
  const [showP,setShowP]=useState(false);
  if(!isAdmin)return(
    <div>
      <div className="card">
        <div style={{fontFamily:'Syne',fontSize:20,fontWeight:800,marginBottom:16}}>Admin login</div>
        <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="Enter admin password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onLogin(pw)}/></div>
        <button className="btn btn-primary btn-full" onClick={()=>onLogin(pw)}>Sign in as admin</button>
      </div>
      <div style={{textAlign:'center',fontSize:12,color:'var(--text-muted)',marginTop:10}}>Contact Clark for the admin password.</div>
    </div>
  );
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}><span className="admin-tag">ADMIN</span><span style={{fontSize:15,fontWeight:700}}>Control panel</span></div>
        <button className="btn btn-secondary btn-sm" onClick={onLogout}>Sign out</button>
      </div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:showG?14:0}}>
          <div style={{fontWeight:700,fontSize:15}}>Current game</div>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowG(!showG)}>{Ic.plus} New game</button>
        </div>
        {showG&&(
          <div style={{borderTop:'1px solid var(--border)',paddingTop:14}}>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Day</label><select className="form-select" value={g.day} onChange={e=>setG({...g,day:e.target.value})}><option>Friday</option><option>Saturday</option><option>Sunday</option></select></div>
              <div className="form-group"><label className="form-label">Date</label><input className="form-input" type="date" value={g.date} onChange={e=>setG({...g,date:e.target.value})}/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Course</label><input className="form-input" placeholder="e.g. Laytonsville" value={g.course} onChange={e=>setG({...g,course:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">First tee time</label><input className="form-input" placeholder="e.g. 7:30 AM" value={g.teetime} onChange={e=>setG({...g,teetime:e.target.value})}/></div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={()=>{onCreate(g);setShowG(false)}}>Create game</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>setShowG(false)}>Cancel</button>
            </div>
          </div>
        )}
        {gameData&&!showG&&(
          <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
            <div style={{fontFamily:'Syne',fontWeight:800,color:'var(--green)',fontSize:16}}>{gameData.day} · {fmtDFull(gameData.date)}</div>
            {gameData.course&&<div style={{fontSize:12,color:'var(--text-muted)',marginTop:3}}>{gameData.course}</div>}
            <button className="btn btn-danger btn-sm" style={{marginTop:12}} onClick={onArchive}>Archive &amp; close round</button>
          </div>
        )}
        {!gameData&&!showG&&<div style={{fontSize:13,color:'var(--text-muted)',marginTop:8}}>No active game. Create one above.</div>}
      </div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:showP?14:0}}>
          <div style={{fontWeight:700,fontSize:15}}>Roster <span style={{fontWeight:400,fontSize:13,color:'var(--text-muted)'}}>({roster.filter(p=>!p.isGuest).length})</span></div>
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowP(!showP)}>{Ic.plus} Add player</button>
        </div>
        {showP&&(
          <div style={{borderTop:'1px solid var(--border)',paddingTop:14}}>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Name</label><input className="form-input" placeholder="Full name" value={np.name} onChange={e=>setNp({...np,name:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Email (opt)</label><input className="form-input" placeholder="email" value={np.email} onChange={e=>setNp({...np,email:e.target.value})}/></div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={()=>{if(np.name){onAddPlayer(np);setNp({name:'',email:''});setShowP(false)}}}>Add to roster</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>setShowP(false)}>Cancel</button>
            </div>
          </div>
        )}
        <div style={{maxHeight:220,overflowY:'auto',marginTop:showP?8:4}}>
          {roster.filter(p=>!p.isGuest).map(p=>(
            <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
              <span style={{fontWeight:500}}>{p.name}</span>
              {p.id>96&&<span className="pill pill-green" style={{fontSize:10}}>New</span>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const [role,setRole]=useState(null); // null=landing, 'player', 'admin'
  const [tab,setTab]=useState('home');
  const [isAdmin,setIsAdmin]=useState(false);
  const [currentUser,setCurrentUser]=useState('');
  const [game,setGame]=useState(null);
  const [signups,setSignups]=useState({});
  const [teams,setTeams]=useState([]);
  const [scores,setScores]=useState(null);
  const [history,setHistory]=useState({});
  const [extra,setExtra]=useState([]);
  const {ready,read,write,push,del}=useDB();
  const roster=[...ROSTER,...extra];

  useEffect(()=>{
    if(!ready)return;
    const u=[];
    u.push(read('currentGame',v=>setGame(v)));
    u.push(read('signups',v=>setSignups(v||{})));
    u.push(read('teams',v=>setTeams(v||[])));
    u.push(read('scores',v=>setScores(v)));
    u.push(read('history',v=>setHistory(v||{})));
    u.push(read('extraPlayers',v=>setExtra(v||[])));
    return()=>u.forEach(f=>typeof f==='function'&&f());
  },[ready]);

  function login(pw){if(pw===ADMIN_PW){setIsAdmin(true);}else alert('Wrong password')}
  function createGame(g){write('currentGame',{...g,teamsPublished:false,createdAt:Date.now()});write('signups',{});write('teams',[]);write('scores',null)}
  function archive(){
    if(!game||!window.confirm('Archive this round? Saves to history and closes the game.'))return;
    push('history',{...game,teams,scores,playerCount:Object.keys(signups).length,archivedAt:Date.now()});
    write('currentGame',null);write('signups',{});write('teams',[]);write('scores',null);
  }

  // Landing screen
  if(!role){
    return(
      <Landing
        onPlayer={()=>{setRole('player');setTab('home')}}
        onAdmin={()=>{setRole('admin');setTab('home')}}
      />
    );
  }

  const playerTabs=[
    {id:'home',label:'This Week',icon:Ic.flag},
    {id:'teams',label:'Teams',icon:Ic.users},
    {id:'scoring',label:'Scoring',icon:Ic.trophy},
    {id:'history',label:'History',icon:Ic.clock},
  ];
  const adminTabs=[
    {id:'home',label:'This Week',icon:Ic.flag},
    {id:'teams',label:'Teams',icon:Ic.users},
    {id:'scoring',label:'Scoring',icon:Ic.trophy},
    {id:'history',label:'History',icon:Ic.clock},
    {id:'admin',label:'Admin',icon:Ic.gear},
  ];
  const TABS=role==='admin'?adminTabs:playerTabs;

  // Total signups across all days for header
  const totalSignups=Object.keys(signups||{}).length;
  const activeDays=['Friday','Saturday','Sunday'].filter(d=>Object.values(signups||{}).some(s=>s.day===d)).length;

  return(
    <div className="app">
      <div className="hdr">
        <div className="hdr-inner">
          <div className="hdr-eyebrow">Weekly golf game</div>
          <div className="hdr-title">Clark <span>Golf</span> Group</div>
          <div className="hdr-stats">
            <div className="hdr-stat"><div className="hdr-stat-num">{totalSignups}</div><div className="hdr-stat-lbl">Signed Up</div></div>
            <div className="hdr-stat"><div className="hdr-stat-num">{activeDays}</div><div className="hdr-stat-lbl">Active Days</div></div>
            <div className="hdr-stat"><div className="hdr-stat-num">{(teams||[]).length}</div><div className="hdr-stat-lbl">Teams</div></div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:2}}>
            {game?(
              <div className="hdr-game-pill"><span className="hdr-dot"></span>{game.day} · {fmtD(game.date)}{game.course?' · '+game.course:''}</div>
            ):(
              <div className="hdr-game-pill" style={{opacity:0.5}}>No game scheduled</div>
            )}
            {isAdmin&&<span className="admin-tag">ADMIN</span>}
            <button onClick={()=>setRole(null)} style={{marginLeft:'auto',background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:20,padding:'4px 10px',color:'rgba(255,255,255,0.5)',fontSize:11,fontWeight:600,cursor:'pointer',letterSpacing:'0.04em'}}>Switch</button>
          </div>
        </div>
      </div>

      <nav className="nav">
        {TABS.map(t=><button key={t.id} className={`nav-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.icon}{t.label}</button>)}
      </nav>

      <div className="content">
        {tab==='home'&&(
          <WeekDashboard
            game={game}
            signups={signups}
            currentUser={currentUser}
            onSignup={d=>push('signups',d)}
            onRemove={k=>del('signups/'+k)}
            isAdmin={isAdmin}
          />
        )}
        {tab==='teams'&&<TeamsView game={game?{...game,signups}:null} teams={teams} signups={signups} isAdmin={isAdmin} onSave={t=>write('teams',t)} onPublish={()=>{write('teams',teams);write('currentGame',{...game,teamsPublished:true})}}/>}
        {tab==='scoring'&&<ScoringView game={game?{...game,signups}:null} teams={teams} scores={scores} onSave={s=>write('scores',s)} isAdmin={isAdmin}/>}
        {tab==='history'&&<HistoryView history={history}/>}
        {tab==='admin'&&<AdminView isAdmin={isAdmin} onLogin={login} onLogout={()=>{setIsAdmin(false)}} gameData={game} onCreate={createGame} onArchive={archive} onAddPlayer={p=>write('extraPlayers',[...extra,{...p,id:100+extra.length+1}])} roster={roster}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
