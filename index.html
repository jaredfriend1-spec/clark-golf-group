function useDB(){
  const [db,setDb]=useState(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    try{if(!firebase.apps.length)firebase.initializeApp(FB);setDb(firebase.database());setReady(true);}
    catch(e){setReady(true);}
  },[]);
  const read=useCallback((p,cb)=>{if(!db){cb(LS.g(p));return()=>{};}const r=db.ref(p);r.on('value',s=>cb(s.val()));return()=>r.off();},[db]);
  const write=useCallback((p,v)=>{if(!db){LS.s(p,v);return Promise.resolve();}return db.ref(p).set(v);},[db]);
  const push=useCallback((p,v)=>{if(!db){const e=LS.g(p)||{};const k=Date.now().toString();e[k]=v;LS.s(p,e);return Promise.resolve(k);}return db.ref(p).push(v).then(r=>r.key);},[db]);
  const del=useCallback((p)=>{if(!db){localStorage.removeItem(p);return Promise.resolve();}return db.ref(p).remove();},[db]);
  return{ready,read,write,push,del};
}

const fmtD=d=>{if(!d)return'';const[,m,dy]=d.split('-');return MO[parseInt(m)-1]+' '+parseInt(dy);};

function getWeekDates(){
  const now=new Date();
  const day=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-day+(day===0?-6:1));
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);
  const sat=new Date(mon);sat.setDate(mon.getDate()+5);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const fmt=d=>d.toISOString().split('T')[0];
  return{Friday:fmt(fri),Saturday:fmt(sat),Sunday:fmt(sun)};
}

function getWeekLabel(){
  const wd=getWeekDates();
  return'Week of '+fmtD(wd.Friday)+' - '+fmtD(wd.Sunday);
}

function buildTeams(players){
  const sorted=[...players].sort((a,b)=>parseFloat(a.handicap)-parseFloat(b.handicap));
  const n=sorted.length;
  if(n<3)return[];
  const nt=Math.ceil(n/4);
  const teams=Array.from({length:nt},(_,i)=>({id:i+1,name:'',players:[],totalHcp:0}));
  sorted.forEach((p,idx)=>{
    const round=Math.floor(idx/nt);
    const pos=idx%nt;
    const ti=round%2===0?pos:nt-1-pos;
    teams[ti].players.push({...p,slot:['A','B','C','D'][Math.min(round,3)]});
    teams[ti].totalHcp+=parseFloat(p.handicap)||0;
  });
  return teams;
}

function calcPot(playerCount){
  const skins=playerCount*10;
  const side=playerCount*5;
  return{skins,front:side,back:side,overall:side,total:skins+side*3};
}

function buildPayouts(pot,places,teams,scores,seg,custom1,custom2){
  const p=parseFloat(pot||0);
  if(!p||!teams)return[];
  const w=getWinners(teams,scores,seg);
  if(!w)return [];
  const rows=[];
  const first=parseFloat(custom1)|| (places===1?p:p*0.6);
  const second=parseFloat(custom2)|| p*0.4;
  if(w.tied.length>1){
    const split=places===1?first/w.tied.length:(first+second)/w.tied.length;
    rows.push({label:'1st (Tie)',amt:split,teams:w.tied,isTie:true});
  } else {
    rows.push({label:'1st',amt:first,teams:w.tied,isTie:false});
    if(places===2&&w.second)rows.push({label:'2nd',amt:second,teams:[w.second],isTie:false});
  }
  return rows;
}

function getWinners(teams,scores,seg){
  if(!teams||!teams.length)return null;
  const sc=teams.map(t=>({...t,score:parseFloat((scores[t.id]||{})[seg])})).filter(t=>!isNaN(t.score));
  if(!sc.length)return null;
  sc.sort((a,b)=>a.score-b.score);
  const best=sc[0].score;
  const tied=sc.filter(t=>t.score===best);
  const second=sc.find(t=>t.score!==best);
  return{best,tied,second};
}

  const [fp,setFp]=useState(1);const [bp,setBp]=useState(1);const [op,setOp]=useState(1);
  const [fv,setFv]=useState('');const [bv,setBv]=useState('');const [ov,setOv]=useState('');const [sv,setSv]=useState('');
  const activeDays=sortDays(safeArray(week?.activeDays));

  useEffect(()=>{if(!activeDay && activeDays.length) setActiveDay(activeDays[0])},[activeDays]);
  useEffect(()=>{
    if(!activeDay)return;
    const sc=week?.scores?.[activeDay]||{};
    setTs(sc.teamScores||{});setSk(sc.skinCounts||{});
    setFv(sc.frontPot||'');setBv(sc.backPot||'');setOv(sc.overallPot||'');setSv(sc.skinsPot||'');
  },[activeDay, week]);

  if(!activeDay) return null;
  const dayTeams=safeArray(week?.teams?.[activeDay]);
  const pc=safeArray(week?.signups).filter(s=>s.day===activeDay).length;

  return(
    <div>
      <div className="tog">
        {activeDays.map(d=><button key={d} className={'tog-opt'+(activeDay===d?' on':'')} onClick={()=>setActiveDay(d)}>{d.slice(0,3)}</button>)}
      </div>

      <PaymentBar display={dayTeams} week={week} activeDay={activeDay} showPaid={true} onToggle={()=>{}}/>

      {isAdmin && (
        <div className="admin-bar">
          <div className="admin-lbl">Pot Setup (Total: {f$(pc*25)})</div>
          <div className="fr">
            <div className="fg"><label className="fl">Front</label><input className="fi" type="number" value={fv} onChange={e=>setFv(e.target.value)}/></div>
            <div className="fg"><label className="fl">Back</label><input className="fi" type="number" value={bv} onChange={e=>setBv(e.target.value)}/></div>
            <div className="fg"><label className="fl">Overall</label><input className="fi" type="number" value={ov} onChange={e=>setOv(e.target.value)}/></div>
            <div className="fg"><label className="fl">Skins</label><input className="fi" type="number" value={sv} onChange={e=>setSv(e.target.value)}/></div>
          </div>
        </div>
      )}

      <div className="card card-pad">
        <div className="slbl">Enter Scores</div>
        {dayTeams.map(t=>(
          <div key={t.id} className="sc-grid" style={{marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:600}}>{t.name || 'Team'} <span style={{fontWeight:400,color:'#94a3b8'}}>- {safeArray(t.players).map(p=>p.name.split(' ').pop()).join(', ')}</span></div>
            {['front','back','overall'].map(seg=>(
              <ScorePicker key={seg} value={ts[t.id]?.[seg]} readOnly={!isAdmin} onChange={v=>setTs(p=>({...p,[t.id]:{...p[t.id],[seg]:v}}))}/>
            ))}
          </div>
        ))}
        {isAdmin && <button className="btn btn-dark btn-full" onClick={()=>onSaveScores(activeDay,{teamScores:ts,skinCounts:sk,frontPot:fv,backPot:bv,overallPot:ov,skinsPot:sv,frontPlaces:fp,backPlaces:bp,overallPlaces:op,savedAt:Date.now()})}>Save Scores</button>}
      </div>
    </div>
  );
}

function AdminView({week,onCreate,onUpdateTeeTime,onSaveTeams,onPublishTeams,onToggleLock,onClearWeek}){
  const [wizDay,setWizDay]=useState(null);
  const activeDays=sortDays(safeArray(week?.activeDays));

  return(
    <div>
      <AdminChecklist week={week} activeDays={activeDays} onGoTo={()=>{}}/>
      <div className="card card-pad">
        <div className="slbl">Week Management</div>
        {DAYS_OF_WEEK.map(day=>(
          <div key={day} style={{padding:'10px 0',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
             <span>{day}</span>
             <button className="btn btn-outline btn-sm" onClick={()=>setWizDay(day)}>Set Up</button>
          </div>
        ))}
        <button className="btn btn-red btn-full" style={{marginTop:20}} onClick={onClearWeek}>Clear All Data</button>
      </div>
      {wizDay && (
        <div className="overlay" onClick={()=>setWizDay(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
             <SetupWizard day={wizDay} week={week} onSaveTeams={onSaveTeams} onPublishTeams={onPublishTeams} onUpdateTeeTime={onUpdateTeeTime} onToggleLock={onToggleLock} onClose={()=>setWizDay(null)}/>
          </div>
        </div>
      )}
    </div>
  );
}

function SetupWizard({day,week,onSaveTeams,onPublishTeams,onUpdateTeeTime,onToggleLock,onClose}){
  const [step,setStep]=useState(1);
  const [wizTeams,setWizTeams]=useState(null);
  const signups=Object.values(week?.signups||{}).filter(s=>s.day===day);

  function finish(){
    const names=['Team One','Team Two','Team Three','Team Four','Team Five','Team Six'];
    const final=wizTeams.map((t,i)=>({...t,name:names[i]||`Team ${i+1}`}));
    onSaveTeams(day,final);
    onPublishTeams(day);
    onToggleLock(day,true);
    onClose();
  }

  return(
    <div>
      <div className="modal-title">Set Up {day}</div>
      {step===1 && (
        <div>
          <div className="fg"><label className="fl">Tee Time</label><TimePicker onChange={v=>onUpdateTeeTime(day,{time:v,lottery:false})}/></div>
          <button className="btn btn-dark btn-full" onClick={()=>setStep(2)}>Next</button>
        </div>
      )}
      {step===2 && (
        <div>
          <button className="btn btn-dark btn-full" onClick={()=>{setWizTeams(buildTeams(signups));setStep(3);}}>Generate Teams</button>
        </div>
      )}
      {step===3 && (
        <div>
          {wizTeams.map((t,i)=><div key={i} style={{padding:8,background:'#f8fafc',marginBottom:4,fontSize:12}}>Group {i+1}: {safeArray(t.players).map(p=>p.name.split(' ').pop()).join(', ')}</div>)}
          <button className="btn btn-green btn-full" onClick={finish}>Publish & Lock</button>
        </div>
      )}
    </div>
  );
}

function App(){
  const [role,setRole]=useState(null);
  const [tab,setTab]=useState('home');
  const [week,setWeek]=useState(null);
  const [extra,setExtra]=useState([]);
  const {ready,read,write,push,del}=useDB();

  useEffect(()=>{
    if(!ready)return;
    const u=[];
    u.push(read('week',v=>setWeek(v)));
    u.push(read('extraPlayers',v=>setExtra(safeArray(v))));
    return()=>u.forEach(f=>f?.());
  },[ready]);

  if(!role) return <Landing onPlayer={()=>setRole('player')} onAdmin={()=>setRole('admin')} onDemoPlayer={()=>setRole('player')} onDemoAdmin={()=>setRole('admin')}/>;

  return(
    <div className="app">
      <div className="hdr">
        <div className="hdr-curve"></div>
        <div className="hdr-inner">
           <div className="hdr-brand">Clark <em>Golf</em> Group</div>
           <div style={{color:'rgba(255,255,255,0.4)',fontSize:11}}>{getWeekLabel()}</div>
        </div>
      </div>
      <nav className="nav">
        <button className={'nb'+(tab==='home'?' on':'')} onClick={()=>setTab('home')}>This Week</button>
        <button className={'nb'+(tab==='teams'?' on':'')} onClick={()=>setTab('teams')}>Teams</button>
        <button className={'nb'+(tab==='scoring'?' on':'')} onClick={()=>setTab('scoring')}>Scoring</button>
        {role==='admin' && <button className={'nb'+(tab==='admin'?' on':'')} onClick={()=>setTab('admin')}>Admin</button>}
      </nav>
      <div className="content">
        {tab==='home' && <WeekView week={week} isAdmin={role==='admin'} onSignup={d=>push('week/signups',d)} onRemove={k=>del('week/signups/'+k)}/>}
        {tab==='teams' && <TeamsView week={week} isAdmin={role==='admin'} onSaveTeams={(d,t)=>write(`week/teams/${d}`,t)}/>}
        {tab==='scoring' && <ScoringView week={week} isAdmin={role==='admin'} onSaveScores={(d,s)=>write(`week/scores/${d}`,s)} onUpdatePaid={(d,n,p)=>write(`week/paid/${d}/${n}`,p)}/>}
        {tab==='admin' && <AdminView week={week} onUpdateTeeTime={(d,t)=>write(`week/teeTimes/${d}`,t)} onSaveTeams={(d,t)=>write(`week/teams/${d}`,t)} onPublishTeams={d=>write(`week/teamsPublished/${d}`,true)} onToggleLock={(d,l)=>write(`week/locked/${d}`,l)} onClearWeek={()=>write('week',null)} onCreate={d=>write('week',d)}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
