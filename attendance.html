.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.25);display:flex;align-items:center;gap:6px;animation:toastIn 0.25s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

function parseDate(str){const p=str.trim().match(/(\w+)\s+(\d+),?\s*(\d{4})/);if(!p)return null;const mi=MO.indexOf(p[1]);if(mi===-1)return null;return p[3]+'-'+String(mi+1).padStart(2,'0')+'-'+String(parseInt(p[2])).padStart(2,'0');}
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return MO[parseInt(m)-1]+' '+parseInt(d)+', '+y;}

function useDB(){

function parseCSV(text){
  const lines=text.split('\n').filter(l=>l.trim());const rounds={};
  for(let i=1;i<lines.length;i++){
    const matches=[];const re=/("([^"]*)"|([^,]+))/g;let m;
    while((m=re.exec(lines[i]))!==null)matches.push((m[2]||m[3]||'').trim());
    if(matches.length<4)continue;
    const fullName=mapName(matches[1]);const datesStr=matches[3];
    datesStr.split('|').map(d=>d.trim()).filter(Boolean).forEach(ds=>{const iso=parseDate(ds);if(!iso)return;if(!rounds[iso])rounds[iso]=[];if(!rounds[iso].includes(fullName))rounds[iso].push(fullName);});
  }
  return Object.entries(rounds).map(([date,players])=>({date,players:players.sort()})).sort((a,b)=>b.date.localeCompare(a.date));

          <div style={{maxHeight:220,overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:8,marginBottom:8}}>
            {extraGuests.map(name=>(
              <div key={name} className="pp sel" onClick={()=>toggle(name)}>
                <div className="pp-check on"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 13 4 10"/></svg></div>
                <span style={{fontSize:12,fontWeight:500,flex:1}}>{name}</span>
                <span style={{fontSize:10,color:'#94a3b8',background:'#f1f5f9',padding:'1px 6px',borderRadius:10}}>Guest</span>
              </div>
            ))}
            {filtered.map(name=>{
              const on=selected.has(name);
              return(<div key={name} className={'pp'+(on?' sel':'')} onClick={()=>toggle(name)}>
                <div className={'pp-check'+(on?' on':'')}>{on&&<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 13 4 10"/></svg>}</div>
                <span style={{fontSize:12,fontWeight:500}}>{name}</span>
              </div>);
            })}
          </div>
          <div style={{display:'flex',gap:6}}>
            <input className="fi" style={{flex:1,fontSize:12}} placeholder="Add guest name..." value={guestName} onChange={e=>setGuestName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addGuest();}}/>
            <button className="btn btn-outline btn-sm" onClick={addGuest} disabled={!guestName.trim()}>+ Guest</button>
          </div>
        </div>

        <button className="btn btn-green btn-full" onClick={()=>{if(!date||selected.size===0)return;onSave({date,players:[...selected].sort()});onClose();}} disabled={!date||selected.size===0} style={{opacity:(!date||selected.size===0)?0.4:1,marginTop:8}}>
          {editRound?'Save Changes':'Log Round ('+selected.size+' players)'}
        </button>
      </div>
    </div>
  );
}

function RoundCard({round,index,isAdmin,onAuth,onPlayerClick,onEdit,onDelete}){
  const[open,setOpen]=useState(false);
  const players=round.players||[];
  return(
    <div className="rnd">
      <div className="rnd-hdr" onClick={()=>setOpen(!open)}>
        <div><div className="rnd-date">{fmtDate(round.date)}</div><div className="rnd-meta">{players.length} player{players.length!==1?'s':''} · ${players.length} to pot</div></div>
        <div className="rnd-right"><span className="rnd-pill">{players.length}</span><svg className={'rnd-chev'+(open?' open':'')} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      {open&&(<div>
        <div className="rnd-body">
          {players.map((name,i)=>(<div key={name} className="rnd-player" onClick={()=>onPlayerClick(name)}><div className="rnd-num">{i+1}</div><span>{name}</span></div>))}
        </div>
        <div className="rnd-actions">
          {isAdmin&&(<>
            <button className="btn btn-outline btn-xs" onClick={e=>{e.stopPropagation();onEdit();}}>Edit</button>
            <button className="btn btn-red btn-xs" onClick={e=>{e.stopPropagation();if(confirm('Delete this round?'))onDelete();}}>Delete</button>
          </>)}
        </div>
      </div>)}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState('standings');
  const[rounds,setRounds]=useState([]);
  const[selectedPlayer,setSelectedPlayer]=useState(null);
  const[search,setSearch]=useState('');
  const[toast,setToast]=useState(null);
  const[isAdmin,setIsAdmin]=useState(false);
  const[logModal,setLogModal]=useState(false);
  const[editRound,setEditRound]=useState(null);
  const[archivedSeasons,setArchivedSeasons]=useState({});
  const[viewingSeason,setViewingSeason]=useState(null);
  const[deleteText,setDeleteText]=useState('');
  const[showEndSeason,setShowEndSeason]=useState(false);
  const[showAdminPrompt,setShowAdminPrompt]=useState(false);
  const{ready,read,write}=useDB();

  useEffect(()=>{const l=document.getElementById('loader');if(l){setTimeout(()=>{l.classList.add('hide');setTimeout(()=>l.remove(),500);},150);}},[]);
  useEffect(()=>{if(!ready)return;const u=[];
    u.push(read('attendance/rounds',v=>{if(v){const arr=Array.isArray(v)?v:Object.values(v);setRounds(arr.sort((a,b)=>b.date.localeCompare(a.date)));}else{setRounds([]);}}));
    u.push(read('attendance/archive',v=>setArchivedSeasons(v||{})));
    return()=>u.forEach(f=>{if(typeof f==='function')f();});
  },[ready]);

  const displayRounds=useMemo(()=>{
    if(!viewingSeason)return rounds;
    const s=archivedSeasons[viewingSeason];
    if(!s||!s.rounds)return[];
    const arr=Array.isArray(s.rounds)?s.rounds:Object.values(s.rounds);
    return arr.sort((a,b)=>b.date.localeCompare(a.date));
  },[rounds,viewingSeason,archivedSeasons]);

  function saveRounds(nr){const sorted=[...nr].sort((a,b)=>b.date.localeCompare(a.date));write('attendance/rounds',sorted);setRounds(sorted);}
  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),3000);}

  function archiveSeason(){
    if(rounds.length===0)return;
    const year=rounds[0].date.split('-')[0];
    const label=year+' Season';
    write('attendance/archive/'+year,{label,rounds,archivedAt:Date.now(),playerCount:standings.length,roundCount:rounds.length,potTotal:totalEntries});
    write('attendance/rounds',null);
    setRounds([]);
    setViewingSeason(null);
    showToast('Season archived as '+label);
  }

  function clearAllData(){
    write('attendance/rounds',null);
    setRounds([]);
    setDeleteText('');
    showToast('All data cleared');
  }

  const seasonKeys=Object.keys(archivedSeasons).sort().reverse();

  const activeRounds=viewingSeason?displayRounds:rounds;

  const standings=useMemo(()=>{
    const p={};activeRounds.forEach(r=>{(r.players||[]).forEach(name=>{if(!p[name])p[name]={name,rounds:0,dates:[]};p[name].rounds++;p[name].dates.push(r.date);});});
    return Object.values(p).sort((a,b)=>b.rounds-a.rounds);
  },[activeRounds]);

  const totalEntries=activeRounds.reduce((s,r)=>s+(r.players||[]).length,0);
  const maxR=standings.length>0?standings[0].rounds:1;

  function handleFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const parsed=parseCSV(ev.target.result);if(!parsed.length){showToast('No rounds found');return;}saveRounds(parsed);showToast(parsed.length+' rounds imported!');}catch(er){showToast('Error parsing CSV');}};r.readAsText(f);e.target.value='';}

  function exportCSV(){
    let csv='"Rank","Player","Total Rounds","Dates Played"\n';
    standings.forEach((p,i)=>{csv+='"'+(i+1)+'","'+p.name+'","'+p.rounds+'","'+p.dates.sort().map(d=>fmtDate(d)).join(' | ')+'"\n';});
    const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='clark_group_attendance.csv';a.click();URL.revokeObjectURL(url);
  }

  const TABS=[
    {id:'standings',label:'Standings',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>},
    {id:'history',label:'History',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>},
    {id:'import',label:'Import',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>},
  ];

  return(
    <div className="app">
      <div className="hdr"><div className="hdr-curve"></div><div className="hdr-inner">
        <div className="hdr-top"><div><div className="hdr-brand">Clark <em>Golf</em> Group</div><div className="hdr-sub">Season Attendance</div></div><a href="index.html" className="back-link"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>Main App</a></div>
        <div className="stat-row"><div className="stat-box"><div className="stat-n">{standings.length}</div><div className="stat-l">Players</div></div><div className="stat-box"><div className="stat-n">{rounds.length}</div><div className="stat-l">Rounds</div></div><div className="stat-box"><div className="stat-n">{maxR}</div><div className="stat-l">Top Played</div></div></div>
        <div className="pot-bar"><div><div className="pot-label">Year-End Tournament Pot</div><div className="pot-sub">$1 per player per round</div></div><div className="pot-amt">${totalEntries}</div></div>
        {seasonKeys.length>0&&(
          <div style={{marginTop:8,display:'flex',alignItems:'center',gap:6}}>
            <button onClick={()=>setViewingSeason(null)} style={{padding:'4px 10px',borderRadius:16,border:'1px solid',borderColor:!viewingSeason?'#10b981':'rgba(255,255,255,0.12)',background:!viewingSeason?'rgba(16,185,129,0.15)':'rgba(255,255,255,0.05)',color:!viewingSeason?'#10b981':'rgba(255,255,255,0.4)',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>Current</button>
            {seasonKeys.map(k=>{const s=archivedSeasons[k];return(
              <button key={k} onClick={()=>setViewingSeason(k)} style={{padding:'4px 10px',borderRadius:16,border:'1px solid',borderColor:viewingSeason===k?'#f59e0b':'rgba(255,255,255,0.12)',background:viewingSeason===k?'rgba(245,158,11,0.15)':'rgba(255,255,255,0.05)',color:viewingSeason===k?'#f59e0b':'rgba(255,255,255,0.4)',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>{s.label||k}</button>
            );})}
          </div>
        )}
      </div></div>

      <nav className="nav">{TABS.map(t=><button key={t.id} className={'nb'+(tab===t.id?' on':'')} onClick={()=>setTab(t.id)}>{t.icon}{t.label}</button>)}</nav>

      <div className="content">
        {/* STANDINGS */}
        {tab==='standings'&&(<div>
          {viewingSeason&&(<div className="alert" style={{background:'#fffbeb',border:'1px solid #fde68a',color:'#92400e',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>Viewing: {archivedSeasons[viewingSeason]?.label||viewingSeason}</span><button className="btn btn-outline btn-xs" onClick={()=>setViewingSeason(null)}>Back to current</button></div>)}
          {standings.length===0?(<div className="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5" style={{marginBottom:8}}><path d="M18 20V10M12 20V4M6 20v-6"/></svg><div className="empty-title">No attendance data</div><div className="empty-sub">Import a CSV or log a round to get started.</div></div>):(<div>
            <div className="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input className="search-input" placeholder="Search players..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
            <div className="lb-card">
              <div className="lb-hdr"><div className="slbl" style={{marginBottom:0}}>Season Standings</div><button className="btn btn-outline btn-xs" onClick={exportCSV}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Export</button></div>
              {standings.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())).map((p,i)=>(
                <div key={p.name} className="lb-row" onClick={()=>setSelectedPlayer(p)}>
                  <div className={'lb-rank'+(i===0?' r1':i===1?' r2':i===2?' r3':'')}>{i+1}</div>
                  <div className="avi">{ini(p.name)}</div>
                  <div className="lb-name">{p.name}</div>
                  <div className="lb-bar-w"><div className="lb-bar" style={{width:Math.round((p.rounds/maxR)*100)+'%'}}></div></div>
                  <div className="lb-rounds">{p.rounds}</div>
                </div>
              ))}
              {standings.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())).length===0&&(<div style={{padding:14,textAlign:'center',color:'#94a3b8',fontSize:12}}>No matches</div>)}
            </div>
          </div>)}
        </div>)}

        {/* HISTORY */}
        {tab==='history'&&(<div>
          {viewingSeason&&(<div className="alert" style={{background:'#fffbeb',border:'1px solid #fde68a',color:'#92400e',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>Viewing: {archivedSeasons[viewingSeason]?.label||viewingSeason}</span><button className="btn btn-outline btn-xs" onClick={()=>setViewingSeason(null)}>Back to current</button></div>)}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div className="slbl" style={{marginBottom:0}}>{activeRounds.length} Round{activeRounds.length!==1?'s':''}</div>
            {!viewingSeason&&(<button className="btn btn-green btn-sm" onClick={()=>{if(!isAdmin){setShowAdminPrompt(true);}else{setEditRound(null);setLogModal(true);}}}><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Log Round</button>)}
          </div>
          {activeRounds.length===0?(<div className="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5" style={{marginBottom:8}}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div className="empty-title">No rounds logged</div><div className="empty-sub">{viewingSeason?'This archived season has no data.':'Import data or log a round manually.'}</div></div>):(
            activeRounds.map((r,ri)=><RoundCard key={r.date+ri} round={r} index={ri} isAdmin={!viewingSeason&&isAdmin} onAuth={()=>setIsAdmin(true)}
              onPlayerClick={name=>{const p=standings.find(s=>s.name===name);if(p)setSelectedPlayer(p);}}
              onEdit={()=>{if(!viewingSeason){setEditRound({index:ri,data:r});setLogModal(true);}}}
              onDelete={()=>{if(!viewingSeason){const u=rounds.filter((_,i)=>i!==ri);saveRounds(u);showToast('Round deleted');}}}/>)
          )}
        </div>)}

        {/* IMPORT */}
        {tab==='import'&&(<div>
          <AdminGate isAdmin={isAdmin} onAuth={()=>setIsAdmin(true)}>
            <div className="card card-pad">
              <div className="slbl">Import CSV</div>
              <p style={{fontSize:12,color:'#64748b',marginBottom:10}}>Export a CSV from the attendance tracker app, then upload it here. This replaces all existing data.</p>
              <div className="import-area" onClick={()=>document.getElementById('csv-input').click()}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="1.5" style={{marginBottom:6}}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <div style={{fontSize:13,fontWeight:600,color:'#0f172a',marginBottom:2}}>Tap to upload CSV</div>
                <div style={{fontSize:11,color:'#94a3b8'}}>From the attendance tracker export</div>
                <input id="csv-input" type="file" accept=".csv" style={{display:'none'}} onChange={handleFile}/>
              </div>
              {rounds.length>0&&(<div className="alert alert-ok">Loaded: {rounds.length} rounds, {standings.length} players, ${totalEntries} pot</div>)}
            </div>
            <div className="card card-pad">
              <div className="slbl">Re-import / Update</div>
              <p style={{fontSize:12,color:'#64748b',marginBottom:8}}>Re-import anytime to refresh with latest data.</p>
              <button className="btn btn-gold btn-full" onClick={()=>document.getElementById('csv-input').click()}>Upload New CSV</button>
            </div>
            {rounds.length>0&&(<div className="card card-pad">
              <div className="slbl">End Season</div>
              <p style={{fontSize:12,color:'#64748b',marginBottom:8}}>Archive this season's data and start fresh for next year. The archived season stays viewable from the header.</p>
              {showEndSeason?(<div>
                <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:8,padding:10,marginBottom:8}}><div style={{fontSize:12,fontWeight:600,color:'#92400e',marginBottom:4}}>Archive {rounds.length} rounds and {standings.length} players?</div><div style={{fontSize:11,color:'#92400e'}}>Current data moves to archive. Board resets for the new season.</div></div>
                <div style={{display:'flex',gap:6}}><button className="btn btn-gold btn-sm" onClick={()=>{archiveSeason();setShowEndSeason(false);}}>Archive & Start Fresh</button><button className="btn btn-outline btn-sm" onClick={()=>setShowEndSeason(false)}>Cancel</button></div>
              </div>):(<button className="btn btn-gold btn-sm" onClick={()=>setShowEndSeason(true)}>End Season & Archive</button>)}
            </div>)}
            {rounds.length>0&&(<div className="card card-pad">
              <div className="slbl" style={{color:'#dc2626'}}>Danger Zone</div>
              <p style={{fontSize:12,color:'#64748b',marginBottom:8}}>Permanently delete all current attendance data. This cannot be undone.</p>
              <div style={{display:'flex',gap:6,alignItems:'flex-end'}}>
                <div style={{flex:1}}><label className="fl">Type DELETE to confirm</label><input className="fi" style={{fontSize:12}} placeholder="DELETE" value={deleteText} onChange={e=>setDeleteText(e.target.value)}/></div>
                <button className="btn btn-red btn-sm" disabled={deleteText!=='DELETE'} style={{opacity:deleteText==='DELETE'?1:0.35}} onClick={()=>{clearAllData();setDeleteText('');}}>Clear All Data</button>
              </div>
            </div>)}
          </AdminGate>
        </div>)}
      </div>

      {/* PLAYER DETAIL */}
      {selectedPlayer&&(<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setSelectedPlayer(null);}}>
        <div className="modal">
          <div className="modal-handle"></div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <div className="avi" style={{width:40,height:40,fontSize:13}}>{ini(selectedPlayer.name)}</div>
            <div><div className="modal-title" style={{marginBottom:0}}>{selectedPlayer.name}</div><div style={{fontSize:12,color:'#94a3b8',fontWeight:500}}>{selectedPlayer.rounds} round{selectedPlayer.rounds!==1?'s':''} · ${selectedPlayer.rounds} to pot</div></div>
          </div>
          <div className="slbl">Dates Played</div>
          <div style={{display:'flex',flexWrap:'wrap'}}>{selectedPlayer.dates.sort().map(d=><span key={d} className="date-chip">{fmtDate(d)}</span>)}</div>
          <button className="btn btn-outline btn-full" style={{marginTop:14}} onClick={()=>setSelectedPlayer(null)}>Close</button>
        </div>
      </div>)}

      {/* LOG/EDIT MODAL */}
      {logModal&&(<LogRoundModal editRound={editRound?editRound.data:null} onSave={data=>{if(editRound){const u=[...rounds];u[editRound.index]=data;saveRounds(u);showToast('Round updated');}else{saveRounds([...rounds,data]);showToast('Round logged - '+data.players.length+' players');}}} onClose={()=>{setLogModal(false);setEditRound(null);}}/>)}

      {/* ADMIN PROMPT */}
      {showAdminPrompt&&(<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowAdminPrompt(false);}}>
        <div className="modal"><div className="modal-handle"></div>
          <AdminGate isAdmin={false} onAuth={()=>{setIsAdmin(true);setShowAdminPrompt(false);setEditRound(null);setLogModal(true);}}>
            <span></span>
          </AdminGate>
        </div>
      </div>)}

      {toast&&<div className="toast"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="3"><polyline points="20 6 9 13 4 10"/></svg>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
