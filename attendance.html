<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Clark Golf Group - Attendance</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#f1f5f9;color:#0f172a;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
#root{min-height:100%}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#10b981;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-brand{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:#fff;margin-top:16px}
.loading-brand em{color:#10b981;font-style:normal}

/* HEADER */
.hdr{background:#0f172a;padding:20px 16px 0;position:relative;overflow:hidden}
.hdr-curve{position:absolute;bottom:-1px;left:0;right:0;height:18px;background:#fff;border-radius:18px 18px 0 0}
.hdr-inner{position:relative;z-index:1;padding-bottom:22px}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.hdr-brand{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;color:#fff;line-height:1.15}
.hdr-brand em{color:#10b981;font-style:normal}
.hdr-sub{font-size:11px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:3px}
.back-link{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:4px 12px;color:rgba(255,255,255,0.5);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.back-link:hover{color:#fff}

/* STAT BOXES */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.stat-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:9px;padding:10px 6px;text-align:center}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:#10b981}
.stat-l{font-size:10px;font-weight:600;letter-spacing:0.08em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:2px}

/* POT BAR */
.pot-bar{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);border-radius:10px;padding:11px 14px;margin-top:10px;display:flex;align-items:center;justify-content:space-between}
.pot-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em}
.pot-sub{font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px}
.pot-amt{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:#f59e0b}

/* NAV */
.nav{background:#fff;display:flex;border-bottom:1px solid #e2e8f0}
.nb{flex:1;padding:12px 2px 10px;background:none;border:none;color:#94a3b8;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:0.06em;text-transform:uppercase;position:relative;transition:color 0.15s}
.nb svg{width:19px;height:19px;flex-shrink:0}
.nb.on{color:#0f172a}
.nb.on::after{content:'';position:absolute;bottom:0;left:18%;right:18%;height:2px;background:#f59e0b;border-radius:2px 2px 0 0}
.content{flex:1;padding:18px 14px 56px;line-height:1.5}

/* LEADERBOARD */

.lb-row:hover{background:#f8fafc}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:28px;height:28px;border-radius:50%;background:#f1f5f9;color:#64748b;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.lb-rank.gold{background:#f59e0b;color:#0f172a}
.lb-rank.silver{background:#cbd5e1;color:#0f172a}
.lb-rank.bronze{background:#d97706;color:#fff}

/* HISTORY CARDS */

.round-hdr:active{background:#f8fafc}
.round-date{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#0f172a}

.modal-sub{font-size:13px;color:#94a3b8;font-weight:500;margin-bottom:16px}

/* SEARCH */
.sw{position:relative;margin-bottom:12px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#94a3b8}
.si{width:100%;padding:10px 12px 10px 32px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#f8fafc}
.si:focus{border-color:#10b981;background:#fff}

/* IMPORT */
.import-area{background:#f8fafc;border:2px dashed #e2e8f0;border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:border-color 0.2s;margin-bottom:12px}
.import-area:hover{border-color:#10b981}
.import-area.dragging{border-color:#10b981;background:#ecfdf5}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap}
.btn:active{transform:scale(0.97)}
.btn-green{background:#10b981;color:#0f172a}
.btn-dark{background:#0f172a;color:#fff}
.btn-outline{background:#fff;border:1.5px solid #e2e8f0;color:#475569}
.btn-red{background:#ef4444;color:#fff}
.btn-sm{padding:6px 11px;font-size:11px}
.btn-full{width:100%}
.btn-gold{background:#f59e0b;color:#0f172a}

/* ALERTS */
.alert{border-radius:9px;padding:10px 12px;font-size:13px;margin-bottom:10px;font-weight:500}
.alert-ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#15803d}
.alert-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}

/* TOGGLE */
.tog{display:flex;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:20px;overflow:hidden;padding:3px;margin-bottom:12px}
.tog-opt{flex:1;padding:7px 8px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:#64748b;border-radius:16px;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.03em}
.tog-opt.on{background:#0f172a;color:#fff}

/* EMPTY */
.empty{text-align:center;padding:44px 16px}
.empty svg{width:38px;height:38px;opacity:0.18;margin-bottom:11px}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;margin-bottom:5px}
.empty-sub{font-size:13px;color:#64748b;line-height:1.55}

/* CARD */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:10px}
.card-pad{padding:14px}
.slbl{font-size:11px;font-weight:600;letter-spacing:0.07em;color:#94a3b8;text-transform:uppercase;margin-bottom:8px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:8px;animation:toastIn 0.25s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

// ============================================================

};

function mapName(csvName) {
  return NAME_MAP[csvName] || csvName;
}

// ============================================================
// FIREBASE
// ============================================================
function useDB() {
  const [db, setDb] = useState(null);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    try {
      if (!firebase.apps.length) firebase.initializeApp({
        apiKey: "AIzaSyBrYlN16zSJQ6pRRQBhBn4YLA7FzkmqJfg",
        authDomain: "clark-group-dd15e.firebaseapp.com",
        databaseURL: "https://clark-group-dd15e-default-rtdb.firebaseio.com",
        projectId: "clark-group-dd15e",
        storageBucket: "clark-group-dd15e.firebasestorage.app",
        messagingSenderId: "92891899165",
        appId: "1:92891899165:web:817f5f164f3fc50b506df4"
      });
      setDb(firebase.database());
      setReady(true);
    } catch (e) { setReady(true); }
  }, []);

  const read = useCallback((p, cb) => {
    if (!db) { cb(JSON.parse(localStorage.getItem(p) || 'null')); return () => {}; }
    const r = db.ref(p);
    r.on('value', s => cb(s.val()));
    return () => r.off();
  }, [db]);

  const write = useCallback((p, v) => {
    if (!db) { localStorage.setItem(p, JSON.stringify(v)); return Promise.resolve(); }
    return db.ref(p).set(v);
  }, [db]);

  return { ready, read, write };
}

// ============================================================
// HELPERS
// ============================================================
const ini = n => n.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parseDate(str) {
  // Handles "Apr 24, 2025" format
  const parts = str.trim().match(/(\w+)\s+(\d+),?\s*(\d{4})/);
  if (!parts) return null;
  const mi = MO.indexOf(parts[1]);
  if (mi === -1) return null;
  const y = parseInt(parts[3]);
  const d = parseInt(parts[2]);
  return `${y}-${String(mi + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
}

function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return MO[parseInt(m) - 1] + ' ' + parseInt(d) + ', ' + y;
}

function fmtDateShort(iso) {
  if (!iso) return '';
  const [, m, d] = iso.split('-');
  return MO[parseInt(m) - 1] + ' ' + parseInt(d);
}

// ============================================================
// CSV PARSER
// ============================================================
function parseCSV(text) {
  // Parse the CSV export from the friend's app
  // Format: Rank, Player, Total Rounds, Dates Played
  const lines = text.split('\n').filter(l => l.trim());
  const rounds = {}; // date -> [player names]

  for (let i = 1; i < lines.length; i++) {
    // Parse CSV with quoted fields
    const matches = [];
    const re = /("([^"]*)"|([^,]+))/g;
    let m;
    while ((m = re.exec(lines[i])) !== null) {
      matches.push((m[2] || m[3] || '').trim());
    }
    if (matches.length < 4) continue;

    const csvName = matches[1];
    const datesStr = matches[3];
    const fullName = mapName(csvName);
    const dates = datesStr.split('|').map(d => d.trim()).filter(Boolean);

    dates.forEach(dateStr => {
      const iso = parseDate(dateStr);
      if (!iso) return;
      if (!rounds[iso]) rounds[iso] = [];
      if (!rounds[iso].includes(fullName)) {
        rounds[iso].push(fullName);
      }
    });
  }

  // Convert to array sorted by date desc
  return Object.entries(rounds)
    .map(([date, players]) => ({ date, players: players.sort() }))
    .sort((a, b) => b.date.localeCompare(a.date));
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [tab, setTab] = useState('standings');
  const [rounds, setRounds] = useState([]);
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [search, setSearch] = useState('');
  const [toast, setToast] = useState(null);
  const [importMode, setImportMode] = useState(false);
  const { ready, read, write } = useDB();

  // Hide loader
  useEffect(() => {
    const l = document.getElementById('loader');
    if (l) { setTimeout(() => { l.classList.add('hide'); setTimeout(() => l.remove(), 500); }, 150); }
  }, []);

  // Load data
  useEffect(() => {
    if (!ready) return;
    return read('attendance/rounds', v => {
      if (v) {
        const arr = Array.isArray(v) ? v : Object.values(v);
        setRounds(arr.sort((a, b) => b.date.localeCompare(a.date)));
      }
    });
  }, [ready]);

  // Compute standings
  const standings = useMemo(() => {
    const players = {};
    rounds.forEach(r => {
      (r.players || []).forEach(name => {
        if (!players[name]) players[name] = { name, rounds: 0, dates: [] };
        players[name].rounds++;
        players[name].dates.push(r.date);
      });
    });
    return Object.values(players).sort((a, b) => b.rounds - a.rounds);
  }, [rounds]);

  const totalRoundEntries = rounds.reduce((s, r) => s + (r.players || []).length, 0);
  const maxRounds = standings.length > 0 ? standings[0].rounds : 1;
  const potTotal = totalRoundEntries; // $1 per player per round

  // CSV Import
  function handleImport(text) {
    try {
      const parsed = parseCSV(text);
      if (!parsed.length) {
        setToast('No rounds found in CSV');
        setTimeout(() => setToast(null), 3000);
        return;
      }
      write('attendance/rounds', parsed);
      setRounds(parsed);
      setImportMode(false);
      setToast(parsed.length + ' rounds imported!');
      setTimeout(() => setToast(null), 3000);
    } catch (e) {
      setToast('Error parsing CSV');
      setTimeout(() => setToast(null), 3000);
    }
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => handleImport(ev.target.result);
    reader.readAsText(file);
  }

  function clearData() {
    if (confirm('Clear all attendance data? This cannot be undone.')) {
      write('attendance/rounds', null);
      setRounds([]);
      setToast('Data cleared');
      setTimeout(() => setToast(null), 3000);
    }
  }

  // CSV Export
  function exportCSV() {
    let csv = '"Rank","Player","Total Rounds","Dates Played"\n';
    standings.forEach((p, i) => {
      const dates = p.dates.sort().map(d => fmtDate(d)).join(' | ');
      csv += `"${i + 1}","${p.name}","${p.rounds}","${dates}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'clark_group_attendance.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  const TABS = [
    { id: 'standings', label: 'Standings', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M18 20V10M12 20V4M6 20v-6"/></svg> },
    { id: 'history', label: 'History', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> },
    { id: 'lookup', label: 'Lookup', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> },
    { id: 'import', label: 'Import', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> },
  ];

  return (
    <div className="app">
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-curve"></div>
        <div className="hdr-inner">
          <div className="hdr-top">
            <div>
              <div className="hdr-brand">Clark <em>Golf</em> Group</div>
              <div className="hdr-sub">Season Attendance</div>
            </div>
            <a href="index.html" className="back-link">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
              Main App
            </a>
          </div>
          <div className="stat-row">
            <div className="stat-box">
              <div className="stat-n">{standings.length}</div>
              <div className="stat-l">Players</div>
            </div>
            <div className="stat-box">
              <div className="stat-n">{rounds.length}</div>
              <div className="stat-l">Rounds</div>
            </div>
            <div className="stat-box">
              <div className="stat-n">{maxRounds}</div>
              <div className="stat-l">Top Played</div>
            </div>
          </div>
          <div className="pot-bar">
            <div>
              <div className="pot-label">Year-End Tournament Pot</div>
              <div className="pot-sub">$1 per player per round</div>
            </div>
            <div className="pot-amt">${potTotal}</div>
          </div>
        </div>
      </div>

      {/* NAV */}
      <nav className="nav">
        {TABS.map(t => (
          <button key={t.id} className={'nb' + (tab === t.id ? ' on' : '')} onClick={() => setTab(t.id)}>
            {t.icon}{t.label}
          </button>
        ))}
      </nav>

      {/* CONTENT */}
      <div className="content">

        {/* STANDINGS TAB */}
        {tab === 'standings' && (
          <div>
            {standings.length === 0 ? (
              <div className="empty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                <div className="empty-title">No attendance data yet</div>
                <div className="empty-sub">Import a CSV from the attendance tracker to get started.</div>
              </div>
            ) : (
              <div className="card">
                <div style={{padding:'12px 14px 6px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid #f1f5f9'}}>
                  <div className="slbl" style={{marginBottom:0}}>Season Standings</div>
                  <button className="btn btn-outline btn-sm" onClick={exportCSV}>
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Export
                  </button>
                </div>
                {standings.map((p, i) => (
                  <div key={p.name} className="lb-row" onClick={() => setSelectedPlayer(p)}>
                    <div className={'lb-rank' + (i === 0 ? ' gold' : i === 1 ? ' silver' : i === 2 ? ' bronze' : '')}>{i + 1}</div>
                    <div className="avi">{ini(p.name)}</div>
                    <div className="lb-name">{p.name}</div>
                    <div className="lb-bar-wrap">
                      <div className="lb-bar" style={{width: Math.round((p.rounds / maxRounds) * 100) + '%'}}></div>
                    </div>
                    <div className="lb-rounds">{p.rounds}r</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* HISTORY TAB */}
        {tab === 'history' && (
          <div>
            {rounds.length === 0 ? (
              <div className="empty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <div className="empty-title">No rounds logged</div>
                <div className="empty-sub">Import data to see round history.</div>
              </div>
            ) : (
              rounds.map((r, ri) => <RoundCard key={r.date + ri} round={r} onPlayerClick={name => {
                const p = standings.find(s => s.name === name);
                if (p) setSelectedPlayer(p);
              }}/>)
            )}
          </div>
        )}

        {/* LOOKUP TAB */}
        {tab === 'lookup' && (
          <div>
            <div className="sw">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input className="si" placeholder="Search player name..." value={search} onChange={e => setSearch(e.target.value)} autoFocus/>
            </div>
            {standings.length === 0 ? (
              <div className="empty">
                <div className="empty-title">No players yet</div>
                <div className="empty-sub">Import attendance data first.</div>
              </div>
            ) : (
              <div className="card">
                {standings
                  .filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
                  .map((p, i) => (
                    <div key={p.name} className="lb-row" onClick={() => setSelectedPlayer(p)}>
                      <div className="avi">{ini(p.name)}</div>
                      <div className="lb-name">{p.name}</div>
                      <div className="lb-rounds">{p.rounds} round{p.rounds !== 1 ? 's' : ''}</div>
                    </div>
                  ))
                }
                {standings.filter(p => p.name.toLowerCase().includes(search.toLowerCase())).length === 0 && (
                  <div style={{padding:20,textAlign:'center',color:'#94a3b8',fontSize:13}}>No matches for "{search}"</div>
                )}
              </div>
            )}
          </div>
        )}

        {/* IMPORT TAB */}
        {tab === 'import' && (
          <div>
            <div className="card card-pad">
              <div className="slbl">Import CSV</div>
              <p style={{fontSize:13,color:'#64748b',marginBottom:14}}>
                Export a CSV from the attendance tracker app, then upload it here. Names will be automatically matched to the Clark Group roster.
              </p>
              <div className="import-area" onClick={() => document.getElementById('csv-input').click()}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="1.5" style={{marginBottom:8}}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <div style={{fontSize:14,fontWeight:600,color:'#0f172a',marginBottom:2}}>Tap to upload CSV</div>
                <div style={{fontSize:12,color:'#94a3b8'}}>From the attendance tracker's Export button</div>
                <input id="csv-input" type="file" accept=".csv" style={{display:'none'}} onChange={handleFile}/>
              </div>
              {rounds.length > 0 && (
                <div className="alert alert-ok">
                  Currently loaded: {rounds.length} rounds, {standings.length} players, ${potTotal} pot
                </div>
              )}
            </div>

            <div className="card card-pad">
              <div className="slbl">Re-import / Update</div>
              <p style={{fontSize:13,color:'#64748b',marginBottom:10}}>
                You can re-import anytime — the new CSV fully replaces the old data. Use this when your buddy's tracker has new rounds logged.
              </p>
              <button className="btn btn-gold btn-full" onClick={() => document.getElementById('csv-input').click()}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Upload New CSV
              </button>
            </div>

            {rounds.length > 0 && (
              <div className="card card-pad">
                <div className="slbl" style={{color:'#dc2626'}}>Danger Zone</div>
                <button className="btn btn-red btn-sm" onClick={clearData}>Clear All Data</button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* PLAYER DETAIL MODAL */}
      {selectedPlayer && (
        <div className="overlay" onClick={e => { if (e.target === e.currentTarget) setSelectedPlayer(null); }}>
          <div className="modal">
            <div className="modal-handle"></div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
              <div className="avi" style={{width:44,height:44,fontSize:14}}>{ini(selectedPlayer.name)}</div>
              <div>
                <div className="modal-title">{selectedPlayer.name}</div>
                <div className="modal-sub" style={{marginBottom:0}}>
                  {selectedPlayer.rounds} round{selectedPlayer.rounds !== 1 ? 's' : ''} played
                  {' '}·{' '}${selectedPlayer.rounds} to pot
                </div>
              </div>
            </div>
            <div style={{marginTop:16}}>
              <div className="slbl">Dates Played</div>
              <div style={{display:'flex',flexWrap:'wrap'}}>
                {selectedPlayer.dates.sort().map(d => (
                  <span key={d} className="date-chip">{fmtDate(d)}</span>
                ))}
              </div>
            </div>
            <button className="btn btn-outline btn-full" style={{marginTop:16}} onClick={() => setSelectedPlayer(null)}>Close</button>
          </div>
        </div>
      )}

      {/* TOAST */}
      {toast && (
        <div className="toast">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="3"><polyline points="20 6 9 13 4 10"/></svg>
          {toast}
        </div>
      )}
    </div>
  );
}

// Round card component for history
function RoundCard({ round, onPlayerClick }) {
  const [open, setOpen] = useState(false);
  const players = round.players || [];

  return (
    <div className="round-card">
      <div className="round-hdr" onClick={() => setOpen(!open)}>
        <div>
          <div className="round-date">{fmtDate(round.date)}</div>
          <div className="round-meta">{players.length} player{players.length !== 1 ? 's' : ''} · ${players.length} to pot</div>
        </div>
        <div style={{display:'flex',alignItems:'center'}}>
          <span className="round-pill">{players.length}</span>
          <svg className={'round-chev' + (open ? ' open' : '')} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      {open && (
        <div className="round-body">
          {players.map((name, i) => (
            <div key={name} className="round-player" onClick={() => onPlayerClick(name)} style={{cursor:'pointer'}}>
              <div className="round-num">{i + 1}</div>
              <span>{name}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
